<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教育学记忆卡片 · 主动回忆 + 间隔重复</title>
<style>
  :root{
    --bg:#0f1420; --card:#1a2235; --card2:#222c44; --line:#2e3a55;
    --txt:#e8edf7; --sub:#9aa7c2; --acc:#5b8cff; --good:#34c77b;
    --warn:#f5a623; --bad:#ef5a6f; --gold:#ffd166;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
    background:linear-gradient(160deg,#0f1420,#141b2e);color:var(--txt);
    min-height:100vh;padding:16px;}
  .wrap{max-width:720px;margin:0 auto;}
  h1{font-size:20px;margin:6px 0 2px;}
  .tag{color:var(--sub);font-size:12px;margin-bottom:14px;}
  /* stats bar */
  .stats{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
  .stat{flex:1;min-width:70px;background:var(--card);border:1px solid var(--line);
    border-radius:12px;padding:10px;text-align:center;}
  .stat b{display:block;font-size:20px;}
  .stat span{font-size:11px;color:var(--sub);}
  .stat.due b{color:var(--warn)} .stat.done b{color:var(--good)}
  /* controls */
  .row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
  select,button{font-family:inherit;font-size:14px;border-radius:10px;border:1px solid var(--line);
    background:var(--card2);color:var(--txt);padding:9px 12px;cursor:pointer;}
  select{flex:1;min-width:120px;}
  .mode{display:flex;background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden;}
  .mode button{border:none;border-radius:0;background:transparent;padding:9px 14px;}
  .mode button.on{background:var(--acc);color:#fff;}
  /* search */
  .searchbox{position:relative;margin-bottom:10px;}
  #search{width:100%;font-family:inherit;font-size:15px;border-radius:10px;
    border:1px solid var(--line);background:var(--card);color:var(--txt);padding:11px 14px;}
  #search:focus{outline:none;border-color:var(--acc);}
  .results{position:absolute;left:0;right:0;top:48px;z-index:20;background:var(--card2);
    border:1px solid var(--line);border-radius:10px;max-height:300px;overflow:auto;
    box-shadow:0 12px 30px rgba(0,0,0,.45);display:none;}
  .results.show{display:block;}
  .results .ri{padding:10px 14px;border-bottom:1px solid var(--line);cursor:pointer;font-size:14px;}
  .results .ri:last-child{border-bottom:none;}
  .results .ri:hover,.results .ri.sel{background:var(--acc);color:#fff;}
  .results .ri .rn{color:var(--acc);font-weight:600;margin-right:6px;}
  .results .ri:hover .rn,.results .ri.sel .rn{color:#fff;}
  .results .ri small{color:var(--sub);}
  .results .ri:hover small,.results .ri.sel small{color:#dfe7ff;}
  .results .none{padding:12px 14px;color:var(--sub);font-size:13px;}
  /* card */
  .deck{perspective:1400px;margin-bottom:14px;}
  .flip{position:relative;width:100%;min-height:330px;transition:transform .5s;
    transform-style:preserve-3d;cursor:pointer;}
  .flip.turned{transform:rotateY(180deg);}
  .face{position:absolute;inset:0;backface-visibility:hidden;border-radius:18px;
    border:1px solid var(--line);padding:22px;display:flex;flex-direction:column;
    background:var(--card);box-shadow:0 10px 30px rgba(0,0,0,.35);overflow:auto;}
  .back{transform:rotateY(180deg);background:linear-gradient(160deg,#1b2541,#172036);}
  .cat{font-size:12px;color:var(--acc);font-weight:600;margin-bottom:8px;letter-spacing:.5px;}
  .q{font-size:19px;line-height:1.6;font-weight:600;flex:1;display:flex;align-items:center;}
  .a{font-size:16px;line-height:1.75;white-space:pre-wrap;}
  .a b{color:var(--gold);}
  .mn{margin-top:14px;padding:10px 12px;background:rgba(255,209,102,.12);
    border-left:3px solid var(--gold);border-radius:8px;font-size:14px;color:#ffe7a8;}
  .exp{margin-top:12px;border:1px solid var(--line);border-radius:8px;background:rgba(91,140,255,.08);}
  .exp summary{cursor:pointer;padding:9px 12px;font-size:13px;color:var(--acc);font-weight:600;
    list-style:none;user-select:none;}
  .exp summary::-webkit-details-marker{display:none;}
  .exp summary::before{content:"▸ ";}
  .exp[open] summary::before{content:"▾ ";}
  .exp[open] summary{border-bottom:1px solid var(--line);}
  .expbody{padding:11px 13px;font-size:14px;line-height:1.75;white-space:pre-wrap;color:#cdd7ee;}
  .hint{margin-top:auto;color:var(--sub);font-size:12px;text-align:center;padding-top:12px;}
  .box-badge{position:absolute;top:14px;right:16px;font-size:11px;color:var(--sub);}
  /* grade buttons */
  .grade{display:flex;gap:8px;}
  .grade button{flex:1;padding:14px;font-size:15px;font-weight:600;color:#fff;border:none;}
  .g-bad{background:var(--bad)} .g-warn{background:var(--warn)} .g-good{background:var(--good)}
  .reveal{width:100%;padding:14px;font-size:15px;font-weight:600;background:var(--acc);color:#fff;border:none;}
  /* progress */
  .bar{height:6px;background:var(--card2);border-radius:6px;overflow:hidden;margin-bottom:14px;}
  .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--acc),var(--good));width:0;transition:width .3s;}
  .empty{text-align:center;padding:50px 20px;color:var(--sub);}
  .empty b{color:var(--good);font-size:18px;}
  .foot{display:flex;justify-content:space-between;align-items:center;margin-top:6px;}
  .link{background:none;border:none;color:var(--sub);font-size:12px;text-decoration:underline;padding:4px;}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(80px);
    background:#000a;border:1px solid var(--line);padding:10px 16px;border-radius:30px;
    font-size:13px;transition:transform .3s;pointer-events:none;}
  .toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="wrap">
  <h1>📚 教育学记忆卡片</h1>
  <div class="tag">190题简答带背 · 主动回忆 + 间隔重复（艾宾浩斯 / Leitner）· 进度自动保存到本机浏览器</div>

  <div class="stats">
    <div class="stat due"><b id="s-due">0</b><span>今日待复习</span></div>
    <div class="stat"><b id="s-new">0</b><span>未学新卡</span></div>
    <div class="stat done"><b id="s-mastered">0</b><span>已掌握</span></div>
    <div class="stat"><b id="s-total">0</b><span>卡片总数</span></div>
  </div>

  <div class="searchbox">
    <input id="search" type="search" autocomplete="off" placeholder="🔍 搜索关键词，如：教学原则 / 启发性 / 班主任 / #69">
    <div class="results" id="results"></div>
  </div>

  <div class="row">
    <select id="cat"></select>
    <div class="mode" id="mode">
      <button data-m="srs" class="on">复习模式</button>
      <button data-m="all">通览模式</button>
    </div>
  </div>

  <div class="bar"><i id="bar"></i></div>

  <div id="stage"></div>

  <div class="foot">
    <button class="link" onclick="shuffleNow()">🔀 打乱顺序</button>
    <button class="link" onclick="resetAll()">♻️ 重置进度</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ============ 卡片数据（front=问题, back=答案, mn=口诀/记忆钩子, cat=分类） ============ */
const CARDS = [
 {n:1,cat:"教育本质/社会",q:"简述教育活动的基本要素及各自地位",a:"（1）教育者——是教育活动的主导者。\n（2）学习者——是教育过程中学习与发展的主体。\n（3）教育内容——教育内容是教育活动中师生共同认识的客体。\n（4）教育手段——教育手段是教育活动的基本条件。\n注意：教育内容和教育手段统一为教育影响，是教育活动中连接教育者和受教育者的中\n介、纽带或桥梁。",mn:"教学内手",x:"· 为什么：教育是有目的地培养人的活动，必须有施教者(教育者主导)、受教者(学习者是发展主体)、教与学的对象(内容)和借以传递的工具(手段)，缺一不构成完整的教育活动。\n· 对比：内容+手段=教育影响，是连接教育者与学习者的中介；教育者和学习者是\"人\"的两端，教育影响是\"物\"的桥梁，三大块共同构成师生互动闭环。\n· 记忆钩子：口诀\"教学内手\"=教育者、学习者、教育内容、教育手段，按主导→主体→客体→条件的地位排序记。"},
 {n:2,cat:"教育本质/社会",q:"简述家庭教育的特征",a:"（1）权威性。（2）针对性。（3）教育性。（4）感染性。（5）先导性。（6）终身性。",mn:"深感教导全对",x:"· 为什么：家庭教育是孩子最早接受、贯穿一生的教育，父母与子女血缘亲情决定了它\"权威性、感染性、先导性、终身性\"；父母最了解孩子又能随时施教，故有\"针对性\"；日常生活处处含育人意味，故有\"教育性\"。\n· 对比：与学校教育相比，家庭教育更随机、更情感化、更早(先导)、更长(终身)；学校教育则更系统、计划、专业。\n· 记忆钩子：口诀\"深感教导全对\"=先导、感染、教育、针对、权威、终身。"},
 {n:3,cat:"教育本质/社会",q:"简述教育的社会属性",a:"（1）永恒性；（2）历史性；（3）阶级性；（4）相对独立性；（5）长期性；（6）生\n产性；（7）民族性。",mn:"永历民生长相阶级",x:"· 为什么：教育与人类社会共存(永恒性)，又随社会变迁而变(历史性);在阶级社会被统治阶级利用(阶级性);受社会制约却又不完全同步、可超前或滞后(相对独立性);培养人见效慢(长期性);能创造和传递生产力(生产性);带本民族烙印(民族性)。\n· 根源：永恒性、历史性、阶级性属马克思主义教育学对教育社会属性的基本判断。\n· 对比：永恒性=有人类就有教育(不会消亡);历史性=不同时代教育不同;阶级性只存在于阶级社会，原始社会和将来无阶级社会没有。"},
 {n:4,cat:"教育本质/社会",q:"简述教育促进个体社会化的表现",a:"（1）促进个体思想意识的社会化。\n（2）促进个体行为的社会化。\n（3）促进角色和职业的社会化。\n（4）完善自我观念和掌握社会技能。",mn:"自制绝技 / 只想行为 / 只想自我行为",x:"· 为什么：社会化就是把\"自然人\"变成\"社会人\"，教育从思想观念(内)、外在行为、社会角色/职业三个层面把社会规范、技能传给个体，使其能融入并胜任社会生活。\n· 对比：社会化=求\"同\"，让人符合社会共同要求;与个性化(求\"异\"，让人成为独特自己)是教育促进个体发展的一体两面。\n· 记忆钩子：思想意识→行为→角色职业，由内到外、由抽象到具体。"},
 {n:5,cat:"教育本质/社会",q:"简述教育促进个体个性化的表现",a:"（1）促进人的主体意识的形成和主体能力的发展。\n（2）教育促进个体差异的充分发展，形成人的独特性。\n（3）教育开发人的创造性，促进个体价值的实现。\n（4）唤醒人的生命自觉。",mn:"造差生 / 主体创造差异 / 主体创造生命差异",x:"· 为什么：人不仅要被社会塑造，还要成为有主体性、独特性、创造性的\"这一个\"，教育通过激发主体意识、发展个体差异、开发创造性、唤醒生命自觉，让人成为自己发展的主人。\n· 对比：个性化求\"异\"(独特性、创造性)，社会化求\"同\"(符合社会规范);二者统一才是完整的人的发展，不可偏废。\n· 记忆钩子：主体→差异→创造→生命自觉，即\"主体创造差异、唤醒生命\"。"},
 {n:6,cat:"教育本质/社会",q:"简述现代社会的教育具有哪些特征",a:"（1）培养全面发展的人由理想走向实践。\n（2）教育与生产劳动相结合日趋密切。\n（3）教育普及制度化，教育实施的法制化和民主化。\n（4）教育形式、手段多样化。\n（5）人文教育与科学教育携手并进。\n（6）教育日益显示出开放性和整体性。",mn:"开放人生、全面普刑法",x:"· 为什么：现代社会以大生产、民主、法治、科技为底色，教育随之走向\"全面发展落地、产教结合、普及制度化、形式多样、文理并进、开放整体\"，这些特征都是社会现代化在教育上的投射。\n· 对比：注意区分\"现代社会教育特征\"(本题)与\"20世纪后教育特点\"(全民/民主/多元/现代/终身)、\"当代世界发展趋势\"(全民/现代/国际/终身/信息)，三者高度重叠但表述各异，按各自口诀区分。\n· 记忆钩子：口诀\"开放人生、全面普刑法\"。"},
 {n:7,cat:"教育本质/社会",q:"简述20世纪以后教育的特点",a:"（1）教育的终身化。\n（2）教育的全民化。\n（3）教育的民主化。\n（4）教育的多元化。\n（5）教育的现代化。",mn:"全民多现身",x:"· 为什么：20世纪后科技革命、民主思潮和全球化推动教育走向终身、全民、民主、多元、现代——人人要学(全民)、活到老学到老(终身)、机会平等(民主)、形式内容多样(多元)、手段技术升级(现代)。\n· 对比：本题\"20世纪后特点\"vs\"当代世界趋势\"(全国深信现代化:全民、国际、终身、信息、现代),区别在多元/民主(本题)与国际/信息(趋势)。\n· 记忆钩子：口诀\"全民多现身\"。"},
 {n:8,cat:"教育本质/社会",q:"简述当代世界教育的发展趋势",a:"（1）教育全民化。\n（2）教育现代化。\n（3）教育国际化。\n（4）教育终身化。\n（5）教育信息化。",mn:"全国深信现代化",x:"· 为什么：当代教育发展是经济全球化和信息化的产物——人才要面向世界(国际化)、技术深度介入教学(信息化)，加上一贯延续的全民、现代、终身,共同构成大趋势。\n· 对比：与\"20世纪后教育特点\"相比，本题去掉\"多元、民主\"，换上\"国际化、信息化\"，这是时代更新的标志,考试常以此设干扰项。\n· 记忆钩子：口诀\"全国深信现代化\"=全民、国际、终身、信息、现代。"},
 {n:9,cat:"教育本质/社会",q:"简述马克思主义教育学的教育思想",a:"（1）教育是一种社会历史现象，在阶级社会中具有阶级性。\n（2）教育起源于社会性生产劳动。\n（3）教育的根本目的是促进学生的全面发展。\n（4）培养全面发展的人的唯一方法是将教育与生产劳动相结合。\n（5）教育一方面受政治、经济、文化的制约，另一方面又反作用于他们，具有促进社\n会政治、经济、文化发展的巨大作用。",mn:"",x:"· 为什么：马克思主义用唯物史观看教育——教育是社会历史现象(随社会而生),起源于生产劳动,目的是人的全面发展,而\"教育与生产劳动相结合\"是实现全面发展的唯一途径;同时教育受政治经济文化制约又反作用于它们。\n· 根源：这是马克思主义教育学的核心命题，凯洛夫《教育学》、我国教育方针均以此为理论基础。\n· 对比：\"教育起源于劳动\"对应劳动起源说(米丁斯基、凯洛夫);\"全面发展靠教劳结合\"是我国教育目的的直接依据。"},
 {n:10,cat:"教育与社会",q:"简述教育与生产力（经济）的关系",a:"①提高劳动生产率（促进经济发展）。\n②推动科技发展（科学知识再生产）。\n③提高劳动者素质。",mn:"龟速慕容发够",x:"· 为什么：教育的经济功能本质是\"再生产\"——把潜在生产力(知识、劳动者)变成现实生产力:培养合格劳动者→提高劳动生产率;传递科学知识→实现科学知识再生产;提升素质→为经济升级储备人力。\n· 根源：教育是生产力再生产手段，属马克思主义\"教育具有生产性\"的观点。\n· 对比：本题是\"教育对经济的反作用\";反过来\"生产力对教育的决定作用\"(决定规模速度、结构、内容手段)是另一题，决定与反作用方向相反，别混。"},
 {n:11,cat:"教育与社会",q:"简述教育与政治（社会政治经济制度、社会制度）的关系",a:"①维系社会政治稳定。\n②提高社会政治文明水平。\n③促进社会政治变革。\n④培养社会政治人才。\n⑤形成社会舆论、影响政治时局。\n⑥传播一定社会的政治意识形态，完成年轻一代的政治社会化。",mn:"体内性质两权一目的 / 明辨才稳定",x:"· 为什么：教育的政治功能在于\"培养人+造舆论\"——培养政治人才、传播主流意识形态完成政治社会化、形成舆论影响时局，从而维系稳定、提升文明、推动变革。其落脚点都是为统治服务。\n· 对比：政治经济制度\"决定\"教育的性质、领导权、受教育权和目的;本题讲的是教育反过来\"服务\"政治。一个决定方向(政治→教育),一个发挥功能(教育→政治)。\n· 记忆钩子：口诀\"明辨才稳定\"——舆论、政治社会化、人才、变革、稳定。"},
 {n:12,cat:"教育与社会",q:"简述教育与文化的关系",a:"①文化传承。②文化选择。③文化交流。④文化创新。",mn:"目观芳容 / 流传选新",x:"· 为什么：文化要延续就得靠教育\"传、选、流、创\"——传承(把文化传给下一代)、选择(取其精华去其糟粕)、交流(中外互鉴)、创新(在传承中产生新文化)，教育是文化再生产和更新的主渠道。\n· 对比：四功能层层递进:先传承保底，再选择把关，进而交流融合，最终创新升级。\n· 记忆钩子：口诀\"流传选新\"=交流、传承、选择、创新。"},
 {n:13,cat:"教育与社会",q:"简述教育与科学技术的关系",a:"（1）科学技术对教育的影响\n①对教育的动力作用。\n②科学技术能够改变教育者的观念。\n③科学技术能够影响受教育者的数量和教育质量。\n④科学技术能够影响教育内容、方法和手段。\n⑤科学技术影响教育技术。\n（2）教育的科技功能\n①教育能完成科学知识再生产。\n②教育推进科学的体制化。\n③教育具有科学研究的功能。\n④教育促进科研技术成果的开发利用。",mn:"教育者的法术力量 / 肢体成就",x:"· 为什么：科技与教育是双向互动。科技作为生产力，会更新教育观念、扩大规模、改造内容方法手段(动力作用);教育则通过培养科研人才、再生产科学知识、推进科学体制化、开展研究和成果转化，成为科技发展的母机。\n· 对比：科技\"影响\"教育(改观念、变数量质量、革新手段)是外因推动;教育\"反作用\"于科技(知识再生产、体制化、搞研究、转化成果)是教育的科技功能,一来一回别答反。"},
 {n:14,cat:"教育与社会",q:"简述教育的生态功能",a:"版本一：（1）树立建设生态文明的理念。（2）普及生态文明知识，提高民族素质。（3）引导建设生态文明的社会活动。\n版本二：（1）通过环境教育提高人们保护自然的意识、责任和绿色生活习惯。（2）通过发展科学技术提高解决环境问题的能力。（3）形成可持续发展和生态文明的理念。",mn:"双十问动力（理）",x:"· 为什么：教育的生态功能指教育能传播生态文明观、培养环保意识与可持续发展能力，使人正确处理人与自然的关系，从而推动绿色发展、改善生态环境。\n· 对比：与经济、政治、文化功能并列，属教育服务社会的功能之一;生态功能着眼\"人与自然\"，是新时代\"五位一体\"在教育上的体现。\n· 记忆钩子：核心抓\"生态文明观+可持续发展能力\"两点即可。"},
 {n:15,cat:"教育与社会",q:"简述教育与人口的关系",a:"（1）人口对教育的影响\n①人口数量影响教育发展的规模和速度。\n②人口质量影响教育质量。\n③人口结构影响教育结构。\n（2）教育的人口功能\n①教育是调控人口数量的重要手段。\n②教育是提高人口素质的重要途径。\n③教育可使人口结构趋于合理。\n④教育有利于人口流动和迁移。",mn:"植树节 / 只够数一",x:"· 为什么：人口与教育互为条件。人口的数量、质量、结构会限定教育的规模速度、质量和结构(有多少人、什么素质、什么年龄构成，就办多大、多好、什么层次的教育);教育反过来能控制人口数量、提高素质、优化结构、促进流动迁移。\n· 对比：人口\"影响\"教育是制约(数量→规模、质量→质量、结构→结构，一一对应);教育\"反作用\"于人口是功能(控数量、提素质、调结构、促流动),方向相反成对记。\n· 记忆钩子：影响三条按\"数量-质量-结构\"对应，功能口诀\"只够数一\"。"},
 {n:16,cat:"人的发展",q:"简述个体身心发展的特征（规律）及教育启示",a:"（1）顺序性。教育必须做到循序渐进。\n（2）阶段性。教育必须分阶段教育。\n（3）不平衡性。教育工作者要抓住身心发展的敏感期（关键期）。\n（4）互补性。教育应结合学生实际，扬长避短。\n（5）差异性。教育应做到因材施教、长善救失。",mn:"不断补顺差",x:"· 为什么：身心发展是有客观规律的过程，教育只有顺着规律走才有效，硬来必然事倍功半，所以每条规律都对应一条教育“做法”。\n· 根源：顺序/阶段/不平衡/互补/差异，是教育学公认的个体身心发展五大规律，每条规律配一条启示是答题硬框架。\n· 对比：五规律对启示要一一锁死——顺序性→循序渐进，阶段性→分阶段(忌一刀切/成人化)，不平衡性→抓关键期，互补性→扬长避短，差异性→因材施教/长善救失。口诀“不断补顺差”。"},
 {n:17,cat:"人的发展",q:"简述影响人身心发展的因素及其各自地位",a:"（1）遗传，是个体身心发展的前提、基础，为个体的发展提供了可能性。\n（2）环境，是个体身心发展的外部条件，为个体发展提供了多种可能、把可能变为现实。\n（3）学校教育，在个体身心发展中起主导作用。\n（4）主观能动性，是个体身心发展的内部动力，起决定性作用。",mn:"教主怀（环）疑",x:"· 为什么：四因素地位的差别在于各自“能管到什么”——遗传只给可能性，环境把可能变现实，学校教育有目的有计划所以最强力，主观能动性是人自己动起来，故说它最终起决定。\n· 根源：遗传/环境/学校教育/主观能动性是教育学影响人发展因素的经典四分框架，地位措辞是固定答案，不能换字。\n· 对比：地位极易混，逐字记牢——遗传“前提/基础/可能性”，环境“外部条件/把可能变现实”，学校教育“主导作用”，主观能动性“内部动力/决定作用”。口诀“教主怀疑”。"},
 {n:18,cat:"人的发展",q:"简述环境对人的发展的影响表现在哪些方面",a:"（1）环境为人的发展提供了条件和可能性。\n（2）环境对人的影响有自发的和自觉的，有积极的和消极的。\n（3）环境对人的影响具有个体差异性，也与个体的发展水平有关。",mn:"几个条件",x:"· 为什么：环境比遗传更进一步，它把“可能”推向“现实”，但它不像学校教育那样有目的，所以影响是自发与自觉、积极与消极并存，好坏都有。\n· 对比：和遗传比，遗传只是“提供可能”，环境是“把可能变现实”；和学校教育比，环境影响杂乱无方向，学校教育才是有目的有计划的提纯版。\n· 根源：环境作为四因素之一，地位是“外部条件”，这是理解本题三点的总纲。"},
 {n:19,cat:"人的发展",q:"简述实践活动对人的发展的作用表现在哪些方面？",a:"（1）人通过实践活动得以发展。\n（2）实践活动是使人的潜在的、可能的因素转化为现实性的力量。\n（3）实践活动对人的发展的有效影响取决于活动的组织程度和人的自觉性。",mn:"自觉实现",x:"· 为什么：人不是被动被影响的容器，潜能只有在“做”当中才能兑现，所以实践是把可能因素转化为现实力量的关键一步。\n· 对比：和“环境”作用对照——环境是外部给条件，实践是人主动去做；实践效果还取决于活动的组织程度和人的自觉性，呼应主观能动性的决定作用。\n· 根源：这与马克思主义“实践是人发展的基础”的观点一脉相承，是该题的理论底子。"},
 {n:20,cat:"人的发展",q:"简述学校教育发挥主导作用的原因",a:"（1）学校教育是有目的、有计划、有组织地培养人的活动。\n（2）学校教育是通过受过专门训练的教师来进行的，相对而言效果较好。\n（3）学校教育能有效地控制、影响学生发展的各种因素。\n（4）学校教育给人的影响比较全面、系统和深刻。",mn:"三有教师，全面控制",x:"· 为什么：四条原因其实是在和“自发环境”作对比说明学校强在哪——它有目的有计划(方向明)、有专业教师(质量高)、能控制各种影响因素(可提纯)、影响全面系统深刻(更管用)，所以才“主导”。\n· 对比：注意区分本题(为何起主导/原因)与“主导作用的表现”(规范方向、加速发展、即时延时价值、开发个性)，两题答案不同，常被混问。口诀“三有教师，全面控制”。"},
 {n:21,cat:"人的发展",q:"简述学校教育在人的发展中起主导作用的表现",a:"（1）学校教育按社会对个体的基本要求对个体发展方向做出社会性规范。\n（2）学校教育具有加速个体发展的特殊功能。\n（3）学校教育，尤其是基础教育对个体发展的影响具有即时和延时的价值。\n（4）学校教育具有开发个体特殊才能和发展个性的功能。",mn:"严规范、塑个性",x:"· 为什么：原因讲“学校凭什么能主导”，表现讲“主导具体落在哪”——规范发展方向、加速个体发展、产生即时与延时价值、开发特殊才能与个性，是主导作用看得见的四个落点。\n· 对比：与第20题(原因:三有、专业教师、可控、全面)是一对孪生易混题，原因答“凭什么”，表现答“做到了什么”，切勿张冠李戴。口诀“严规范、塑个性”。"},
 {n:22,cat:"人的发展",q:"简述学校教育在人的身心发展中发挥主导作用的条件",a:"（1）受教育者的主观能动性。\n（2）教育的自身状况。\n（3）家庭环境的效应。\n（4）社会发展状况。",mn:"学生、家校社",x:"· 为什么：学校教育主导是“有条件的主导”而非万能，再好的教育也要学生肯动(主观能动性)、教育本身过硬、家庭和社会配合，缺一就打折扣，所以四个条件本质是主导作用的“前提清单”。\n· 对比：本题(发挥主导的条件)易与第20题(主导的原因)混——原因是“为何能主导”，条件是“主导要靠什么才成立”。口诀“学生、家校社”。"},
 {n:23,cat:"教育目的",q:"简述教育目的及其功能",a:"教育目的是国家对培养什么人的总体期待，即国家对各级各类学校培养人才的质量和规\n格的总体要求。\n其功能包括：（1）定向作用（导向作用）。\n（2）调控作用（控制作用）。\n（3）激励作用。\n（4）评价作用。\n（5）选择作用。",mn:"想挑选鸡架",x:"· 为什么：教育目的是整个教育活动的出发点和归宿，所以它的功能都围绕\"指挥棒\"展开——先定向（指明培养方向），再调控（约束课程、教法不跑偏），过程中激励师生朝目标努力，最后用它评价和选择是否达标。五个功能其实是\"事前-事中-事后\"一条链。\n· 对比：注意教育目的（国家层面，最宏观）→培养目标（各级各类学校层面）→课程目标→教学目标（课堂层面，最具体），层层具体化，别和\"教学目标\"混。\n· 记忆钩子：口诀\"想挑选鸡架\"=导向、选择、激励、调控、评价。"},
 {n:24,cat:"教育目的",q:"简述我国的教育目的及基本要求",a:"我国的教育目的：教育必须为社会主义现代化建设服务、为人民服务，必须与生产劳动\n和社会实践相结合，培养德、智、体、美、劳全面发展的社会主义事业的建设者和接班人。\n其基本要求包括：\n（1）坚持人才培养的社会主义性质。\n（2）培养德智体美劳全面发展的人才。\n（3）坚持教育与生产劳动和社会实践相结合。\n（4）根据不同时期社会发展的要求，突出强调某些方面的素质。\n（5）坚持发展人的独立个性。",mn:"不同社会，全面生产个性",x:"· 为什么：我国教育目的的核心是\"培养什么人、为谁培养人\"。\"为社会主义服务\"定性质（解决为谁），\"与生产劳动结合\"定途径，\"德智体美劳全面发展\"定规格，\"建设者和接班人\"定身份，五条基本要求正是从这几个角度展开。\n· 根源：理论基础是马克思主义关于人的全面发展学说；\"教育与生产劳动相结合\"被认为是实现人全面发展的唯一途径，所以它既出现在目的表述里，也出现在基本要求里。\n· 对比：\"突出强调某些方面素质\"体现时代性（如新时代强调劳动、创新），说明教育目的不是僵死的，会随社会需要调整。"},
 {n:25,cat:"教育目的",q:"简述教育目的的确立依据",a:"（1）主观依据：哲学观念、人性假设、理想人格等观念和价值取向。\n（2）客观依据：\n①社会生产力和科学技术发展水平。\n②一定的社会经济和政治制度。\n③社会历史发展的进程。\n④受教育者身心发展的规律。",mn:"",x:"· 为什么：确立教育目的本质是\"主观价值取向\"与\"客观社会现实\"的结合。主观依据回答\"我们想培养什么样的人\"（哲学观、人性观、理想人格）；客观依据回答\"社会和人允许我们培养什么样的人\"——生产力决定能办什么样的教育，政治经济决定教育为谁服务，受教育者身心规律决定培养必须可行。\n· 对比：教育目的的两大流派正源于侧重点不同——只看个人需要是个人本位论（卢梭、福禄贝尔），只看社会需要是社会本位论（涂尔干、赫尔巴特）；科学的做法是主客观依据兼顾。"},
 {n:26,cat:"教育目的",q:"简述全面发展教育各组成部分之间的关系",a:"全面发展教育包括德育、智育、体育、美育、劳动教育等。它们不能相互替代，各有特\n定的内涵、任务和功能，对社会发展和个体发展的价值都各不相同。\n（1）德育在全面发展教育中是灵魂与统帅，起着保证方向和保持动力的作用。\n（2）智育在全面发展教育中起着前提和支持作用。\n（3）体育是全面发展教育的重要物质基础。\n（4）美育在全面发展教育中起着动力作用。\n（5）劳动教育具有树德、增智、强体、育美的综合育人价值。",mn:"",x:"· 为什么：五育各管一个维度且不能互相替代，但又统一于\"全面发展的人\"这一目标。德育管方向（解决\"往哪走\"），所以是灵魂统帅；智育给知识，是其他各育的认知前提；体育给健康的身体，是一切活动的物质基础；美育以情动人，提供精神动力；劳动教育在做中育人，能反过来树德、增智、强体、育美，具有综合价值。\n· 对比：抓\"德育是灵魂统帅\"与\"体育是物质基础\"两个最常考的定位，一个管精神方向、一个管身体载体，最易区分。"},
 {n:27,cat:"教育目的",q:"简述德育的意义或作用",a:"（1）德育是保证学校坚持党的领导的坚强阵地。\n（2）德育是培养担当民族复兴大任的时代新人的基本要求。\n（3）德育对于促进学生德智体美劳全面发展具有重要意义。",mn:"",x:"· 为什么：德育在五育中是灵魂统帅，所以它的意义都指向\"方向和根本\"——对学校是坚持党的领导的阵地（政治方向），对国家是培养时代新人的要求（人才方向），对学生是保证德智体美劳全面发展（个人方向）。三条由大到小，从学校、国家到学生，正好对应德育\"管方向\"的本质。\n· 记忆钩子：抓住一个关键词\"方向\"，三条都是不同层面的方向保证。"},
 {n:28,cat:"教育目的",q:"简述德育的目标及内容",a:"理想信念教育；社会主义核心价值观教育；中华优秀传统文化教育；爱国主义、\n集体主义、社会主义教育；社会主义法治教育；品德修养教育；生态文明教育；心理健康教\n育。",mn:"终生心理健康，爱法德 / 思政得民心",x:"· 为什么：德育内容回答\"教学生什么样的品德\"，逻辑上是\"由高到低、由内到外\"——先立理想信念（最高层），再到社会主义核心价值观、传统文化、爱国主义等价值认同，再到法治这种行为底线，最后落到品德修养、生态、心理健康等个人养成。本质是把国家要求转化为学生内在素质。\n· 根源：这套内容对应国家教育方针和\"立德树人\"根本任务，紧扣社会主义核心价值观，不是随意罗列。\n· 记忆钩子：口诀\"思政得民心\"帮助串联。"},
 {n:29,cat:"教育目的",q:"简述体育的意义或作用",a:"（1）促进学生身心健康、体魄强健。\n（2）促进学生综合素质发展。\n（3）为德育、智育、美育、劳动教育奠定基础。",mn:"",x:"· 为什么：体育在五育中是\"物质基础\"，所以它的意义层层递进——先直接管身体（身心健康、体魄强健），再带动综合素质（意志、协作等），最后为德智美劳奠定基础（没有健康的身体，其他各育都无从谈起）。三条正是\"基础\"地位的体现。\n· 对比：和美育意义对比记——体育管\"身体载体\"，美育管\"精神动力\"，定位不同。"},
 {n:30,cat:"教育目的",q:"简述体育的目标及内容",a:"（1）体育的目标\n①使学生掌握与运用体能和运动技能，提高运动能力。\n②使学生学会运用健康与安全的知识与技能，形成健康的生活方式。\n③促进学生积极参与体育活动，养成良好的体育品德。\n（2）体育的内容：基本运动技能、体能、健康教育、专项运动技能、跨学科主题学习。",mn:"积极能健康 / 专夸健体技",x:"· 为什么：体育目标紧扣\"会动、会健康、爱运动\"三件事——掌握运动技能（能力层）、学会健康生活方式（认知层）、养成体育品德（情感态度层），恰好是技能、知识、态度三维。内容则是把这些目标拆成可教的板块：体能、基本与专项运动技能、健康教育、跨学科学习。\n· 记忆钩子：目标记\"积极能健康\"，内容记\"专夸健体技\"。"},
 {n:31,cat:"教育目的",q:"简述体育的实施途径",a:"（1）以体育与健康课为主要载体的体育教学。\n（2）早操、课间操以及课后体育运动等体育活动。\n（3）以专项运动技能为内容，以体育兴趣小组、社团和俱乐部为组织形式的体育训练。\n（4）形式多样的体育展示或体育比赛。",mn:"体操比赛训练",x:"· 为什么：体育实施途径覆盖\"课内—课间—课后—展示\"全链条：体育课是主渠道（系统教学），早操课间操是日常保底，兴趣小组俱乐部是兴趣进阶训练，比赛展示是检验和激励。本质是\"教—练—赛\"一体化，光上课不够，必须有日常活动和比赛巩固。\n· 记忆钩子：口诀\"体操比赛训练\"——体育课、操、比赛、训练。"},
 {n:32,cat:"教育目的",q:"简述美育的意义或作用",a:"（1）美育有助于扩大学生的知识视野，发展学生的智力和创新精神。\n（2）美育有助于净化心灵、培养高尚的道德情操。\n（3）美育有助于促进学生身心健康发展，对体育有重要的促进作用。\n（4）美育有助于学生培养和形成正确的劳动观念和积极的劳动精神。",mn:"",x:"· 为什么：美育是以美育人，所以它对其他各育都有\"渗透促进\"作用——开阔视野促智育，净化心灵促德育，身心愉悦促体育，端正态度促劳育。四条本质是美育作为\"动力\"作用的具体展开，说明美育不是孤立的，而是带动全面发展。\n· 对比：和德育意义区分——德育是直接\"管方向\"的统帅，美育是\"以情感人、间接促进\"的动力。"},
 {n:33,cat:"教育目的",q:"简述美育的目标及内容",a:"（1）美育的目标：①提高学生的审美感知能力。②发展学生的审美表现能力。③培养\n学生的审美创意能力。④培育学生的审美理解能力。\n（2）美育的内容：艺术美、社会美、科学美、自然美。",mn:"知县一姐 / 一科会然",x:"· 为什么：美育目标围绕审美能力的递进展开——先能感知美（输入），再能理解美（内化），进而能表现和创造美（输出），是\"感知—理解—表现—创造\"由浅入深的认知链。内容则是美的来源分类：艺术美、社会美、科学美、自然美。\n· 记忆钩子：目标记\"知县一姐\"（感知、表现、创意、理解），内容记\"一科会然\"（艺术、科学、社会、自然）。"},
 {n:34,cat:"教育目的",q:"简述美育的实施途径",a:"（1）通过各科教学和课外文艺活动实施美育。\n（2）通过大自然实施美育。\n（3）通过日常生活实施美育。",mn:"教生字",x:"· 为什么：美无处不在，所以美育途径就是\"把审美渗透进各种场景\"——课堂教学和文艺活动是主阵地（有组织的美），大自然是天然的美，日常生活是身边的美。三条本质是按美的来源场景划分，体现美育的渗透性和广泛性。\n· 记忆钩子：口诀\"教生字\"——教学、生活、大自然。"},
 {n:35,cat:"教育目的",q:"简述劳动教育的意义或作用",a:"（1）劳动教育是新时代党对教育的新要求。\n（2）劳动教育是全面发展教育体系的重要内容。\n（3）劳动教育是学生成长的必要途径。",mn:"全党是学生",x:"· 为什么：劳动教育意义的三条由大到小——是党的新要求（政策层面/为什么要重视），是全面发展教育体系的重要内容（地位层面/它是五育之一），是学生成长的必要途径（个人层面/对学生的价值）。本质是回答\"劳动教育为什么从被忽视到被纳入五育\"。\n· 根源：呼应新时代党的教育方针把\"劳\"正式纳入培养目标，劳动教育地位被显著提升。\n· 记忆钩子：口诀\"全党是学生\"。"},
 {n:36,cat:"教育目的",q:"简述劳动教育的目标及内容",a:"（1）劳动教育的目标：①树立正确的劳动观念。②具有必备的劳动能力。③培育积极的劳动精\n神。④养成良好的劳动习惯和品质。\n（2）劳动教育的内容：日常生活劳动、生产劳动、服务性劳动。",mn:"能观戏精",x:"· 为什么：劳动教育目标紧扣\"观念—能力—精神—习惯\"四维度，本质是从思想到行动的完整培养链——先树立正确劳动观念（思想），再具备劳动能力（本领），培育劳动精神（态度），最后养成习惯品质（落地）。内容按劳动场景分为日常生活劳动、生产劳动、服务性劳动三类。\n· 记忆钩子：目标记\"能观戏精\"（能力、观念、习惯、精神）。"},
 {n:37,cat:"教育目的",q:"简述劳动教育的实施途径",a:"（1）独立开设劳动教育必修课。\n（2）在学科专业中有机渗透劳动教育。\n（3）在课外校外活动中安排劳动实践。\n（4）在校园文化建设中强化劳动文化。",mn:"外修文科",x:"· 为什么：劳动教育途径采用\"必修课为主+多渠道渗透\"——独立开设必修课是主阵地（保证系统性），学科渗透、课外校外实践、校园文化强化是辅助渗透。本质是\"一主多辅\"，既保证劳动教育有固定阵地，又让它融入学校生活方方面面。\n· 记忆钩子：口诀\"外修文科\"——课外、必修课、文化、学科。"},
 {n:38,cat:"教育目的",q:"简述素质教育的基本内涵",a:"（1）素质教育以提高国民素质为目的（根本宗旨）。\n（2）素质教育是面向全体学生的教育。\n（3）素质教育具有全面性、主体性和可持续性。（素质教育是促进学生全面发展的教育。）\n（4）素质教育是促进学生个性发展的教育。\n（5）素质教育要着力提高学生的社会责任感、创新精神和社会实践能力（素质教育以培养学生创\n新精神和实践能力为重点）。",mn:"提速个性创两全",x:"· 为什么：素质教育内涵围绕\"对谁、为什么、培养什么\"展开——以提高国民素质为根本宗旨（为什么），面向全体学生（对谁，区别于精英/应试教育），促进全面发展和个性发展（培养什么），以创新精神和实践能力为重点（核心）。五条本质是从宗旨、对象到内容、重点的完整界定。\n· 根源：依据1999年《关于深化教育改革全面推进素质教育的决定》，\"创新精神和实践能力\"是其灵魂和时代重点。\n· 记忆钩子：口诀\"提速个性创两全\"。"},
 {n:39,cat:"教育目的",q:"简述素质教育的基本特点",a:"（1）素质教育对象的全体性。\n（2）素质教育内容的基础性。\n（3）素质教育空间的开放性。\n（4）素质教育目标的全面性。\n（5）素质教育价值的多元化。",mn:"两全多开机",x:"· 为什么：素质教育特点是其内涵的进一步展开——对象全体性（面向所有人）、内容基础性（打基础而非搞专精）、空间开放性（不局限于课堂）、目标全面性（五育并举）、价值多元化（承认差异、不唯分数）。本质都在反对\"面向少数、应试至上\"的传统教育。\n· 对比：内涵讲\"是什么\"，特点讲\"有何特征\"，二者高度对应，可对照记忆。\n· 记忆钩子：口诀\"两全多开机\"。"},
 {n:40,cat:"学校与制度",q:"简述现代学校的基本职能",a:"（1）提高学习者素质。\n（2）培养现代社会的劳动者和各级各类专门人才。\n（3）传承与创新文化。\n（4）开展科学研究。\n（5）提供社会服务。\n（6）促进教育的国际交流与合作。",mn:"国际提供文科素材",x:"· 为什么：学校最初只为“育人”，但现代社会把更多功能压给学校——除提高素质、培养人才外，还要传承创新文化、搞科研、做社会服务、促国际交流，越往高层级(大学)这些职能越突出。\n· 对比：这六项是“现代学校”职能，比传统学校单纯“教学育人”扩展了文化、科研、服务、国际四块，记住“扩展”这个关键词。口诀“国际提供文科素材”。"},
 {n:41,cat:"学校与制度",q:"简述我国现行的学校教育制度",a:"（1）学校层级和类别制度。\n（2）学校入学和修业年限制度。\n（3）学校办学制度。\n（4）学校管理制度。",mn:"办理入籍",x:"· 为什么：学制不是凭空设的，要回答四个现实问题——分几层几类(层级类别)、几岁入学读几年(入学修业年限)、谁来办学(办学)、怎么管(管理)，四项合起来才是完整的制度骨架。\n· 对比：本题是“我国现行学制的内容(结构)”，勿与第42题(影响学制的因素)、第43题(学制改革趋势)混淆，三题环环相扣但问的角度不同。口诀“办理入籍”。"},
 {n:42,cat:"学校与制度",q:"简述影响教育制度的因素",a:"（1）社会政治制度。\n（2）社会经济发展水平和科技发展状况。\n（3）人口发展状况。\n（4）青少年儿童身心发展规律。\n（5）本国学制的历史发展和外国学制的影响。\n（6）民族文化和教育传统。",mn:"社会 + 人 + 学制",x:"· 为什么：学制要同时迁就“社会需要”和“人的成长规律”——政治经济科技定方向和水平、人口定规模、青少年身心规律定学段划分，再加上本国历史传统和外国经验，所以学制是社会与人双重制约的产物。\n· 对比：本题(影响学制的因素)与教育目的确立依据思路相通(都看社会+人),但落点是“制度安排”;勿与第43题(改革趋势)混。口诀“社会+人+学制”。"},
 {n:43,cat:"学校与制度",q:"简述世界范围内学校教育制度改革的趋势",a:"（1）努力推进学前教育大发展。\n（2）义务教育年限不断延长，质量不断提高。\n（3）高中阶段教育继续多样化发展。\n（4）高等教育更具开放性和创新性发展。\n（5）建构终身教育体系。",mn:"",x:"· 为什么：趋势的内在逻辑是“两头延伸、中间多样、终身贯通”——学前往前推、义务教育往长延、高中走多样化、高等走开放创新，最后用终身教育体系把各段串起来，整体是教育向全龄段铺开。\n· 对比：这是“世界范围学制改革趋势”,与第8题“当代世界教育发展趋势”(全民/现代/国际/终身/信息化)不同,本题专谈“学校制度”。"},
 {n:44,cat:"课程",q:"简述校本课程开发的基本理念",a:"（1）以“学生为本”的课程理念。\n（2）“决策分享”的民主理念。\n（3）全员参与的合作精神。\n（4）教育公平的理念。\n（5）个性化是校本课程开发的价值追求。\n（6）校本课程是国家课程的补充。",mn:"学生的本性是参与分工",x:"· 为什么：校本课程是学校自己开发的，所以核心立场必然落在“本校学生”身上——以学生为本是出发点，个性化是落脚点，二者一头一尾。\n· 为什么：决策分享、全员参与、教育公平这几条，本质都在强调“谁来开发”——不是校长一人拍板，而是教师、学生、家长共同民主参与，这正是校本(school-based)区别于国家课程的关键。\n· 对比：记住校本课程的定位是“国家课程的补充”，三级课程管理中它最灵活，但绝不能替代国家课程的主体地位。"},
 {n:45,cat:"课程",q:"简述学生中心主义（经验主义）课程理论的主要观点",a:"（1）课程应以儿童的活动为中心。\n（2）课程的组织应心理学化。\n（3）课程要考虑到儿童的需要与兴趣，从儿童的经验出发设计课程。",mn:"心理需要活动",x:"· 为什么：三条要点其实是一根线——既然主张以儿童为中心，那课程内容就要顺着儿童的活动、兴趣、经验来，组织上就必须“心理学化”(按学生心理顺序而非学科逻辑顺序排)。\n· 根源：该流派代表人物是杜威，主张“儿童中心”“做中学”“经验改造”，又称经验主义/活动课程论。\n· 对比：与学科中心论(布鲁纳/赫尔巴特，重学科逻辑)、社会中心论(重社会改造)三足鼎立；学科论按知识逻辑排，本派按心理顺序排，正好相反。"},
 {n:46,cat:"课程",q:"简述社会中心主义（改造主义）课程理论的主要观点",a:"（1）教育应该以“改造社会”为目标。\n（2）重视培养“社会一致”的精神。\n（3）培养学生的公民意识和民主意识。\n（4）学校课程应以建立新的社会秩序为方向。",mn:"造一个公职",x:"· 为什么：本派把“社会问题”当成课程的轴心——既然目标是改造社会、建立新秩序，那内容自然要培养社会一致精神、公民意识和民主意识，一切围着社会需要转，而非围着学科或儿童。\n· 根源：社会改造主义课程论代表人物是布拉梅尔德(Brameld)，又称社会中心课程论。\n· 对比：学生中心论问“儿童要什么”，学科中心论问“知识是什么”，社会中心论问“社会需要什么”——抓住三个不同的“中心”就不会混。"},
 {n:47,cat:"课程",q:"简述教科书的作用",a:"（1）教科书是学生学习的主要来源。\n（2）教科书是教师教学的主要依据。\n（3）教科书是课程计划具体实施的载体。\n（4）教科书是理论与实际相联系的基本途径和最佳方式。",mn:"师生实施理论",x:"· 为什么：四条作用其实分给三个对象——对学生是主要学习来源，对教师是主要教学依据，对课程是计划落地的载体，最后落到“连接理论与实际”。教科书是课程计划最具体、最物化的体现，所以它同时服务教、学、用三方。\n· 对比：注意区分课程计划、课程标准、教科书三者的关系：计划是宏观框架、标准是学科纲领、教科书是标准的具体展开，教科书处在最末端、最具体的一环。"},
 {n:48,cat:"课程",q:"简述教科书的编写应遵循的基本原则与要求",a:"（1）按照不同学科的特点，体现科学性与思想性。\n（2）强调内容的基础性。\n（3）适用性。\n（4）合理体现各科知识的逻辑顺序和受教育者学习的心理顺序。\n（5）兼顾同一年级各门学科内容之间的关系和同一学科各年级教材之间的衔接。",mn:"贤婿是柯基",x:"· 为什么：编写教科书要同时照顾“知识本身”和“学的人”——科学性思想性管内容对不对、基础性管选什么、适用性管好不好用；而“逻辑顺序+心理顺序”正对应学科逻辑与学生认知两条线，必须并轨。\n· 对比：最后两条容易混——一条讲“纵向”(同一学科各年级教材的衔接)，一条讲“横向”(同一年级各学科内容的关系)，一纵一横，配套记。"},
 {n:49,cat:"课程",q:"简述影响课程实施的因素",a:"（1）课程计划本身的特点。\n（2）教师的特征。\n（3）学校的特点。\n（4）校外环境。",mn:"校外教学记",x:"· 为什么：课程从纸面落到课堂，要过四道关——课程方案本身好不好用(计划特点)、谁来执行(教师)、在哪执行(学校)、外部支不支持(校外环境)。本质是“方案—人—环境”由内到外层层放大的影响链。\n· 对比：四因素里教师是最关键的能动因素，再好的方案也要教师认同并有能力实施才能落地，这也是课程实施常考的落脚点。"},
 {n:50,cat:"课程",q:"简述古德莱德提出的课程实施的层次",a:"课程实施的层次：\n（1）观念层次的课程。\n（2）社会层次的课程。\n（3）学校层次的课程。\n（4）教学层次的课程。\n（5）体验层次的课程。\n古德莱德提出的课程类型：\n（1）理想的课程。\n（2）正式的课程。\n（3）领悟的课程。\n（4）运作的课程。\n（5）经验的课程。",mn:"体校教年会 / 验孕了，想领证",x:"· 为什么：五个层次是课程“从理念走向体验”的传递链——观念里想的→社会(国家/专家)认可的→学校定下的→课堂教的→学生实际体验到的，越往后越具体、越接近学生真实所得，且每一步都会有“衰减”。\n· 根源：课程的五种层次与五种类型均由古德莱德(Goodlad)提出。两套名称一一对应：理想的(观念)、正式的(社会)、领悟的(学校/教师理解)、运作的(教学)、经验的(体验)。\n· 对比：易混点在“领悟”与“运作”——领悟是教师心里怎么理解，运作是课堂上实际怎么教，理解≠执行，二者常有落差。"},
 {n:51,cat:"课程",q:"简述课程资源的开发途径",a:"（1）充分利用校内资源。\n（2）充分利用校外课程资源。\n（3）充分利用社区资源。\n（4）充分利用生活资源。",mn:"内外生蛆",x:"· 为什么：四条按“空间由内到外”排——校内→校外→社区→生活，本质是提醒课程资源无处不在，不能只盯着教科书和校内设施，要善于把社会与生活也纳入课程。\n· 对比：注意区分课程资源的两种分类视角：本题按“来源/空间”分(校内外社区生活)；另有按性质分的素材性资源与条件性资源，别张冠李戴。"},
 {n:52,cat:"课程",q:"简述新课程改革的具体目标",a:"（1）实现课程功能的转变。\n（2）体现课程结构的均衡性、综合性和选择性。\n（3）密切课程内容与生活和时代的联系。\n（4）改善学生的学习方式。\n（5）建立与素质教育理念相一致的评价与考试制度。\n（6）实行国家、地方、学校三级课程管理制度。",mn:"方平的关节有内功",x:"· 为什么：六条目标对应六个“改什么”——功能、结构、内容、方式、评价、管理，几乎覆盖课程的全链条，本质是把过去“知识本位、学科本位、统得过死”的旧课程逐项纠偏。\n· 根源：出自第八次基础教育课程改革(2001年起)。其中“三级课程管理”即国家、地方、学校三级，正是校本课程的制度来源。\n· 对比：“功能转变”是首要目标(从单纯传授知识转向促进学生全面发展)，是六条的统领，常作为重点考点。"},
 {n:53,cat:"课程",q:"简述小组合作学习的基本要素",a:"（1）组间同质，组内异质。\n（2）设立小组目标。\n（3）实施小组评价与奖励的机制。\n（4）个人责任的明确。\n（5）均等的成功机会。",mn:"人机成功内幕",x:"· 为什么：合作学习要真“合作”而非“凑一起”，五要素正是防止“搭便车”的设计——分组要组间同质保证公平竞争、组内异质保证互助；共同目标+小组评价绑定大家利益；个人责任明确防止偷懒；均等成功机会让弱生也有贡献。\n· 对比：核心抓“积极互赖+个人担责”——既要荣辱与共(小组奖励)，又要人人有责(个人责任)，缺一不可，这是合作学习区别于普通分组的本质。"},
 {n:54,cat:"课程",q:"简述第八次课程改革的价值追求",a:"（1）教育公平。\n（2）国际团结与合作。\n（3）回归生活世界。\n（4）关爱自然。\n（5）个性发展。\n（6）发展技术素养。",mn:"几个公关合声",x:"· 为什么：六条价值追求是新课改的“理想图景”——既要对内公平、促个性发展，又要对外回归生活、关爱自然、走向国际合作，还要顺应时代提升技术素养，本质是从“育分”转向“育人”、从封闭转向开放。\n· 根源：出自第八次基础教育课程改革。注意它讲的是改革背后的“价值取向”，与第52题的“具体目标”是两个层面：一个是为什么改的理念，一个是改成什么样的指标。"},
 {n:55,cat:"课程",q:"简述新课改背景下的学生观",a:"（1）学生是发展中的人。\n（2）学生是独特的人。\n（3）学生是具有独立意义的人。",mn:"两独一发",x:"· 为什么：三句话各管一面——“发展中的人”强调用动态、宽容的眼光看待学生(允许犯错、有潜力)；“独特的人”强调因材施教(每个人不一样)；“独立意义的人”强调学生是独立主体、不以教师意志为转移。\n· 根源：出自新课改“以人为本”的学生观。\n· 对比：易混“独特”与“独立”——独特讲“与他人不同”(差异性)，独立讲“不依附于教师”(主体性)，一个横比、一个自立。"},
 {n:56,cat:"课程",q:"简述新课改背景下的教师观",a:"（1）教师角色的转变\n①从教师与学生的关系看，教师应该是学生学习的促进者。\n②从教学与研究的关系看，教师应该是教育教学的研究者。\n③从教学与课程的关系看，教师应该是课程的建设者和开发者。\n④从学校与社区的关系看，教师应该是社区型开放的教师。\n（2）教师行为的转变\n①在对待师生关系上，强调尊重、赞赏。\n②在对待教学关系上，强调帮助、引导。\n③在对待自我上，强调反思。\n④在对待与其他教育者的关系上，强调合作。",mn:"见醋放盐 / 赞助盒饭",x:"· 为什么：角色转变四条按“关系”展开——师生关系(促进者)、教研关系(研究者)、课程关系(建设开发者)、校社关系(开放型)，本质是教师从“传声筒”升级为“引路人+研究者+课程主人”。\n· 根源：出自新课改教师观。其中“课程的建设者和开发者”正与三级课程管理、校本课程开发相呼应。\n· 对比：行为转变四条对应四种关系——对学生(尊重赞赏)、对教学(帮助引导)、对自我(反思)、对同行(合作)，与角色四条配套记，别混。"},
 {n:57,cat:"课程",q:"简述新课改背景下的教学观",a:"（1）教学是课程创生和开发的过程。\n（2）教学是师生交往、互动、共同发展的过程。\n（3）教学过程重于教学结果。\n（4）教学更关注的是人而不是学科。",mn:"生动过人",x:"· 为什么：四句话都在反“旧教学观”——旧观点认为教学是执行教材(故强调创生)、教师单向灌输(故强调师生互动)、只看分数(故强调过程)、以学科为本(故强调以人为本)。抓住每条都是对一个旧弊的纠正就好记。\n· 根源：出自新课改教学观。\n· 对比：“过程重于结果”不是否定结果，而是强调在过程中促进学生发展；“关注人而非学科”也不是不要学科，而是学科服务于人。"},
 {n:58,cat:"课程",q:"简述新课改背景下的评价观",a:"新课程改革所倡导的评价是发展性评价，表现为：\n（1）评价的根本目的在于促进发展。\n（2）体现最新的教育观念和课程评价发展的趋势。\n（3）评价内容综合化。\n（4）评价标准分层化。\n（5）评价方式多样化。\n（6）评价主体多元化。\n（7）关注发展过程。",mn:"内母猪过重，方去膘",x:"· 为什么：新课改主张“发展性评价”，所以一切围着“促进发展”这个根本目的转——内容综合化(不只看分数)、标准分层化(不一刀切)、方式多样化(不只考试)、主体多元化(不只老师评)、关注过程(不只看结果)，每条都是对“一张试卷定终身”的纠偏。\n· 根源：出自新课改评价观。\n· 对比：与传统评价的最大区别在功能——传统重“甄别选拔”(给学生排队定级)，发展性评价重“激励改进”(帮学生成长)，这是答题时最该点出的对立。"},
 {n:59,cat:"课程",q:"简述当代世界课程改革的趋势",a:"（1）在课程政策上，谋求国家课程开发与地方课程、校本课程开发的统一。\n（2）在课程内容上，既引进符合信息时代要求的高科技知识，又把学习者的个人知识作为\n课程内容的有机构成。\n（3）提倡多样化的课程结构。\n（4）重视课程实施研究和教师进修。\n（5）提高课程改革的科学水平，设立课程改革的专家咨询机构。",mn:"政改是内购",x:"· 为什么：五条覆盖课改的五个维度——政策(国家与校本统一)、内容(高科技知识+个人知识)、结构(多样化)、实施(重研究与教师进修)、保障(专家咨询机构)，本质是世界范围内课程改革“既要科学规范、又要灵活校本”的共同走向。\n· 对比：注意“当代世界课程改革趋势”(本题)与“我国新课改具体目标”(第52题)易混——前者是国际共性趋势，后者是中国的具体做法；但“国家+地方+校本统一”这条在两者中相通，是中外共识。"},
 {n:60,cat:"教育目的",q:"简述教学的内涵。教学是学校进行全面发展教育的基本途径，是教师教、学生学两方面活动的统一。具体表现为：第一，教学以培养全面发展的人为根本目的。第二，教学由教师的教和学生的学两方面活动组成。第三，教学具有多种形态，是共性与多样性的统一。第四，学生的认识活动是教学中的重要组成部分",a:"简述教学的内涵。\n教学是学校进行全面发展教育的基本途径，是教师教、学生学两方面活动的统一。具体表现\n为：\n第一，教学以培养全面发展的人为根本目的。\n第二，教学由教师的教和学生的学两方面活动组成。\n第三，教学具有多种形态，是共性与多样性的统一。\n第四，学生的认识活动是教学中的重要组成部分。",mn:"",x:"· 为什么：教学的内涵抓住一个核心——它是\"教师教、学生学\"的双边统一活动。四点表现层层界定：根本目的是培养全面发展的人（为什么教），由教和学双方组成（谁来做），形态多样是共性与个性统一（怎么做），学生的认识活动是重要组成（核心在哪）。本质强调教学不是教师单方面灌输，而是师生双向互动。\n· 对比：注意\"教学\"范围大于\"智育\"——智育主要靠教学实现，但教学也承担德体美劳的任务，二者不能划等号。"},
 {n:61,cat:"教学",q:"简述教学与智育的关系",a:"教学和智育既有区别又有联系：\n（1）区别：智育是全面发展教育的组成部分，教学是教育活动的基本途径之一。\n（2）联系：智育主要是通过教学来进行的，智育的实现不仅可以通过教学，还可以通过课\n外活动、比赛活动、生产劳动、社会实践活动等。教学除了可以实现智育的目的外，还可以实\n现德育、体育、美育、劳动技术教育等目的。",mn:"",x:"· 为什么：教学是\"途径\"，智育是\"内容\"，两者属于不同范畴，所以既不能等同也不能割裂。智育主要靠教学实现，但教学的功能远不止智育——它同时承载德、体、美、劳；反过来智育也不只靠课堂，还能借课外活动、实践等实现，所以是\"交叉\"而非\"包含\"关系。\n· 对比：易错把\"教学=智育\"。记口诀：智育只是教学装的\"五育之一\"，教学这条路能通向五个目的地。"},
 {n:62,cat:"教学",q:"简述教学的作用（意义）。（重点背",a:"（统考）：\n（1）教学是促进学生全面发展的基本途径。\n（2）教学是提高学校教育质量的有效途径。\n（3）教学是推动社会发展的重要手段。",mn:"",x:"· 为什么：三点是从微观到宏观的递进——对学生(全面发展)、对学校(教育质量)、对社会(发展手段)。教学之所以是\"基本途径\"，是因为它有目的、有计划、有组织，效率最高，所以个体成长、学校立校、社会进步都最依赖它。\n· 对比：和\"教育的功能\"区分：这里专指\"教学\"这一活动的作用，落脚点都在\"途径/手段\"二字。"},
 {n:63,cat:"教学",q:"简述教学的基本任务（我国现阶段的教学任务）",a:"本：\n（1）培养学生良好的思想道德。\n（2）引导学生掌握基础知识和基本技能。\n（3）提高学生的身体健康水平。\n（4）培养学生良好的审美情趣。\n（5）使学生获得践行劳动教育的本领。\n（6）关注学生的个性发展。",mn:"",x:"· 为什么：教学任务本质就是\"全面发展教育\"在课堂里的落地，所以六条恰好对应德、智、体、美、劳加个性发展。智育(双基)是核心，但绝不能窄化为只教知识，故首尾用\"思想道德\"和\"个性发展\"把五育包起来。\n· 对比：注意\"双基\"=基础知识+基本技能，是我国教学任务的传统核心表述，别漏。"},
 {n:64,cat:"教学",q:"简述教学过程的本质及具体表现",a:"教学过程的本质是一种特殊的认识过程。\n具体表现：（1）间接性。（2）引导性。（3）简捷性。（4）教育性。（5）交往性。",mn:"健健引娇娇",x:"· 为什么：教学过程是\"特殊的认识过程\"——学生认识世界，但不是科学家式的从头探索，而是在教师引导下\"走捷径\"认识前人成果，所以才有间接性(学间接经验)、简捷性(不重复探索)、引导性(靠教师)、教育性(传知同时育人)、交往性(在师生互动中进行)。五个特点都是\"特殊\"二字的展开。\n· 根源：\"特殊认识论\"是我国教学论的主流观点，源于以认识论解释教学过程的传统。\n· 对比：\"间接性\"指学间接经验，别和\"简捷性\"(走捷径不绕路)混。"},
 {n:65,cat:"教学",q:"简述教学过程的基本规律",a:"（1）教师主导与学生主体相统一规律。\n（2）间接经验与直接经验相统一规律。\n（3）传授知识与思想教育相统一规律。\n（4）掌握知识与提高能力相统一规律。",mn:"舰长传教",x:"· 为什么：四条规律是教学中四对必须\"统一\"的矛盾：师生关系(主导VS主体)、经验来源(间接VS直接)、智育与德育(传知VS育人)、目的层次(掌握知识VS发展能力)。教学之所以高效又育人，关键就在于把这四对看似对立的东西辩证统一起来,任何一方偏废都会出问题。\n· 对比：\"传授知识与思想教育相统一\"即赫尔巴特的\"教育性教学\"——没有无教学的教育，也没有无教育的教学。"},
 {n:66,cat:"教学",q:"简述教学过程中应处理好的几对关系",a:"（1）间接经验和直接经验的关系。\n（2）掌握知识与培养思想品德的关系。\n（3）掌握知识与提高能力的关系。\n（4）智力因素和非智力因素的关系。\n（5）教师主导作用和学生主体作用的关系。",mn:"",x:"· 为什么：这\"几对关系\"其实是上一题四大规律的展开版，多了一对\"智力因素与非智力因素\"。处理好它们的共同逻辑是\"两手都要抓、不可偏废\"：只重直接经验会低效，只重知识会高分低能,只重智力会忽视动机情感。\n· 对比：与\"教学过程基本规律\"基本对应，区别在本题多了\"智力/非智力\"一对，答题时记得补上。"},
 {n:67,cat:"教学",q:"简述教学过程的结构（学生掌握知识的基本过程、教学过程的基本阶段）",a:"简述教学过程的结构（学生掌握知识的基本过程）。\n（1）引（激）发学习动机。\n（2）领会知识。包括感知教材和理解教材。\n（3）巩固知识。\n（4）运用知识。\n（5）检查知识。",mn:"机灵巩运茶 / 心知理，巩运评",x:"· 为什么：这是学生在课堂上掌握知识的完整链条——先\"想学\"(动机)，再\"学懂\"(领会)，然后\"记住\"(巩固)、\"会用\"(运用)、\"测准\"(检查)。顺序符合认识规律:没有动机学不进，不领会就无法巩固，不巩固无法运用。\n· 对比：核心环节\"领会知识\"=感知教材+理解教材，是中心环节，别只写\"领会\"两字。"},
 {n:68,cat:"教学",q:"简述教学原则的概念及制定依据",a:"教学原则是人们根据一定教学目的、遵循一定教学规律制订的指导教学工作的基本要求。\n制定依据：\n（1）教学原则受教育目的的制约。\n（2）教学原则是教学实践经验的概括和总结。\n（3）教学原则是教学规律的反映。",mn:"",x:"· 为什么：三条依据揭示教学原则\"从哪来\"——上承教育目的(为谁服务)，中据教学规律(客观必然)，下结实践经验(经验总结)。所以原则不是凭空规定，而是\"目的+规律+经验\"三者的结晶,这也解释了为何原则既有方向性又有可操作性。"},
 {n:69,cat:"教学",q:"简述中（小）学常用的教学原则",a:"（1）科学性与教育性（思想性）相结合的原则。\n（2）循序渐进原则。\n（3）因材施教原则。\n（4）伦理性原则。\n（5）理论联系实际原则。\n（6）直观性原则。\n（7）启发性原则。\n（8）巩固性原则。\n（9）量力性原则。",mn:"冯巩找阴凉，寻思理理直发",x:"· 为什么：这九条原则其实是教学规律的\"操作化\"——比如循序渐进对应顺序性规律,因材施教对应差异性规律,量力性对应身心发展水平。背时用口诀\"冯巩找阴凉,寻思理理直发\"串起九个。\n· 根源：多数原则有经典出处——循序渐进出自《学记》\"不陵节而施\",启发性出自孔子\"不愤不启,不悱不发\"与《学记》\"道而弗牵\",巩固性对应\"学而时习之\",直观性源于夸美纽斯。"},
 {n:70,cat:"教学",q:"简述科学性与教育性（思想性）相结合原则及其贯彻要求",a:"科学性与教育性（思想性）相结合原则是指既要把现代先进科学的基础知识和基本技能传授给学\n生，同时又要结合知识、技能中的德育因素，对学生进行政治、思想教育和道德品质教育。\n贯彻要求：\n（1）保证教学的科学性。\n（2）发掘教材的思想性，对学生进行品德教育。\n（3）教师要不断提高自己的专业水平和思想素质。\n（4）重视补充有价值的资料、事例或录像。",mn:"",x:"· 为什么：此原则就是\"教育性教学\"规律的具体落实——教知识(科学性)的同时必须育人(教育性)。四条要求按\"内容→挖掘→教师→资料\"展开：先保证知识本身正确,再从中挖德育因素,而这一切取决于教师自身水平,最后用素材辅助。\n· 根源：赫尔巴特首倡\"教育性教学\"——\"我想不到有任何无教学的教育\"。"},
 {n:71,cat:"教学",q:"简述循序渐进原则及其贯彻要求。循序渐进原则是指教学要按照科学知识内在的逻辑顺序和学生认识能力的发展顺序进行。贯彻要求：",a:"简述循序渐进原则及其贯彻要求。\n循序渐进原则是指教学要按照科学知识内在的逻辑顺序和学生认识能力的发展顺序进行。\n贯彻要求：\n（1）要了解学科知识和学生认识能力发展的顺序。\n（2）要坚持由近到远、由易到难、由浅入深、由简到繁地开展教学工作。\n（3）要打好基础，培养学生系统学习的良好习惯。\n（4）按教材的系统性进行教学。\n（5）抓主要矛盾，解决好重点与难点。\n（6）将系统连贯性与灵活多样性结合起来。",mn:"顺游习惯，教灵活重点",x:"· 为什么：\"循序\"指两条线——知识的逻辑顺序与学生认识能力的发展顺序,二者要同步推进。所以六条要求都围绕\"按顺序、打基础、循着教材系统又灵活\"展开,本质是尊重\"由浅入深、由易到难\"的认识规律。\n· 根源：出自《学记》\"不陵节而施之谓孙(逊)\",即不超越学生水平、按次序施教;朱熹也讲\"循序而渐进\"。"},
 {n:72,cat:"教学",q:"简述因材施教原则及其贯彻要求",a:"因材施教原则是指教师要从学生的实际出发，根据学生的个别差异，有的放矢地开展教学，使每\n个学生都能获得最优发展。\n贯彻要求：\n（1）要把握学生的学习特点，增强教学的针对性。\n（2）要把握学生的心智特点，增强教学育人的个性化。\n（3）要坚持课程计划和学科课程标准的统一要求。\n（4）了解学生，从实际出发进行教学。\n（5）善于发现学生的兴趣、爱好，为学生创造条件。",mn:"课程见解真行",x:"· 为什么：因材施教的根在\"差异性\"规律——人各不同,故须区别对待。五条要求扣住\"了解学生(学习特点+心智特点)→统一要求(课标不能丢)→发现兴趣\",核心是\"既看到差异,又守住底线统一要求\"。\n· 根源：源于孔子,《论语》载孔子对不同弟子\"闻斯行诸\"给出相反回答;朱熹概括为\"孔子施教,各因其材\"。"},
 {n:73,cat:"教学",q:"简述伦理性原则及其贯彻要求",a:"伦理性原则是指教师在教学过程中处理师生关系时，要遵循当代社会的伦理规范。教师要尊\n重学生，爱护学生，并通过以身垂范的言行赢得学生的尊重。\n贯彻要求：\n（1）教师要尊重学生的基本权利。\n（2）教师要尊重学生学习的基本自由和权利。\n（3）教师要正确对待学生的个性差异。",mn:"全自缢",x:"· 为什么：伦理性原则把\"师生关系\"上升到道德规范层面——教师以\"尊重\"为前提,靠言传身教赢得学生敬重。三条要求层层递进:尊重学生的基本权利→尊重其学习权利与自由→正确对待个性差异,核心就是\"尊重\"二字。\n· 对比：和\"教书育人\"不同,它强调的是\"师德\"在教学关系中的体现,落点在\"以身垂范\"。"},
 {n:74,cat:"教学",q:"简述理论联系实际原则（理论与实践相结合原则）及其贯彻要求",a:"理论联系实际原则是指教学要以学习基础知识为主导，将理论运用于解释和解决实际问题，\n学以致用，发展动脑、动手能力，并理解知识的含义，领悟知识的价值。\n贯彻要求：\n（1）注重联系实际学好理论。\n（2）重视引导学生运用知识。\n（3）逐步培养与形成学生综合运用知识的能力。\n（4）面向生活现实，培养学生的对策思维。\n（5）补充必要的乡土教材。",mn:"相对用总理",x:"· 为什么：此原则解决\"学了不会用\"的问题——理论与实践要双向打通:用理论解释实际,在实际中深化理论,达到\"学以致用\"。五条要求从\"学好理论→引导运用→培养综合运用能力→面向生活→补乡土教材\",落点都在\"用\"字。\n· 对比：与直观性区分:直观性解决\"懂不懂\",理论联系实际解决\"会不会用\"。"},
 {n:75,cat:"教学",q:"简述直观性原则及其贯彻要求",a:"直观性原则是指教师应该尽量利用学生的多种感官与已有经验，通过各种形式的感知，丰富\n学生的直接经验和感性认识，使学生获得生动的表象，从而全面地掌握知识。\n贯彻要求：\n（1）正确选择直观教具和现代化的教学手段。\n（2）直观教具的演示要与语言讲解结合起来。\n（3）要重视运用语言直观。\n（4）防止直观的不当与滥用。",mn:"选择语言不滥用",x:"· 为什么：直观性遵循\"从感性到理性\"的认识规律——先给学生丰富表象,才能形成概念。四条要求的关键是\"直观要为思维服务\":选对教具→演示配讲解→重视语言直观→防止滥用(直观只是手段不是目的)。\n· 根源：夸美纽斯《大教学论》提出\"凡是需要知道的事物,都要通过事物本身来教学\",被誉为\"直观教学之父\";乌申斯基也强调直观。"},
 {n:76,cat:"教学",q:"简述启发性原则及其贯彻要求",a:"启发性原则是指教师在教学工作中依据学习过程的客观规律，运用各种教学手段充分调动学\n生学习主动性、积极性，引导他们独立思考，积极探索，生动活泼地学习，自觉地掌握科学知识\n和提高分析问题和解决问题的能力。\n贯彻要求：\n（1）调动学生学习的主动性。\n（2）善于提问激疑，引导教学步步深入。\n（3）注重通过解决实际问题启发学生获取知识。\n（4）引导学生反复思考学习过程。\n（5）发扬教学民主。",mn:"民冻死发问",x:"· 为什么：启发性的灵魂是\"调动学生主动性\",而非教师包办。五条要求围绕\"激发主动→提问激疑→以问题启发→引导反思→教学民主\"展开,核心是把\"要我学\"变成\"我要学\"。\n· 根源：源头有二——孔子\"不愤不启,不悱不发\";《学记》\"道而弗牵,强而弗抑,开而弗达\"。第斯多惠名言\"一个坏教师奉送真理,一个好教师教人发现真理\"亦是此意。"},
 {n:77,cat:"教学",q:"简述巩固性原则及其贯彻要求",a:"巩固性原则是指教师要引导学生在理解的基础上牢固地掌握知识和基本技能，而且在需要的\n时候，能够准确无误地呈现出来，以利于知识、技能的运用。\n贯彻要求：\n（1）在理解的基础上巩固。\n（2）把握巩固的度。\n（3）重视组织各种复习。\n（4）在扩充、改组和运用知识中积极巩固。",mn:"复用李度",x:"· 为什么：巩固性针对\"学了就忘\"——要在理解基础上牢记并能随时提取运用。四条要求扣住\"理解后巩固(非死记)→把握度→组织复习→在运用中巩固\",核心是\"理解+复习+应用\"三位一体。\n· 根源：孔子\"学而时习之\"、\"温故而知新\";乌申斯基把复习喻为\"学习之母\";心理学上对应艾宾浩斯遗忘曲线。"},
 {n:78,cat:"教学",q:"简述量力性原则（又称可接受性原则、发展性原则）及其贯彻要求",a:"量力性原则指教学的内容、方法和进度，既要适合学生已有的发展水平，又要有一定的难度，\n激励他们经过努力才能掌握，以便有效地促进学生的身心发展。\n贯彻要求：\n（1）了解学生的发展水平，从实际出发进行教学。\n（2）考虑学生认识发展的时代特点。\n（3）恰当地把握教学难度。",mn:"时代难发展",x:"· 为什么：量力性又叫\"可接受性\",但精髓不是一味降低难度,而是\"跳一跳够得着\"——既适合现有水平,又留适度难度激励努力。三条要求:了解水平→考虑时代特点→把握难度,核心是难度的\"恰当\"。\n· 根源：思想与维果茨基\"最近发展区\"相通;古训\"语之而不知,虽舍之可也\"(《学记》)亦警示不可超出学生接受能力。"},
 {n:79,cat:"教学",q:"简述教学工作的基本环节",a:"（1）备课。\n（2）上课。\n（3）布置和批改作业。\n（4）课外辅导。\n（5）学业成绩评定。",mn:"背上做导学",x:"· 为什么：五个环节是教师一轮完整教学工作的时间链条——课前(备课)→课中(上课,中心环节)→课后(作业+辅导)→学期末(成绩评定)。每环节都为下一环节服务,缺一则教学闭环不完整。\n· 对比：\"上课\"是中心环节,\"备课\"是前提;别把\"备课\"误当中心。"},
 {n:80,cat:"教学",q:"简述备课的内容",a:"（1）备课要做好三方面的工作：\n①钻研教材。\n②了解学生。\n③设计教法。\n（2）备课要写好三种计划：\n①学期（学年）教学进度计划。\n②单元计划（课题计划）。\n③课时计划（教案）。",mn:"",x:"· 为什么：备课要回答\"教什么、教给谁、怎么教\"——故钻研教材(教什么)、了解学生(教给谁)、设计教法(怎么教)缺一不可。三种计划则是把备课成果落到纸面:学期计划(宏观)→单元计划(中观)→课时教案(微观),由粗到细。\n· 对比：\"三备\"(备教材、备学生、备教法)+\"三计划\"是固定搭配,常一起考。"},
 {n:81,cat:"教学",q:"简述备课的基本理念",a:"（1）备课要体现预设与生成的统一。\n（2）备课要体现尊重差异性的理念。\n（3）备课要体现生活化的理念。\n（4）备课要体现课程资源整合的理念。\n（5）备课要体现教学方式与学习方式转变的理念。",mn:"元芳查生育",x:"· 为什么：这五条是新课改理念在备课中的投射——预设与生成统一(承认课堂不全可控)、尊重差异、生活化、资源整合、方式转变。共同指向是\"备课不再是写死的剧本,而是为动态、个性化、开放的课堂做准备\"。\n· 对比：和\"备课内容\"(三备三计划)区分:那是\"做什么\",这是\"用什么理念做\"。"},
 {n:82,cat:"教学",q:"简述上好课的基本要求",a:"（1）目的明确。（2）内容正确。（3）方法得当。（4）结构合理。\n（5）语言艺术。（6）气氛热烈。（7）板书有序。（8）态度从容。",mn:"目容方气构泰语书",x:"· 为什么：八条标准是评判一堂好课的多维尺子,可归为\"内容(目的明确、内容正确)+方法(方法得当、结构合理)+表达(语言、板书)+状态(气氛、态度)\"。本质是\"教得对、教得活、教得稳\"的统一。\n· 对比：口诀\"目容方气构泰语书\"帮记;注意\"目的明确\"排第一,是首要标准。"},
 {n:83,cat:"教学",q:"简述布置与批改作业的基本要求",a:"（1）明确作业的目标和功能。\n（2）布置的作业要符合课程标准和教科书的要求。\n（3）布置作业要题量适当，难度适度。\n（4）布置作业时要向学生提出明确具体的要求。\n（5）教师要认真、及时批改学生的作业。",mn:"难提批改科目",x:"· 为什么：五条要求覆盖作业\"布置→批改\"全过程,逻辑是\"为何留(目标功能)→留什么(合课标)→留多少(量难适度)→怎么留(要求明确)→怎么收(及时批改)\"。核心是作业要精准服务于教学目标,反对题海。"},
 {n:84,cat:"教学",q:"简述讲授法及其基本要求",a:"讲授法是教师通过口头语言的形式向学生系统传授知识、促进学生发展的方法。\n基本要求：\n（1）精炼讲授内容。\n（2）注重讲授的策略与方式。\n（3）讲究语言艺术。",mn:"内测艺术",x:"· 为什么：讲授法靠\"教师的嘴\"系统传知,效率高但易满堂灌,故三条要求专治其短:内容要精炼(防冗长)、策略要讲究(防照本宣科)、语言要有艺术(防枯燥)。核心是\"讲得精、讲得活\"。\n· 对比：讲授法≠注入式!关键看是否启发学生思维,启发式讲授才是好讲授。"},
 {n:85,cat:"教学",q:"简述问答法及其基本要求",a:"问答法又称谈话法，是教师根据学生已有的知识经验提出问题，通过师生问答或谈话的方式，\n引导学生获得知识的方法。\n基本要求：\n（1）要准备好谈话计划。\n（2）要善问。\n（3）要善于启发诱导。\n（4）要做好小结。",mn:"小鸡发问",x:"· 为什么：问答法(谈话法)靠\"问\"来引学生用已有经验得出新知,所以成败在\"问得好不好\"。四条要求:备好谈话计划→善问(问题要有启发性)→善诱导→做小结,核心是\"以问启思\"。\n· 根源：源头是苏格拉底\"产婆术\"(精神助产术),通过连续追问让对方自己\"产\"出真理。"},
 {n:86,cat:"教学",q:"简述讨论法及其基本要求",a:"讨论法是让学生围绕一个中心问题进行集体谈论、对话的一种教学方法。\n基本要求：\n（1）讨论的问题要有吸引力。\n（2）要善于对学生启发、引导。\n（3）做好讨论小结。",mn:"小发力",x:"· 为什么：讨论法是学生之间围绕中心问题\"互相启发\",故关键在\"问题有吸引力(讨论得起来)+教师善引导(不跑偏)+做好小结(收得拢)\"。本质是把课堂话语权交给学生,但教师不缺位。\n· 对比：问答法是\"师生一问一答\",讨论法是\"生生集体辩论\",别混。"},
 {n:87,cat:"教学",q:"简述读书指导法及其基本要求",a:"读书指导法又称阅读指导法，是指教师指导学生阅读教科书或其他书籍，进而获得知识的方法。\n基本要求：\n（1）提出明确的目的、要求和思考题。\n（2）教给学生读书的方法。\n（3）善于在读书中发现问题和解决问题。\n（4）适当组织学生交流读书心得。",mn:"求问新法",x:"· 为什么：读书指导法的目标是\"教会学生自己读书\",所以要求落在\"给目标(提思考题)→教方法(怎么读)→重发现(读中提问解决)→促交流(分享心得)\"。核心是\"授人以渔\",培养自学能力。"},
 {n:88,cat:"教学",q:"简述演示法及其基本要求",a:"演示法是教师在课堂上通过展示各种实物、直观教具或进行演示实验使学生获得知识的方法。\n基本要求：\n（1）做好演示前的准备。\n（2）让学生明确演示的目的、要求。\n（3）讲究演示的方法。",mn:"求北方",x:"· 为什么：演示法靠教师\"做给学生看\"获取感性认识,属直观教学,故三条要求按\"准备→明确目的→讲究方法\"展开,关键是让学生带着目的看、看出门道,而非看热闹。\n· 对比：演示是\"教师做、学生看\";实验是\"学生自己动手做\",主体不同。"},
 {n:89,cat:"教学",q:"简述参观法及其基本要求",a:"参观法是教师根据教学目的和要求，组织学生对实际实物进行实地观察、研究，从而在实际中\n获得新知识或巩固、验证已学知识的方法。\n基本要求：\n（1）做好参观的准备。\n（2）参观时要及时对学生进行具体指导。\n（3）参观后及时总结。",mn:"前（准备）中（指导）后（总结）",x:"· 为什么：参观法把课堂搬到实地,在真实情境中获取或验证知识,故按\"前(准备)—中(指导)—后(总结)\"三段组织,核心是让实地观察有目的、有引导、有沉淀,避免\"游而不学\"。"},
 {n:90,cat:"教学",q:"简述练习法及其基本要求",a:"练习法又称作业法，是在教师指导下，学生运用知识完成的操作性训练，以形成技能、技巧的\n方法。\n基本要求：\n（1）提高练习的自觉性。\n（2）循序渐进、逐步提高。\n（3）严格要求。",mn:"自觉提高要求",x:"· 为什么：练习法(作业法)靠反复操作形成技能技巧,故要求是\"提高自觉性(主动练)+循序渐进(由易到难)+严格要求(保质量)\"。核心是技能熟练需要科学、有要求的重复,而非机械刷题。"},
 {n:91,cat:"教学",q:"简述实验法及其基本要求",a:"实验法是在教师指导下，学生利用一定的工具、仪器进行独立作业，观察事物或现象的产生和\n变化，以获得知识、培养技能的教学方法。\n基本要求：\n（1）做好实验的准备，制定好实验计划。\n（2）明确实验的目的、要求与做法。\n（3）注意指导实验过程。\n（4）做好小结。",mn:"小贝过目",x:"· 为什么：实验法是学生在指导下独立动手观察现象、得出结论,主体是学生。四条要求\"准备(定计划)→明确目的→指导过程→做小结\",核心是放手让学生做,但教师全程指导与收尾。\n· 对比：与演示法的根本区别在\"谁动手\"——实验是学生亲自操作。"},
 {n:92,cat:"教学",q:"简述实习作业法及其基本要求",a:"实习作业法，又称实习法，是指根据教学任务要求，学生在教师指导下在校内外一定场所运用\n所学知识进行实际操作和其他活动，以帮助学生掌握知识、形成技能技巧的方法。\n基本要求：\n（1）做好实习作业的准备。\n（2）做好实习作业的动员。\n（3）做好实习作业过程中的指导。\n（4）做好实习作业总结。",mn:"被动过节",x:"· 为什么：实习作业法是在校内外实地运用所学进行实际操作,偏重\"用知识做事\"。四条要求\"准备→动员→过程指导→总结\",其中\"动员\"是它独有的环节,因为实习常在真实场景、需调动学生积极性。\n· 对比：实习作业法重\"综合运用\"形成职业性技能,练习法重\"单项重复\"形成基本技能。"},
 {n:93,cat:"教学",q:"简述教学方法的选择依据",a:"（1）教学目的和任务的要求。\n（2）课程性质和特点。\n（3）学生年龄特征。\n（4）教学时间、设备、条件。\n（5）教师业务水平、实际经验及个性特点。\n（6）教学手段、教学环境等因素。",mn:"一课程、二师生、三教学",x:"· 为什么：选教学方法没有万能法,必须\"看菜下饭\"——故依据可归为三类:看任务(目的)、看对象与教者(学生年龄+教师水平)、看条件(时间设备环境)。核心是\"因目的、因人、因条件\"制宜,任何方法都要服务于具体情境。"},
 {n:94,cat:"教学",q:"简述班级授课制的优缺点",a:"（1）优点：可以同时面对较多学生进行教学，扩大教学规模，提高教学效率。有利于发挥教师\n的主导作用，有利于教师系统地传授科学文化知识、进行教学检查和教学管理。\n（2）缺点：学生的独立性与自主性受到很大限制，不能很好地照顾学生个性的发展。",mn:"教师大笑教知识",x:"· 为什么：班级授课制的优缺点是同一枚硬币两面——\"按班统一教学\"带来高效率、易管理、利于系统传知与发挥教师主导(优点),但同样的\"统一\"也压制了学生个性与自主性(缺点)。理解了\"统一\"二字就懂了它的利弊。\n· 根源：夸美纽斯《大教学论》首次从理论上系统论证班级授课制;我国最早见于1862年京师同文馆。"},
 {n:95,cat:"教学",q:"简述课堂管理的影响因素",a:"（1）教师的领导风格。\n（2）班级规模（班级的大小）。\n（3）班级的性质。\n（4）对教师的期望。",mn:"魔性到期",x:"· 为什么：课堂管理受\"人\"与\"群体\"双重影响——教师方面是领导风格,班级方面是规模、性质,再加上社会对教师的期望。这四点说明课堂秩序不只取决于教师个人,还受班级特性和外部期望的共同塑造。\n· 对比：注意是\"影响因素\"(为什么难管),不是\"管理策略\"(怎么管),别答混。"},
 {n:96,cat:"教学",q:"简述有效课堂管理的策略（如何进行有效的课堂管理）。/简述维持课堂纪律的策略（如何有效维持课堂纪律）。/简述课堂问题行为的处理办法",a:"简述有效课堂管理的策略（如何进行有效的课堂管理）。/简述维持课堂纪\n律的策略（如何有效维持课堂纪律）。/简述课堂问题行为的处理办法（简述如何\n有效应对课堂问题行为）。\n（1）建立有效的课堂规则。\n（2）合理组织课堂教学。\n（3）做好课堂监控。\n（4）培养学生的自律品质。",mn:"孔子教规",x:"· 为什么：这一组同义问题的答案是统一的四条策略,逻辑是\"立规矩(建规则)→会组织(合理教学)→勤监控(做监控)→育自律(自我管理)\"。核心思路是\"预防为主\"——好课堂是组织出来的,而非事后惩罚出来的,最高境界是学生自律。"},
 {n:97,cat:"教学",q:"简述课堂教学管理的原则",a:"（1）以人为本原则。\n（2）差异性原则。\n（3）目的性原则。\n（4）效率性原则。\n（5）教育性原则。",mn:"一个焦虑的牧人",x:"· 为什么：五条原则其实是把教育的一般要求落到课堂管理上——以人为本(根本)、差异性(尊重个体)、目的性、效率性、教育性(管理本身也要育人)。核心是\"管理不是为了管住,而是为了育人和高效学习\"。\n· 对比：与\"课堂管理影响因素\"\"管理策略\"区分:这是\"遵循什么原则\"。"},
 {n:98,cat:"教学",q:"简述积极的课堂气氛的营造方式",a:"（1）建立和谐的课堂人际关系。\n（2）运用灵活多样的教学方式。\n（3）采用民主的领导方式。\n（4）给予学生合理的期望。",mn:"教人欺民",x:"· 为什么：积极课堂气氛靠\"关系+方法+领导方式+期望\"四方面营造——和谐人际(情感基础)、灵活教法(避免枯燥)、民主领导(而非专制)、合理期望(罗森塔尔效应)。核心是教师用民主、温暖的方式调动学生情绪。\n· 根源：\"给予合理期望\"对应罗森塔尔(皮格马利翁)效应——教师的积极期望能促成学生进步。"},
 {n:99,cat:"教学",q:"简述制定课堂规则的原则与要求",a:"（1）课堂规则应符合四个基本条件，即明确、合理、必要和可行。\n（2）课堂规则应通过教师和学生充分讨论，共同制定。\n（3）课堂规则应少而精，内容表述以正向引导为主。\n（4）课堂规则应该及时制定与调整。",mn:"四桶烧鸡",x:"· 为什么：好的课堂规则要\"立得住、行得通\"——故须满足明确、合理、必要、可行四条件,且师生共定(认同度高)、少而精正向表述(易记愿守)、及时调整(动态适配)。核心是规则要被学生从心里接受,而非强加。"},
 {n:100,cat:"教学",q:"简述课堂问题行为产生的原因",a:"（1）学生的因素：①适应不良；②厌烦；③挫折与紧张；④寻求注意与地位；⑤过度活动；\n⑥性别差异。\n（2）教师的因素：①要求不当；②滥用惩罚手段；③教师缺乏自我批评精神。\n（3）环境因素：①家庭因素；②大众媒体；③课堂内部环境。",mn:"",x:"· 为什么：问题行为是\"学生—教师—环境\"三方共同造成的,不能只怪学生。学生方面如适应不良、寻求关注;教师方面如要求不当、滥用惩罚;环境方面如家庭、媒体。理解这点才能对症下药——很多问题行为其实是教师或环境\"诱发\"的。\n· 对比：与\"处理办法\"(96题)区分:这是\"为什么会发生\",那是\"怎么办\"。"},
 {n:101,cat:"教学",q:"简述教学评价的功能",a:"（1）导向功能。\n（2）诊断功能。\n（3）反馈功能。\n（4）管理功能。\n（5）激励功能。\n（6）研究功能。",mn:"里脊反向就诊",x:"· 为什么：六个功能覆盖评价的全流程作用——导向(指方向)、诊断(查问题)、反馈(给信息)、管理(供依据)、激励(增动力)、研究(促改进)。评价之所以重要,是因为它既向前指路(导向)又向后体检(诊断),贯穿教与学始终。"},
 {n:102,cat:"教学",q:"简述教学评价的原则",a:"（1）客观性原则。\n（2）发展性原则。\n（3）指导性原则。\n（4）计划性原则。\n（5）全面性原则。\n（6）多样性原则。\n（7）多主体性原则。",mn:"全羊煮法可知鸡",x:"· 为什么：七条原则保证评价\"公正、全面、促发展\"——客观性(不偏私)、发展性(看进步)、指导性、计划性、全面性、多样性、多主体性(不只教师评)。核心是新课改理念:评价是为了促进发展,而非单纯甄别排名。\n· 对比：与发展性评价观相通,落点都在\"促发展\"。"},
 {n:103,cat:"教学",q:"简述发现学习（教学）模式（问题—探究教学模式）的基本程序",a:"（1）提出问题；（2）提出假设；（3）形成概念；（4）运用概念。",mn:"",x:"· 为什么：发现学习模式让学生像科学家一样\"自己发现\"——故程序是\"提出问题→提出假设→形成概念→运用概念\",完全模拟科学探究的认识路径。核心是知识由学生主动建构,而非被动接受。\n· 根源：布鲁纳提出\"发现学习\"(《教育过程》),主张学习学科基本结构、像科学家一样探究。"},
 {n:104,cat:"教学",q:"简述抛锚式教学的基本程序",a:"（1）创设情境；（2）确定问题；（3）自主学习；（4）协作学习；（5）效果评价。",mn:"设定住学校",x:"· 为什么：抛锚式教学的\"锚\"就是一个真实复杂的情境/问题,确定后整个教学就\"固定\"在它周围展开。故程序为\"创设情境→确定问题(抛锚)→自主学习→协作学习→效果评价\",核心是在真实问题情境中建构知识。\n· 根源：属建构主义教学模式,以情境性学习为基础,又称\"实例式/基于问题的教学\"。"},
 {n:105,cat:"教学",q:"简述范例教学的基本程序",a:"（1）范例性地阐明“个”案。\n（2）范例性地阐明“类”案。\n（3）范例性地掌握规律。\n（4）范例性地获得关于世界的经验。",mn:"",x:"· 为什么：范例教学走\"由个别到一般\"的认识路径——先吃透一个典型\"个\"案,再推及\"类\",从而掌握规律,最后获得关于世界的经验。核心是\"以一当十\",通过精选范例触类旁通,而非面面俱到。\n· 根源：瓦·根舍因、克拉夫基(德国)创立,针对当时教材臃肿、强调\"少而精\"。"},
 {n:106,cat:"教学",q:"简述传递—接受教学模式的基本程序",a:"（1）复习旧课；（2）激发学习动机；（3）讲授新课；\n（4）巩固练习；（5）检查评价；（6）间隔性复习。",mn:"",x:"· 为什么：传递—接受模式是教师系统讲、学生有意义接受,故程序紧扣记忆与巩固规律:复习旧课(搭桥)→激发动机→讲授新课→巩固练习→检查评价→间隔复习(防遗忘)。核心是高效、系统地传授现成知识。\n· 根源：理论基础是奥苏伯尔的\"有意义接受学习\";又称凯洛夫式教学,与赫尔巴特\"四段教学法\"一脉相承。"},
 {n:107,cat:"教学",q:"简述教学反思的基本内容、基本方法和作用",a:"（1）教学反思的基本内容（前三条冒号后面的不用写）：\n①对教学目标的反思：反思自己是否达到了教学目标。\n②对教学过程的反思：反思自己的教学行为是否对学生造成伤害，是否侵犯了学生的权利。\n③对教学情境的反思：反思教学过程中的精彩片段和不足之处。\n④反思教育教学是否让不同的学生在学习上得到了不同的发展。\n⑤反思自己的教育教学理念。\n⑥反思自己的专业知识。\n（2）教学反思的基本方法：\n①行动研究法。\n②自我提问法。\n③教学诊断法。\n④比较法。\n⑤阅读新知法。\n（3）教学反思的作用：\n①教学反思有利于教案的改进。\n②教学反思为撰写教学研究、论文提供丰富的素材。\n③教学反思促进教师的专业发展。\n④教学反思使经验和教训变为教学智慧，从中得到启发。\n⑤教学反思能帮助自己找到问题的解决方法。\n⑥教学反思使自己学会教学。\n⑦教学反思促进自己成长。",mn:"学生智力，请过目 / 真心比我行",x:"· 为什么：教学反思是教师\"自己研究自己的教学\",所以\"内容(反思什么)—方法(怎么反思)—作用(为何反思)\"三块自成体系。内容覆盖目标、过程、情境到理念;方法多样;作用最终指向\"促进教师专业成长\"。\n· 根源：源于反思性教学思潮,杜威《我们怎样思维》提出\"反省思维\",舍恩提出\"反思性实践者\"。"},
 {n:108,cat:"德育",q:"简述确立德育目标的依据",a:"（1）国家的教育方针和教育目的。\n（2）民族文化及道德传统。\n（3）时代与社会发展需要。\n（4）青少年思想品德形成与发展的规律及心理特征。",mn:"少时国民",x:"· 为什么：德育目标是\"培养什么品德的人\"的预期标准，它向上承接国家教育方针（管方向），向外呼应时代社会需要（管现实需求），向内顺应少年儿童品德发展规律（管可行性），同时受民族道德传统这一文化土壤约束，四依据合起来就是\"方向+需求+可行+根基\"。\n· 对比：与第109题\"选择德育内容的依据\"对照记——目标依据回答\"定什么标准\"，内容依据回答\"教什么、教多深\"，且内容依据中德育目标本身又成了首要决定因素。"},
 {n:109,cat:"德育",q:"简述选择德育内容的依据",a:"（1）德育目标直接决定德育内容。\n（2）受教育者的身心发展特征决定德育内容的深度和广度。\n（3）德育所面对的时代特征和学生思想实际决定德育工作的针对性和有效性。\n（4）文化传统的制约作用。",mn:"师（时）母（目）狡猾",x:"· 为什么：内容是为目标服务的，所以德育目标\"直接决定\"内容（这是首要依据）；学生身心发展水平决定内容能讲多深多广（量力），时代特征与学生思想实际决定内容是否对路（针对性），文化传统则是无法回避的底色。一句话：目标定方向、学情定深浅、时代定重点、传统定底色。\n· 对比：易与第108题\"德育目标依据\"混淆——目标依据里有\"国家方针\"，内容依据里换成\"德育目标\"本身，因为内容比目标低一层级。"},
 {n:110,cat:"德育",q:"简述新时期德育发展的新主题",a:"（1）生命教育。\n（2）生活教育。\n（3）生存教育。\n（4）安全教育。\n（5）升学就业指导。",mn:"三生全学",x:"· 为什么：传统德育偏重政治思想，新主题则转向\"以人为本、关注生命与生存\"。生命、生活、生存（\"三生教育\"）回答\"如何珍视并经营自己的人生\"，安全教育是其底线保障，升学就业指导则把德育延伸到学生的现实发展抉择，整体体现德育从\"高大上\"向贴近学生真实生存状态回归。\n· 根源：属政策与时代命题，可对接《中小学德育工作指南》强调的贴近生活、关注学生成长需要的导向。"},
 {n:111,cat:"德育",q:"简述德育过程与品德形成过程的关系",a:"德育过程与品德形成过程的关系是教育与发展的关系。\n（1）思想品德形成过程是学生个体品德自我发展的过程。德育过程则是教育者对受教育\n者的教育过程，是双边活动过程。\n（2）思想品德形成过程中，学生受各种因素影响，包括自发的环境因素的影响。德育过\n程中学生主要受有目的、有计划、有组织的教育影响。\n（3）从学生思想品德形成过程的结果看，品德形成可能与社会要求相一致，也可能不一\n致。德育过程的结果，学生形成的思想品德则与社会要求相一致。",mn:"",x:"· 为什么：两者是\"教育与发展\"的关系，差异都源于一个核心——是否有教育者的有目的介入。品德形成是学生自发自我发展（含自发环境影响、结果可能偏离社会要求）；德育则是教育者有目的、有计划、有组织的双边活动（结果指向与社会要求一致）。抓住\"有无教育者主导\"即可推出三条区别。\n· 对比：这是高频易混点。可记忆钩子\"德育=品德形成+教育者的有意引导\"，德育是手段，品德形成是过程与结果。"},
 {n:112,cat:"德育",q:"简述德育过程的基本规律",a:"（1）德育过程是促使学生的知、情、意、行互动发展的过程。\n（2）德育过程是组织学生的活动和交往，统一多方面教育影响的过程。\n（3）德育过程是促进学生的思想品德内部矛盾积极转化的过程。\n（4）德育过程是一个长期性、反复性、逐步提高的过程。",mn:"知网长毛 / 脚趾长毛",x:"· 为什么：四条规律分别从内部结构、外部途径、动力机制、时间特征四个角度刻画德育。知情意行是品德的内在构成（培养路径\"晓之以理、动之以情、持之以恒、导之以行\"），活动交往是品德形成的外部源泉，内部矛盾转化是发展的根本动力，长期反复则是其时间规律——四者共同说明德育不是一次性灌输，而是一个动态养成系统。\n· 根源：\"知情意行\"四要素结构源自心理学对道德心理成分的划分，是德育心理学的经典框架。\n· 对比：知情意行有统一性也有不平衡性，可有多种开端，不必固定从\"知\"开始——这是常考点。"},
 {n:113,cat:"德育",q:"简述影响态度与品德形成的一般条件",a:"（1）外部条件：家庭教养方式、社会风气、同伴群体。\n（2）内部条件：认知失调、态度定势、道德认知。\n此外，个体的智力水平、受教育程度、年龄等因素也对态度与品德的形成与改变有不同程\n度的影响。",mn:"",x:"· 为什么：态度与品德的改变是\"外因通过内因起作用\"。外部条件（家庭教养、社会风气、同伴群体）提供环境压力，但最终要靠内部条件（认知失调引发改变动机、态度定势影响接受度、道德认知水平决定理解深度）才能内化。所以外部是诱因，内部是决定性中介。\n· 根源：\"认知失调\"是费斯廷格（美）的认知失调理论，指认知冲突会驱动个体改变态度以恢复平衡，是解释态度转变的核心机制。"},
 {n:114,cat:"德育",q:"简述良好态度与品德的培养方法",a:"（1）有效的说服。\n（2）树立良好榜样。\n（3）利用同伴（群体）约定。\n（4）价值辨析。\n（5）给予适当的奖励与惩罚。\n（6）角色扮演。\n（7）小组道德讨论。",mn:"说好约架罚演猪",x:"· 为什么：这七法正好覆盖知情意行各环节——有效说服、价值辨析、小组讨论作用于\"知\"（认知）；树立榜样、角色扮演作用于\"情、行\"（情感与行为模仿）；同伴约定与奖惩则用群体规范和强化巩固\"行\"。共同逻辑是：先让学生认同，再给情境体验，最后靠强化固化。\n· 对比：\"价值辨析\"强调引导学生自己澄清价值观，不直接灌输，与\"有效说服\"的以理服人有别，常作为区分点考查。"},
 {n:115,cat:"德育",q:"简述我国中小学常用的德育原则",a:"（1）导向性原则。\n（2）疏导性原则。\n（3）尊重学生与严格要求学生相结合的原则。\n（4）知行统一原则。\n（5）正面教育与纪律约束相结合的原则。\n（6）依靠积极因素、克服消极因素的原则。\n（7）教育影响的一致性与连贯性原则。\n（8）因材施教原则。\n（9）集体教育和个别教育相结合原则。",mn:"向导知尊，正因机智，集合啦",x:"· 为什么：九条原则可按\"方向—态度—方法—对象\"归类记忆：导向性管政治方向，疏导、尊重严格、正面教育与纪律约束管教育态度（疏堵结合、严爱结合、正纪结合），知行统一、长善救失（依靠积极克服消极）、因材施教管方法，集体与个别相结合、教育影响一致连贯管对象与合力。本质都是为了高效、正确地促进品德内化。\n· 对比：\"集体教育与个别教育相结合\"即平行教育原则，源自马卡连柯（苏联）；\"长善救失\"语出《学记》——这两条最易被追问出处。"},
 {n:116,cat:"德育",q:"简述导向性原则的概念及要求",a:"导向性原则是指进行德育时要有一定的理想性和方向性，以指导学生向正确的方向发展。\n要求：\n（1）坚持正确的政治方向。\n（2）德育目标必须符合新时期的方针、政策和总任务的要求。\n（3）要把德育的理想性和现实性结合起来。",mn:"新方向",x:"· 为什么：导向性原则解决\"往哪带\"的问题。德育不能盲目，必须有理想性（指明高远目标）和方向性（坚持正确政治方向），同时把理想性与现实性结合，避免脱离学生实际空谈，所以要求落到\"正确政治方向+符合时期方针+理想现实结合\"。\n· 对比：与疏导原则比，导向性管\"方向对不对\"，疏导管\"方法顺不顺\"，二者一个定向、一个定法。"},
 {n:117,cat:"德育",q:"简述疏导原则的概念及要求",a:"疏导原则是指进行德育要循循善诱，以理服人，从提高学生认识入手，调动学生的主动性，\n使他们积极向上。\n要求：\n（1）讲明道理，疏导思想。\n（2）因势利导，循循善诱。\n（3）以表扬激励为主，坚持正面教育。",mn:"循正道",x:"· 为什么：疏导即\"疏通引导\"，核心是以理服人、循循善诱，从提高认识入手调动学生主动性，所以要求落在讲明道理、因势利导、正面激励——都是\"疏\"而非\"堵\"。先通思想，行为才能跟上。\n· 根源：\"循循善诱\"出自《论语》，是孔子的教学态度；疏导思想与大禹治水\"疏而不堵\"同理，是该原则最好的记忆钩子。\n· 对比：疏导（以理服人、正面引导）vs 正面教育与纪律约束相结合（正面引导之外还要辅以纪律），后者多了\"约束\"这一手。"},
 {n:118,cat:"德育",q:"简述尊重学生与严格要求学生相结合的原则的概念及要求",a:"既要尊重信任学生，又要对学生提出严格的要求，把“严”和“爱”有机地结合起来。\n要求：\n（1）教育者要有强烈的责任感以及尊重学生的态度，关心爱护学生，尤其是对待后进生。\n（2）教育者应根据教育目的和德育目标，对学生严格要求，认真管理。\n（3）教育者要向学生提出合理而严格的道德要求。",mn:"",x:"· 为什么：该原则把\"爱\"与\"严\"统一起来——只爱不严会放纵，只严不爱会对立。要求据此展开：先有尊重关爱（尤其对后进生）的态度，再依据德育目标提出严格而合理的要求，做到严中有爱、爱中有严。\n· 根源：体现马卡连柯（苏联）名言\"尽量多地要求一个人，也要尽可能地尊重一个人\"，是严爱结合原则的经典出处。"},
 {n:119,cat:"德育",q:"简述知行统一原则的概念及要求",a:"既要重视思想道德的理论教育，又要重视组织学生参加实践锻炼，把提高认识和行为养成\n结合起来，使学生做到言行一致、表里如一。\n要求：\n（1）加强思想道德的理论教育，提高学生的思想道德认识（知）。\n（2）组织和引导学生参加各种社会实践活动，促使他们在接触社会的实践活动中加深情\n感体验，养成良好的行为习惯。\n（3）对学生的评价和要求要坚持知行统一的原则。\n（4）教育者要以身作则，严于律己。",mn:"知行统一，以身作则",x:"· 为什么：品德\"知\"是起点、\"行\"是归宿，知行脱节德育就落空，故要既重理论认识（知）又重实践锻炼（行），使学生言行一致、表里如一。要求据此从提高认识、组织实践、知行统一地评价、教师以身作则四方面落实。\n· 根源：呼应中国传统\"知行合一\"思想（王阳明）；其规律基础是德育过程中知情意行诸要素须统一发展。\n· 对比：作为原则强调\"言行一致\"的要求，区别于作为规律的\"知情意行统一发展\"——一个是怎么做，一个是为什么。"},
 {n:120,cat:"德育",q:"简述正面教育与纪律约束相结合的原则的概念及要求",a:"德育工作既要正面引导、说服教育、启发自觉，调动学生接受教育的内在动力，又要辅之\n以必要的纪律约束，并使两者有机地结合起来。\n要求：\n（1）坚持正面教育原则。\n（2）坚持摆事实、讲道理，以理服人。\n（3）建立健全学校规章制度和集体组织的公约、守则等，并且严格管理，认真执行。",mn:"",x:"· 为什么：光靠正面说服，自觉性不足的学生易反复，所以正面引导（调动内在动力）要辅以必要的纪律约束（外部规范）形成合力。要求据此落在坚持正面教育、摆事实讲道理、健全并严格执行规章制度三方面。\n· 对比：与疏导原则区分——疏导纯靠\"以理服人\"，本原则在此基础上加了\"纪律约束\"这一外部保障，是\"内动力+外约束\"的结合。"},
 {n:121,cat:"德育",q:"简述依靠积极因素，克服消极因素的原则（长善救失原则）的概念及要求",a:"德育工作中，教育者要善于依靠、发扬学生自身的积极因素，调动学生自我教育的积极性，克服\n消极因素，实现品德发展内部矛盾的转化。\n要求：\n（1）教育者要用一分为二的观点，全面分析，客观地评价学生的优点和不足。\n（2）教育者要有意识地创造条件，将学生思想中的消极因素转化为积极因素。\n（3）教育者要提高学生自我认识、自我评价能力，启发他们自觉思考，克服缺点，发扬优点。",mn:"一分为二，转化认识",x:"· 为什么：每个学生都同时有优点（积极因素）和缺点（消极因素），德育的高效之道是扬长以补短——依靠并放大积极因素去战胜消极因素，实现内部矛盾转化。要求据此落在一分为二地评价、创造条件促转化、提高学生自我教育能力。\n· 根源：即\"长善救失\"原则，语出《学记》\"教也者，长善而救其失者也\"，意为发扬优点、补救过失。\n· 对比：与因材施教易混——长善救失针对\"优缺点\"做转化，因材施教针对\"个别差异\"做不同教育。"},
 {n:122,cat:"德育",q:"简述教育影响的一致性与连贯性原则的概念及要求",a:"德育工作中应主动协调多方面的教育力量，统一认识和步调，有计划、有系统地发挥教育的整体\n功能，培养学生正确的思想品德。\n要求：\n（1）要统一学校内部各方面的教育力量。\n（2）要统一社会各方面的教育影响。\n（3）对学生进行德育要有计划、有系统地进行，做好衔接工作，以确保对学生的教育前后连贯\n一致。",mn:"学校衔接社会",x:"· 为什么：学生品德受学校、家庭、社会多方影响，若各方步调不一会相互抵消，故须协调各种教育力量，在空间上统一（校内+社会各方），在时间上连贯（有计划、有系统、做好衔接），形成教育合力。\n· 对比：\"一致性\"指空间维度——同一时间各方口径统一；\"连贯性\"指时间维度——不同阶段前后衔接。一横一纵，是该原则的记忆抓手。"},
 {n:123,cat:"教学",q:"简述因材施教原则的概念及要求",a:"因材施教原则是指进行德育要从学生的思想认识和品德发展的实际出发，根据他们的年龄特征和\n个性差异进行不同的教育，使每个学生的品德都能得到更好的发展。\n要求：\n（1）深入了解学生的个性特点和内心世界。\n（2）根据学生个人特点有的放矢地进行教育。\n（3）根据学生的年龄特征有计划地进行教育。",mn:"",x:"· 为什么：(本题实为德育中的因材施教原则)德育也要\"因材\"——学生思想认识和品德发展水平各不相同,故须按年龄特征和个性差异区别施教。三条要求:深入了解学生→有的放矢→按年龄有计划,核心是\"先了解、后对症\"。\n· 根源：思想源于孔子\"各因其材\";与教学中的因材施教原则同理,只是落点从\"学知识\"变为\"育品德\"。\n· 对比：注意它和教学原则里的\"因材施教\"是两个领域的同名原则,本题指德育原则。"},
 {n:124,cat:"德育",q:"简述集体教育和个别教育相结合原则（平行教育原则）的概念及要求",a:"在德育过程中，教育者要善于组织和教育学生热爱集体，并依靠集体的力量教育每个学生。同时\n通过对个别学生的教育，来促进集体的形成和发展，从而把集体教育和个别教育有机结合。\n要求：\n（1）建立健全的学生集体。\n（2）开展丰富多彩的集体活动，充分发挥学生集体的教育作用。\n（3）加强个别教育，并通过个别教育影响集体，增强集体的活力，将集体教育和个别教育辩证\n统一起来。",mn:"个体活动",x:"· 为什么：集体与个体是相互成就的——靠集体的舆论和氛围教育每个学生，又通过教育好个别学生反过来增强集体活力，形成\"在集体中、通过集体、为了集体\"的循环。要求据此落在建设健全集体、开展集体活动、加强个别教育并使二者辩证统一。\n· 根源：即\"平行教育原则\"，由马卡连柯（苏联）在《教育诗》等著作中提出，主张教师对集体和个人的教育影响平行进行、相互作用。"},
 {n:125,cat:"德育",q:"简述我国中小学常用的德育方法",a:"（1）说服教育法。\n（2）榜样示范法。\n（3）实际锻炼法。\n（4）情感陶冶法。\n（5）道德修养法。\n（6）品德评价法。",mn:"说实情、评世道",x:"· 为什么：六法恰好对应知情意行的培养——说服教育主攻\"知\"，榜样示范与情感陶冶主攻\"情\"，实际锻炼主攻\"行\"，道德修养指向\"自我教育（内化）\"，品德评价用强化巩固\"行\"。从外部灌输到自我修养再到评价反馈，构成完整闭环。\n· 对比：注意\"说服教育法\"作用于认识，\"实际锻炼法\"作用于行为，\"情感陶冶\"是潜移默化的无意识影响——三者最常被放在一起辨析。"},
 {n:126,cat:"德育",q:"简述说服教育法（明理教育法）的概念及要求",a:"说服教育法是指通过摆事实、讲道理，使学生提高认识、形成正确观点的方法。\n运用的基本要求：\n（1）要有针对性。\n（2）要有知识性和趣味性。\n（3）要善抓时机。\n（4）要注重互尊互动。",mn:"抓互动，真有趣",x:"· 为什么：说服教育法的本质是\"以理服人\"，要让道理真正被接受，就必须对路（针对性）、好懂爱听（知识性趣味性）、抓住时机（趁热打铁）、平等互动（互尊互动）。要求都是为了提高\"讲道理\"的实效。\n· 对比：说服教育法（讲道理、动认识）vs 情感陶冶法（潜移默化、动情感）——前者直接明理，后者间接熏陶，是德育方法辨析高频对。"},
 {n:127,cat:"德育",q:"简述榜样示范法的概念及要求",a:"榜样示范法是指用榜样人物的高尚思想、模范行为、优异成就来影响学生的思想、情感和行为的\n方法。\n运用的基本要求：\n（1）榜样必须是真实可信的。\n（2）激起学生对榜样的积极情感。\n（3）给不同年龄段的学生树立不同的榜样。\n（4）要注重教师自身的示范作用。",mn:"不教真情",x:"· 为什么：榜样的力量来自可学可信，故要求榜样真实可信（不可拔高造假）、能激起学生情感共鸣、按年龄分层树立（不同阶段树不同榜样）、教师自身率先垂范。本质是用具体形象代替抽象说教。\n· 根源：理论上对应班杜拉（美）的社会学习理论——观察学习与替代强化，说明人可通过模仿榜样习得行为。"},
 {n:128,cat:"德育",q:"简述实际锻炼法的概念及要求",a:"实际锻炼法是指教师指导学生参加各种实践活动，以形成一定的道德品质和行为习惯的方法。\n运用的基本要求：\n（1）调动学生的主动性。\n（2）教师予以适当指导。\n（3）坚持严格要求学生。\n（4）及时检查并长期坚持。",mn:"主导严查",x:"· 为什么：品德最终要落到\"行\"，而行为习惯只能在反复实践中养成，故实际锻炼法强调让学生在活动中练。要求据此落在调动主动性、教师适当指导、严格要求、及时检查并长期坚持——\"练\"还要练得对、练得久。\n· 对比：实际锻炼法重在\"做中学\"养成行为习惯，区别于说服教育法的\"讲中学\"提高认识，是知行统一规律在方法层的体现。"},
 {n:129,cat:"德育",q:"简述情感陶冶法（陶冶教育法）的概念及要求",a:"情感陶冶法是指教师利用高尚的情感、美好的事物和优美的环境感染和熏陶学生的方法。\n运用的基本要求：\n（1）创设良好的环境。\n（2）与启发引导相结合。\n（3）引导学生参与情境的创设。",mn:"设法参与",x:"· 为什么：情感陶冶是\"润物细无声\"的无意识影响，靠环境和情感氛围潜移默化地感染学生，故要求创设良好环境、与启发引导结合、引导学生参与情境创设。学生在美好情境中不知不觉受到熏陶。\n· 根源：对应\"暗示\"\"无意识教育\"思想；如\"近朱者赤，近墨者黑\"\"蓬生麻中，不扶而直\"，是其最佳记忆钩子。\n· 对比：陶冶是间接、无意识的，说服是直接、有意识的——这是二者本质区别。"},
 {n:130,cat:"德育",q:"简述道德修养法（道德指导法、自我修养法）的概念及要求",a:"道德修养法是指教师指导学生自觉主动地进行学习、自我反省，以实现思想转化及行为控\n制的方法。\n运用的基本要求：\n（1）培养学生自我修养的兴趣与自觉性。\n（2）指导学生掌握修养的标准。\n（3）引导学生积极参加社会实践。",mn:"十字标",x:"· 为什么：道德修养法的关键词是\"自我\"——靠学生自觉、自省、自我控制来实现品德的内化，是德育从\"他律\"走向\"自律\"的方法。故要求培养自我修养的兴趣与自觉性、掌握修养标准、参加社会实践来检验提升。\n· 根源：植根于中国传统修身思想，如儒家\"吾日三省吾身\"\"慎独\"，强调内省与自我磨炼。\n· 对比：道德修养法靠学生自我教育，区别于其余多为教师施加影响的方法——它最能体现\"自我教育\"这一德育最高目标。"},
 {n:131,cat:"德育",q:"简述品德评价法（奖惩法）的概念及要求",a:"品德评价法是指通过对学生品德进行肯定或否定的评价而予以激励或抑制，促使其品德健康形成\n和发展的方法。\n运用的基本要求：\n（1）要公平公正、正确适度、合情合理。\n（2）要发扬民主、获得群众支持。\n（3）注重宣传与教育。",mn:"教育公主",x:"· 为什么：品德评价法用肯定/否定（奖与惩）来强化或抑制行为，靠的是外部强化机制。要奖惩有效就必须公平公正、适度合理（否则失去公信力），还要发扬民主、获得群众支持、注重宣传教育（让评价起到教育而非单纯赏罚的作用）。\n· 根源：理论基础是斯金纳（美）的操作性条件作用——正强化（奖励）增加行为、惩罚抑制行为。\n· 对比：又称奖惩法，包含奖励、惩罚、操行评定、评比等具体形式，常考其属于\"巩固行为\"的方法。"},
 {n:132,cat:"德育",q:"简述中小学德育的途径",a:"（1）思想品德课和其他学科教学。\n（2）劳动和其他社会实践。\n（3）课外活动和校外活动。\n（4）学校共青团、少先队、学生会工作。\n（5）心理咨询。\n（6）班主任工作。\n（7）校园生活。",mn:"班主任会小心教伙食 / 文科统管实活",x:"· 为什么：德育不是单一渠道，而是渗透在学校生活方方面面。其中\"思想品德课与各科教学\"是基本途径（每天都在进行、覆盖面最广），\"班主任工作\"是重要而特殊的途径，其余如社会实践、课外校外活动、团队组织、心理咨询、校园生活则是有益补充，体现\"全员、全程、全方位\"育人。\n· 对比：常考\"基本途径\"——是思想品德课及其他各科教学，而非班主任工作或课外活动，需准确区分主次。"},
 {n:133,cat:"班级与班主任",q:"简述班主任的角色",a:"（1）学生思想道德的教育者。\n（2）学生日常生活的管理者。\n（3）学生健康成长的引导者。\n（4）学校文化的建设者。",mn:"见到教理",x:"· 为什么：班主任不是单一身份，而是围绕\"育人\"展开的多重角色。从抓思想（教育者）、管日常（管理者）、引方向（引导者），到把班级建成有文化的小社会（建设者），覆盖了学生的\"德—行—长—境\"四个层面。\n· 对比：注意与\"地位作用\"（设计者/领导者/协调者，第134题）区分——这里答的是\"我对学生扮演什么角色\"，那里答的是\"我在班级组织里处于什么位置\"。"},
 {n:134,cat:"班级与班主任",q:"简述新时期班主任的地位及作用",a:"（1）班主任是班级建设的设计者。\n（2）班主任是班级组织的领导者。\n（3）班主任是班级人际关系的协调者。",mn:"调剂领导",x:"· 为什么：这三点是从\"班级是一个组织\"的角度看的：先要设计蓝图（设计者），再带队执行（领导者），运行中还要摆平各种关系（协调者）。本质是\"规划—执行—调和\"的管理闭环。\n· 对比：易和第133题\"角色\"混。记忆钩子：133看的是\"对学生\"，134看的是\"对班级组织\"。"},
 {n:135,cat:"班级与班主任",q:"简述班主任工作的意义",a:"（1）班主任是班集体的组织者、领导者和教育者。\n（2）班主任是学校领导进行教导工作的得力助手和骨干力量。\n（3）班主任是学生健康成长、全面发展的引路人。\n（4）班主任是协调校内各种教育力量的纽带。\n（5）班主任是沟通学校、社会和家庭的桥梁。",mn:"教靓妞助人",x:"· 为什么：班主任意义之所以重大，是因为他同时连接三组关系：对班集体（组织者/教育者）、对学校教师群体（助手、协调纽带）、对校外（家校社桥梁）。一个岗位串起了\"班—校—家社\"三张网，所以不可替代。\n· 对比：与第134\"地位作用\"侧重不同——134谈班级内部组织职能，135强调班主任作为\"枢纽\"的辐射价值。"},
 {n:136,cat:"班级与班主任",q:"简述班主任素质的要求",a:"（1）要有为人师表的风范。\n（2）要相信教育的力量。\n（3）要有家长的情怀。\n（4）要有较强的组织亲和力。\n（5）要能歌善舞、多才多艺。",mn:"亲家能育人",x:"· 为什么：这些素质要求直接对应班主任要干的活：要带学生先得为人师表（榜样）、信任教育（信念）、像家长般关爱（情怀）、能组织能凝聚（亲和力），还要会搞活动（多才多艺）。素质是岗位职责的前置条件。\n· 对比：\"为人师表\"是底线，\"组织亲和力\"是班主任区别于普通任课教师的核心能力。"},
 {n:137,cat:"班级与班主任",q:"简述班主任工作的内容",a:"（1）了解和研究学生。\n（2）组织和培养班集体。\n（3）建立学生的成长档案。\n（4）组织班会活动和课外活动。\n（5）协调各种教育影响。\n（6）操行评定。\n（7）班主任工作的计划与总结。\n（8）教导学生学好功课。\n（9）个别教育工作。",mn:"九只鸡会成功定个鞋",x:"· 为什么：班主任工作内容可归为三块——了解学生是前提（不了解就没法教），组织培养班集体是中心（班级是育人载体），其余如班会课外活动、协调影响、操行评定、计划总结、教学、个别教育都是围绕这两条展开的具体抓手。\n· 对比：其中\"了解和研究学生\"是首要工作和基础，\"组织培养班集体\"是中心环节，常单独命题，需重点记。"},
 {n:138,cat:"班级与班主任",q:"简述操行评定的概念与注意要求",a:"操行评定是以教育目的为指导思想，以“学生守则”为基本依据，对学生一个学期内在学习、\n劳动、生活、品行等方面的小结和评价。\n注意要求：\n（1）操行评语要实事求是，抓住主要问题，有针对性，能反映学生思想品德的全面表现和\n发展趋向。\n（2）要充分肯定学生的进步，适当指出他们的主要缺点，指明努力方向，不可罗列现象，\n主次不分。\n（3）文字要简明、具体、贴切，避免伤害学生情感，造成家长误解。",mn:"使劲贴",x:"· 为什么：操行评定是对学生一学期表现的鉴定，写法上的几条要求都指向一个目的——既真实有据（实事求是、有针对性），又能促进学生发展（肯定进步、指明方向），还不能伤人（文字贴切、避免误解）。即兼顾\"评价的客观性\"与\"教育的发展性\"。\n· 对比：核心是\"评价为育人服务\"，不是简单打分排名，所以才强调\"指明努力方向\"而非\"罗列现象\"。"},
 {n:139,cat:"班级与班主任",q:"简述如何做好优等生的教育工作？",a:"优等生是那些品学兼优，在德、智、体、美、劳诸方面都得到较全面发展的学生。\n对优等生的教育：\n（1）严格要求，防止自满。\n（2）不断激励，弥补挫折。\n（3）消除嫉妒，公平竞争。\n（4）发挥优势，带动全班。",mn:"力求评优",x:"· 为什么：优等生最大的隐患不是能力而是心态——容易自满、受挫脆弱、招人嫉妒。所以教育重点不在提分，而在\"补心态短板\"：防自满、抗挫折、调人际，最后让其优势带动全班，实现集体增值。\n· 对比：与后进生教育正相反——后进生缺的是信心和动力（要发掘闪光点、激发动机），优等生缺的是谦逊和抗压（要严要求、防自满）。"},
 {n:140,cat:"班级与班主任",q:"简述如何做好中等生的教育工作？",a:"中等生，又叫“一般学生”或“中间生”，是指那些在班级中各方面都表现平平的学生。\n中等生有两个共同点：一是信心不足；二是表现欲不强。\n对中等生的教育：\n（1）重视对中等生的教育。\n（2）根据中等生的不同特点有的放矢地进行个别教育。\n（3）给中等生创造充分展示自己才能的机会，增强他们的自信心。",mn:"",x:"· 为什么：中等生的共同特征是\"信心不足、表现欲不强\"，最大问题是容易被忽视（注意力都给了尖子和后进）。所以教育三招都针对这一点：先重视（别遗忘他们）、再因人施教、再创造机会让他们露脸增信心。\n· 对比：中等生人数最多却最易被忽略，命题常考\"重视\"和\"创造展示机会\"这两点。"},
 {n:141,cat:"班级与班主任",q:"简述如何做好后进生的教育工作？",a:"后进生是指那些在学业成绩和思想品德等方面均暂时落后的学生。典型特征：求知欲不强；\n学习能力较低；意志力薄弱；没有良好的学习习惯；自卑、多疑心理和逆反心理严重；缺乏正确\n的道德观念和分辨是非、善恶的能力。\n对后进生的教育：\n（1）关心热爱与严格要求相结合。\n（2）培养和激发学习动机。\n（3）善于发掘后进生身上的“闪光点”，增强其自信心和集体荣誉感。\n（4）针对后进生的个别差异，因材施教，对症下药。\n（5）对后进生的教育要持之以恒。",mn:"恒心才发光",x:"· 为什么：后进生的典型问题是\"动机弱、信心低、有逆反\"，因此教育的逻辑是先打通情感（爱与严结合、消除戒备），再激发动机、用闪光点重建自信，再因材施教对症下药，最后强调持之以恒——因为转化必然有反复。\n· 对比：\"关爱+严格\"是前提，\"找闪光点\"是关键突破口，\"持之以恒\"对应德育过程长期反复的规律，是后进生教育区别于其他的标志点。"},
 {n:142,cat:"班级与班主任",q:"简述班主任工作艺术的形成基础",a:"（1）具有一颗爱心。\n（2）具有高尚的品格。\n（3）有扎实的专业知识。\n（4）掌握管理知识和管理技能，认识和掌握班级管理活动中的内在规律，正确运用管理方法。\n（5）要有一种永不衰竭的求知欲望，像一个永不疲倦的探险家，对未知充满渴望。",mn:"只管求艾格",x:"· 为什么：班主任工作\"艺术\"建立在四类基础上：情感基础（爱心）、人格基础（品格）、知识基础（专业知识+管理知识技能）、发展基础（求知欲）。也就是\"会爱+会做人+会专业+会管理+肯学习\"，艺术是这些要素长期积累的外显。\n· 对比：注意\"掌握管理知识和技能、认识班级管理内在规律\"这条最长、最易考，是把\"经验\"升华为\"艺术\"的关键。"},
 {n:143,cat:"班级与班主任",q:"简述班级管理的原则",a:"版本一：（1）符合学生身心发展特点。（2）规范性要求与尊重个性相统一。（3）引导学生的自主管理。（4）服务教学与学生的全面发展。\n版本二：（1）科学性原则。（2）民主性原则。（3）自觉性原则。（4）整体性原则。",mn:"自求全心 / 自学主体",x:"· 为什么：班级管理原则的核心是\"以学生为本\"——把学生当作管理的主体而非被管对象，所以要满足其发展需要、确立其主体地位、训练其自我管理能力。口诀\"自学主体/自求全心\"都指向\"学生主体、自主自治\"这一核心。\n· 对比：这与现代班级管理\"从专断走向民主\"的趋势一致，反对的是教师一人专断、学生被动服从的旧模式。"},
 {n:144,cat:"班级与班主任",q:"简述班级管理的内容",a:"（1）班级组织建设。\n（2）班级制度管理。\n（3）班级教学管理。\n（4）班级活动管理。",mn:"",x:"· 为什么：班级管理内容是按\"管什么\"分的四个对象：人（组织建设）、规（制度管理）、学（教学管理）、动（活动管理）。把班级当作一个需要运转的组织，从\"建班子—立规矩—抓学习—搞活动\"四方面全覆盖。\n· 对比：易与\"班级管理方法\"（第146题，目标/榜样/陶冶等）混——144是\"管理哪些方面\"，146是\"用什么手段管\"。"},
 {n:145,cat:"班级与班主任",q:"简述班级管理存在问题及应对策略",a:"（1）存在问题：\n①班主任对班级实施管理的方式偏重于专断型。\n②班级管理制度缺乏活力，学生参与班级管理的程度较低。\n（2）应对策略：建立以学生为本的班级管理机制：\n①以满足学生的发展需要为目的。\n②确立学生在班级中的主体地位。\n③训练学生自我管理班级的能力。",mn:"自发体",x:"· 为什么：当前班级管理两大问题（管理偏专断、学生参与度低）本质是同一个病根——把学生排除在管理之外。所以应对策略统一指向\"以学生为本\"：满足发展需要、确立主体地位、训练自我管理。问题与对策是一一对应的镜像。\n· 对比：和第143题原则同源，都强调\"学生主体\"，可对照记忆。"},
 {n:146,cat:"班级与班主任",q:"简述班级管理的方法",a:"（1）目标管理法。\n（2）榜样示范法。\n（3）情境陶冶法。\n（4）制度管理法。\n（5）舆论影响法。\n（6）心理疏导法。",mn:"只是心情与模样",x:"· 为什么：六种方法是从不同着力点影响学生：定方向（目标）、给标杆（榜样）、造氛围（情境陶冶）、立规矩（制度）、借集体压力（舆论）、疏心结（心理疏导）。覆盖了\"理性约束+情感熏陶\"两条路径。\n· 对比：情境陶冶法属\"无形熏陶\"，制度/舆论属\"刚性约束\"，心理疏导针对个体——命题常给情境让你判断用了哪种方法。"},
 {n:147,cat:"班级与班主任",q:"简述班集体的教育作用",a:"（1）有利于形成学生的群体意识。\n（2）有利于培养学生的社会交往能力与适应能力。\n（3）有利于训练学生的自我教育能力。",mn:"自我交往群体",x:"· 为什么：班集体之所以有教育力量，在于它提供了真实的\"小社会\"环境：在群体中产生归属（群体意识），在交往中学会相处（社会交往与适应），在自我管理中学会管自己（自我教育）。即\"集体育人\"——通过集体来教育个人。\n· 根源：\"在集体中、通过集体、为了集体\"的平行教育思想源自马卡连柯，本题的集体教育功能正体现这一理念。"},
 {n:148,cat:"班级与班主任",q:"简述一个好的班集体的特征",a:"（1）坚定正确的政治方向与明确的奋斗目标。\n（2）健全的组织机构与坚强的领导核心。\n（3）严格的规章制度与严明的组织纪律。\n（4）正确的集体舆论与良好的班风。",mn:"班级和睦",x:"· 为什么：好班集体的四个特征构成一套运转系统：有方向（目标）、有班子（组织领导）、有规矩（制度纪律）、有风气（舆论班风）。前三者是\"硬件骨架\"，正确舆论与良好班风是\"软件灵魂\"，缺一则集体松散。\n· 对比：与\"如何培养班集体\"（第149题）是\"结果\"与\"过程\"的关系——148是好班级长什么样，149是怎么把它建出来。"},
 {n:149,cat:"班级与班主任",q:"简述如何培养和建设良好的班集体？",a:"（1）共议并确立班集体发展目标。\n（2）民主选举班干部。\n（3）开展多样化的主题班会和教育活动。\n（4）营造积极向上的班级文化、舆论和班风。\n（5）完善班级各项规章制度（建立正常的班级秩序）\n（6）做好个别教育工作。",mn:"绘画标杆 / 各个绘画标杆",x:"· 为什么：培养班集体的步骤其实就是\"造出第148题那四个特征\"的过程：定目标、选班干（建组织核心）、搞活动、育班风舆论、立制度、抓个别教育。从\"立目标\"到\"建班子\"到\"养风气\"，是一条建设链。\n· 对比：\"确立共同目标\"是第一步也是核心动力，\"培养班干部、形成正确舆论\"是建设班集体的关键环节，常单独命题。"},
 {n:150,cat:"班级与班主任",q:"简述班级活动的组织程序",a:"（1）班级活动的策划。\n（2）班级活动的准备。\n（3）班级活动的开展。\n（4）班级活动的评估与拓展。",mn:"前（策划、准备）中（开展）后（评估与拓展）",x:"· 为什么：班级活动按时间线推进，遵循\"前—中—后\"逻辑：策划（定方案）和准备（备资源）是前期，开展是中期实施，评估与拓展是后期反思提升。任何活动管理都离不开这条\"谋划—执行—复盘\"主线。\n· 对比：记忆钩子\"前中后\"——策划+准备属前，开展属中，评估拓展属后。"},
 {n:151,cat:"班级与班主任",q:"简述课外活动的概念与作用",a:"课外活动是指在课堂教学之外，由学校组织指导或由校外教育机关组织指导的，用以补充课\n堂教学，有目的、有计划地实现教育方针要求的一种教育活动。\n作用：\n（1）课外活动有利于学生开阔眼界，获得知识。\n（2）课外活动有利于发展学生智力，培养学生的各种能力。\n（3）课外活动是进行德育的重要途径。\n（4）课外活动是因材施教，发展学生个性特长的广阔天地。",mn:"开智育才",x:"· 为什么：课外活动的作用都源于它\"补充课堂、形式自由\"的特点：课堂外更广阔，所以能开阔眼界（获知识）、动手实践（发展智力能力）、潜移默化（德育途径）、张扬个性（因材施教）。是课堂教学的延伸和补足。\n· 对比：课外活动是\"因材施教、发展个性特长\"的广阔天地，这点是它区别于统一性课堂教学的最大优势。"},
 {n:152,cat:"班级与班主任",q:"简述课外活动的特点",a:"（1）自愿性。\n（2）自主性。\n（3）灵活性。\n（4）实践性。\n（5）广泛性。",mn:"愿主灵活犯贱",x:"· 为什么：课外活动的特点都来自\"非强制、非统一\"的性质：学生自愿参加（自愿）、自己当主角（自主）、内容形式不拘（灵活）、重在动手做（实践）、面向所有人（广泛）。与课堂的\"必修、统一、教师主导\"恰成对照。\n· 对比：\"自愿性\"是课外活动最根本的特点，是它和必修课堂教学的本质分界。"},
 {n:153,cat:"班级与班主任",q:"简述课外、校外教育（课外活动）的主要要求",a:"（1）要有明确的目的性、计划性。\n（2）活动内容要丰富多彩，形式要多样化，要富有吸引力。\n（3）注意发挥学生集体和个人的主动性、独立性和创造性，并与教师指导相结合。\n（4）要考虑学生的兴趣爱好和特长，符合学生的年龄特征。\n（5）课堂教学与课外活动互相配合、互相促进。\n（6）因地、因校制宜。",mn:"因爱教,才瞩目",x:"· 为什么：课外活动要求的核心是\"既要有教师的计划指导，又要发挥学生的主动性\"。所以既强调目的计划性、与课堂配合，又强调内容多样、尊重兴趣特长、发挥学生主动独立创造。是\"指导\"与\"自主\"的平衡。\n· 对比：和第152特点（自愿自主）相呼应——特点说学生主动，要求则提醒\"主动不等于放任\"，仍需教师指导和明确目的。"},
 {n:154,cat:"班级与班主任",q:"简述班级突发事件处理的原则和方法",a:"（1）处理原则：\n①教育性原则。\n②客观性原则。\n③有效性原则。\n④可接受原则。\n⑤冷处理原则。\n（2）处理的方法：\n①沉着冷静面对。\n②机智果断应对。\n③公平民主处理。\n④善于总结引导。",mn:"客官教冷笑",x:"· 为什么：突发事件处理的原则和方法是一体两面：要冷静（冷处理）、就事论事（客观）、解决问题（有效）、学生能接受（可接受）、最终落到育人（教育性）。方法\"冷静—果断—公平—总结\"正是这些原则的操作化。核心是\"以育人为目的的理性应对\"。\n· 对比：\"教育性原则\"是灵魂——处理突发事件不是为了惩罚，而是借机教育，这点最易在材料题中考查。"},
 {n:155,cat:"班级与班主任",q:"简述班主任的责任",a:"（1）教育的责任。\n（2）培养的责任。\n（3）发现的责任。\n（4）激活的责任。\n（5）夯实的责任。",mn:"教培是激发",x:"· 为什么：班主任的五项责任层层递进：先教育、再培养，过程中要善于发现学生潜能、激活其内在动力，最后夯实成果。本质是从\"教\"到\"育\"再到\"激发主体\"的育人深化过程，强调班主任不只是管理者更是成长激励者。\n· 对比：易与\"班主任工作内容/角色\"混——责任强调的是班主任对学生成长应承担的使命，落脚在\"发现\"和\"激活\"这两个体现教育主动性的词上。"},
 {n:156,cat:"班级与班主任",q:"简述小学生学习习惯的培养",a:"（1）发挥课堂主渠道作用，培养小学生良好的学习习惯。\n（2）课堂中正确引导。\n（3）注重激励与表扬，对小学生进行正强化教育。\n（4）开展丰富多彩的活动，在活动中培养小学生良好的学习习惯。",mn:"岛主抢货",x:"· 为什么：小学生自控力弱、习惯尚未定型，所以培养学习习惯要抓两个主阵地——课堂（主渠道、正确引导）和活动（在做中养成），再配合正强化（激励表扬）巩固行为。即\"在主阵地中、用正强化、靠反复实践\"养成习惯。\n· 对比：\"正强化（激励表扬）\"是关键手段，符合小学生喜欢被肯定的年龄特点，比批评惩罚更有效。"},
 {n:157,cat:"班级与班主任",q:"简述现代学习方式的基本特征",a:"（1）主动性。\n（2）独立性。\n（3）独特性。\n（4）体验性。\n（5）问题性。",mn:"文艳独特的动力",x:"· 为什么：现代学习方式的五个特征统一于\"以学生为主体\"的理念：学生主动学（主动性）、能自主学（独立性）、有个性地学（独特性）、在亲历中学（体验性）、带着问题学（问题性）。与传统\"被动接受、统一灌输\"针锋相对。\n· 对比：\"主动性\"针对被动性、\"独立性\"针对依赖性、\"问题性\"针对接受性——每个特征都是对传统学习方式弊端的纠正，体现新课改\"转变学习方式\"的要求。"},
 {n:158,cat:"学生与师生关系",q:"简述学生的主要权利",a:"学生的主要权利：\n（1）受教育权。\n（2）人身权：身心健康权、人身自由权、人格尊严权和隐私权。\n（3）财产权。\n（4）平等权。\n（5）申诉权。",mn:"教人才平身 / 学术（诉）金价+其他",x:"· 为什么：学生既是“受教育的人”又首先是“公民”，所以权利分两块——作为学生特有的受教育权，和作为公民共有的人身权、财产权、平等权、申诉权。\n· 根源：学生权利源自《中华人民共和国教育法》《未成年人保护法》等，人身权细分为身心健康权、人身自由权、人格尊严权和隐私权，是常考的展开点。\n· 对比：易与“受教育者的义务”(第159题)配对考，权利讲“能享有什么”，义务讲“应做到什么”。口诀“教人才平身”。"},
 {n:159,cat:"学生与师生关系",q:"简述受教育者的义务",a:"（1）遵守法律、法规。\n（2）遵守学生行为规范，尊敬师长，养成良好的思想品德和行为习惯。\n（3）努力学习，完成规定的学习任务。\n（4）遵守所在学校或者其他教育机构的管理制度。",mn:"三遵守，一努力",x:"· 为什么：有权利就有对应义务，学生的义务核心是“守规矩+尽本分”——遵守法律法规、遵守行为规范尊敬师长、努力完成学习任务、遵守学校管理制度。\n· 根源：受教育者义务出自《中华人民共和国教育法》，与学生权利(第158题)是同一法律框架下的两面。\n· 对比：记忆抓“三遵守一努力”——遵守法规、遵守行为规范、遵守校规，加上努力学习这一条核心本分。"},
 {n:160,cat:"教师与法规",q:"简述教师职业（劳动）的特点",a:"教师职业特点：\n（1）价值性。（2）伦理性。（3）复杂性。（4）教育性。（5）创造性。",mn:"痔疮不负理喻 / 妇联煎个猪",x:"· 为什么：教师是用一种人格塑造另一种人格的职业，对象是活生生、有差异的人，所以劳动天然带有伦理性(以德育德)、复杂性(无标准件)、创造性(因材施教、教育机智)；又因为它影响的是人的精神成长和社会未来，故有价值性和教育性。\n· 对比：易与教师劳动的\"四个具体特点\"混——复杂性与创造性、连续性与广延性、长期性与间接性、主体性与示范性。本题是\"性质\"层面的概括，记\"价值/伦理/复杂/教育/创造\"。"},
 {n:161,cat:"教师与法规",q:"简述教师的角色",a:"（1）“家长代理人”和“朋友、知己者”的角色。\n（2）“传道、授业、解惑者”的角色。\n（3）“管理者”的角色。\n（4）“心理调节者”的角色。\n（5）“研究者”的角色。\n（6）教学活动的设计者、组织者和管理者。\n（7）学生学习的榜样（示范者角色）。\n（8）学校的管理者。",mn:"即使，传管家揪心",x:"· 为什么：角色多是因为教师面对的关系网多——对学生(传道授业、心理调节)、对班级事务(管理者)、对自身专业(研究者)、对成长榜样(示范者)，关系越多，要扮演的身份越多。\n· 对比：与新课改\"教师角色转变\"(促进者/研究者/建设开发者/社区开放型)区分——那一题是\"转变成什么\"，本题是\"客观上有哪些\"。"},
 {n:162,cat:"教师与法规",q:"简述教师的权利",a:"（1）进行教育教学活动，开展教育教学改革和实验（教育教学权）。\n（2）从事科学研究、学术交流，参加专业的学术团体，在学术活动中充分发表意见（科学研究\n权）。\n（3）指导学生的学习和发展，评定学生的品行和学业成绩（指导评定权）。\n（4）按时获取工资报酬，享受国家规定的福利待遇以及寒暑假期的带薪休假（获得报酬权）。\n（5）对学校教育教学、管理工作和教育行政部门的工作提出意见和建议，通过教职工代表大会\n或者其他形式，参与学校的民主管理（参与管理权、民主管理权）。\n（6）参加进修或者其他方式的培训（进修培训权）。",mn:"暴民凭教研修订权利",x:"· 为什么：权利是\"法律允许教师做\"的事，围绕教师履职展开，所以六项基本对应教学、科研、评价、报酬、管理、进修——做事的权(教育教学权)、谋生的权(报酬权)、发展的权(进修权)层层配套。\n· 根源/出处：《中华人民共和国教师法》第七条。\n· 对比：与\"义务\"(第八条)对照记——权利是\"我能\"，义务是\"我应\"，考试常给情境判断侵犯了哪项权利。"},
 {n:163,cat:"教师与法规",q:"简述教师的义务",a:"（1）遵守宪法、法律和职业道德，为人师表。\n（2）贯彻国家的教育方针，遵守规章制度，执行学校的教学计划，履行教师聘约，完成教育教\n学工作任务。\n（3）对学生进行宪法所确定的基本原则的教育和爱国主义、民族团结的教育，法制教育以及思\n想品德、文化、科学技术教育，组织、带领学生开展有益的社会活动。\n（4）关心、爱护全体学生，尊重学生人格，促进学生在品德、智力、体质等方面全面发展。\n（5）制止有害于学生的行为或者其他侵犯学生合法权益的行为，批评和抵制有害于学生健康成\n长的现象。\n（6）不断提高思想政治觉悟和教育教学业务水平。",mn:"教心法的职务",x:"· 为什么：义务是\"法律要求教师必须做\"的事，核心是守法为表、贯彻方针、教育学生、关爱尊重、保护学生、提升自我——本质都指向\"对国家负责、对学生负责、对专业负责\"。\n· 根源/出处：《中华人民共和国教师法》第八条。\n· 对比：第(5)条\"制止有害于学生的行为\"是高频考点，遇到教师对侵害学生坐视不管的情境，即违反此义务。"},
 {n:164,cat:"教师与法规",q:"简述教师专业发展内容",a:"教师专业发展内容\n（1）专业理念与师德。（2）专业知识。（3）专业能力。（4）专业自主。（5）专业数字素养。",mn:"德育能问心 / 人机自能识理",x:"· 为什么：专业发展是\"成为合格专业人\"的全部，理念师德是方向(为什么教)、知识是基础(教什么)、能力是手段(怎么教)、自主与数字素养是新时代追加的(自我更新、适应技术变革)，缺一不成完整专业体。\n· 对比：注意与第182题《专业标准》三维度(理念师德/知识/能力)区分——本题是\"五项\"扩展版，多了专业自主和数字素养。"},
 {n:165,cat:"教师与法规",q:"简述教师应具备的知识素养",a:"（1）系列的马列主义理论修养（政治理论素养）。\n（2）精深的学科专业知识——本体性知识。\n（3）广博的科学文化知识。\n（4）扎实的教育科学知识——条件性知识。\n（5）丰富的实践性知识。",mn:"",x:"· 为什么：教师既要\"懂教什么\"(本体性学科知识)，又要\"懂怎么教\"(条件性教育学心理学知识)，还要\"懂教学现场怎么应变\"(实践性知识)，再加政治理论打底、科学文化拓宽，才能既专又博。\n· 对比：本体性=学科专业知识，条件性=教育科学知识，实践性=教学经验中默会的知识，三者命名是高频选择题考点。"},
 {n:166,cat:"教师与法规",q:"简述教师应具备的能力素养",a:"（1）教学能力。\n（2）教育与组织管理能力\n（3）语言表达能力\n（4）自我调控能力。\n（5）教育科研能力。\n（6）教学反思能力。",mn:"",x:"· 为什么：能力素养围绕\"上好一节课、带好一个班、修炼好自己\"展开——教学、组织管理对外，语言表达是工具，自我调控、科研、反思对内，体现教师从\"会教\"到\"善教再改进\"的闭环。\n· 对比：教学反思能力是新课改后被特别强调的能力，常与\"反思型教师\"概念一起出题。"},
 {n:167,cat:"教师与法规",q:"简述教师专业发展阶段",a:"（1）“非关注”阶段。\n（2）“虚拟关注”阶段。\n（3）“生存关注”阶段。\n（4）“任务关注”阶段。\n（5）“自我更新关注”阶段。",mn:"",x:"· 为什么：阶段顺序反映关注点的迁移——还没当老师时不关注(非关注)、学习期开始设想(虚拟关注)、新手最怕活不下去/管不住课堂(生存关注)、站稳后转向把课教好(任务关注)、成熟后自觉求变(自我更新关注)，关注对象从\"自己\"逐步移向\"学生与自我突破\"。\n· 根源/出处：福勒(Fuller)的教师关注阶段论，叶澜等结合本土研究予以发展。"},
 {n:168,cat:"教师与法规",q:"简述影响教师专业发展的因素",a:"（1）内部因素。包括教师的生命发展阶段、人格特征、社会化水平及需要等。\n（2）外部因素。包括社会因素、学校因素和家庭因素。",mn:"",x:"· 为什么：人的成长都受\"内因+外因\"双重作用——内部如生命阶段、人格、需要决定发展动力与方向，外部如社会、学校、家庭提供土壤与条件，内因是根据、外因是条件。\n· 对比：可与\"影响身心发展的因素\"(遗传/环境/教育/主观能动性)类比记忆，逻辑同源——都是内外因辩证关系。"},
 {n:169,cat:"教师与法规",q:"简述教师专业发展的方式（方法、途径）",a:"（1）教师专业发展的方式或途径：\n①教师职前教育（起点和基础）；②新教师入职培训；\n③教师在职培训；④促进专业发展的自我教育；⑤开展教育科学研究。\n（2）教师个体专业化发展途径：①师范教育。②新教师的入职辅导。\n③在职培训。④自我教育。\n（3）教师成长的方法：①观摩和分析优秀教师的教学活动。②开展微格教学。③进行专\n门训练。④反思教学经验。",mn:"心烦自在 / 微观专反",x:"· 为什么：发展贯穿教师生涯全程，故途径按时间排——职前(起点)、入职(衔接)、在职(持续)、自我教育(内驱)、教科研(提升)；成长的具体方法(观摩、微格教学、专门训练、反思)则是把这些途径落地的操作手段。\n· 对比：波斯纳提出\"经验+反思=成长\"，反思是成长方法中的灵魂，常单独出题。"},
 {n:170,cat:"学生与师生关系",q:"简述良好（新型、社会主义新型、理想）师生关系的标准",a:"理想师生关系的特征。\n（1）尊师爱生，相互配合。\n（2）民主平等，和谐融洽。\n（3）合作共享，共同成长。",mn:"师生共享平等 / 民生交心",x:"· 为什么：好师生关系的三条标准对应三个维度——情感上尊师爱生、地位上民主平等、发展上合作共享，本质是把传统“师尊生卑”升级为平等共进的现代关系。\n· 对比：本题答“标准/特征”(是什么样),勿与第172题“构建方法”(怎么做)、第171题“作用”(有什么用)混淆,三题是同一主题的不同问法。口诀“师生共享平等”。"},
 {n:171,cat:"学生与师生关系",q:"简述良好师生关系的作用",a:"（1）良好的师生关系是教育教学活动顺利进行的保障。\n（2）良好的师生关系是构建和谐校园的基础。\n（3）良好的师生关系是实现教学相长的催化剂。\n（4）良好的师生关系能够满足学生的多种需要。\n（5）良好的师生关系有助于提高教师的威信，有助于师生心理健康发展。",mn:"教学生长微笑",x:"· 为什么：师生关系是教学的“地基与润滑剂”——关系好了，教学才顺(保障)、校园才和谐(基础)、师生互促才发生(教学相长)、学生需要才被满足、教师威信和双方心理才健康，五条作用层层递进。\n· 对比：本题(作用/有什么用)与第170题(标准)、第172题(方法)成套出现，作用题落脚在“价值与好处”。口诀“教学生长微笑”。"},
 {n:172,cat:"学生与师生关系",q:"简述良好师生关系构建的方法",a:"（1）了解和研究学生。\n（2）树立正确的学生观。\n（3）热爱、尊重学生。\n（4）不断提高自我修养，健全人格。\n（5）发扬教育民主。\n（6）主动与学生沟通，善于与学生交往。\n（7）正确处理师生矛盾。\n（8）提高法制意识，保护学生的合法权利。",mn:"严厉高扬，爱狗毛发",x:"· 为什么：构建方法的主语都是教师，因为师生关系中教师起主导，所以要从“懂学生、爱学生、提升自己、会沟通、依法办事”几个动作入手主动建设。\n· 对比：本题(怎么构建/方法)是实践操作题,与第170题(标准/是什么)、第171题(作用)区分;答题要落到教师的具体行为动词上。口诀“严厉高扬，爱狗毛发”。"},
 {n:173,cat:"学生与师生关系",q:"简述良好师生关系的影响因素",a:"（1）教师方面\n①教师对学生的态度。\n②教师领导方式。\n③教师的智慧。\n④教师人格因素。\n（2）学生方面\n学生影响师生关系的主要因素是学生对教师的认识。许多调查表明学生认为教师喜欢自己，\n就会主动亲近这位教师。\n（3）环境方面\n影响师生关系的环境主要是学校的人际关系、环境和课堂的组织环境等。",mn:"教师、学生、环境",x:"· 为什么：师生关系是双方加情境共同塑造的，所以影响因素自然分三块——教师方面(态度、领导方式、智慧、人格)是主导，学生方面关键在“学生怎么看老师”，环境方面指人际与课堂氛围。\n· 对比：本题(影响因素/受什么影响)易与第172题(构建方法/怎么做)混——因素是“被什么左右”,方法是“教师主动怎么做”。口诀“教师、学生、环境”三方面。"},
 {n:174,cat:"教师与法规",q:"简述立德树人的意义",a:"（1）立德树人是教育本质的反映。\n（2）立德树人是对我国教育传统的守正创新。\n（3）立德树人是马克思主义关于人的全面发展学说的中国化、时代化。\n（4）立德树人是新时代我国教育改革与发展的行动指南。",mn:"人质心动",x:"· 为什么：立德树人之所以重要，因为它回答了教育最根本的问题——培养什么人；它既是教育\"育人\"本质的体现，又承接传统、对接马克思主义全面发展学说，还为新时代教育改革指明方向，故是根本任务。\n· 根源/出处：党的教育方针，党的十八大首次明确\"把立德树人作为教育的根本任务\"。"},
 {n:175,cat:"教师与法规",q:"简述立德树人的核心要义",a:"（1）立什么德\n①坚守共产主义远大理想和中国特色社会主义共同理想。\n②广泛践行社会主义核心价值观。\n③传承中华优秀传统美德。\n④厚植爱国主义情怀。\n⑤铸牢中华民族共同体意识。\n（2）树什么人\n①社会主义建设者和接班人。\n②德智体美劳全面发展的人。\n③担当民族复兴大任的时代新人。",mn:"",x:"· 为什么：核心要义拆成\"立什么德\"和\"树什么人\"两问最清楚——德是从理想信念到民族认同的价值序列(由高到实)，人是从政治属性(建设者接班人)到素质属性(德智体美劳)再到时代使命(复兴大任新人)。\n· 根源/出处：党的教育方针，体现社会主义办学方向。"},
 {n:176,cat:"教师与法规",q:"简述在落实立德树人根本任务时，应如何建立学校、家庭、社会协同育人的机制",a:"简述在落实立德树人根本任务时，应如何建立学校、家庭、社会协同育\n人的机制。\n（1）发挥学校对立德树人的主导作用。\n（2）发挥家庭对立德树人的奠基作用。\n（3）发挥社会对立德树人的支持作用。\n（4）建立以学校为主导，家庭、社会与学校有机衔接的协同共育机制。",mn:"",x:"· 为什么：德不是学校能单独立起来的——学校系统专业故\"主导\"，家庭最早最亲故\"奠基\"，社会提供环境资源故\"支持\"，三者各司其职再衔接成机制，才能形成全方位育人合力。\n· 对比：注意三方定位的动词——学校\"主导\"、家庭\"奠基\"、社会\"支持\"，常考填空式判断，不要互换。"},
 {n:177,cat:"人的发展",q:"简述如何发挥学校对立德树人的主导作用",a:"（1）课程育人。\n（2）学科育人。\n（3）文化育人。\n（4）活动育人。\n（5）管理育人。\n（6）全员育人。",mn:"科学动画原理",x:"· 为什么：学校要当好立德树人的主导，就得把“育人”渗进学校运转的每个环节——课程、学科、文化、活动、管理、全员，本质是“全方位全员育人”，不让德育只停在思政课。\n· 对比：六个“育人”是落实立德树人的具体抓手，与立德树人的“意义”“核心要义”等理论题不同，本题答的是“怎么做”。口诀“科学动画原理”。"},
 {n:178,cat:"教师与法规",q:"简述如何发挥家庭对立德树人的奠基作用",a:"（1）增强家庭育人意识，发挥家长的榜样作用。\n（2）注重家教、家风，用良好的家教家风涵育道德品行。\n（3）建立学校、家庭和社会联合机制，加强家庭教育指导。",mn:"榜样指导家风",x:"· 为什么：家庭奠基靠\"潜移默化\"，所以抓手是榜样(家长以身作则)、家风家教(环境熏陶)、家校社联动(专业指导补位)——孩子最早的品德来自模仿父母与家庭氛围。\n· 对比：与社会的\"支持作用\"区分——家庭重情感熏陶与日常言传身教，社会重舆论环境与公共实践阵地。"},
 {n:179,cat:"教师与法规",q:"简述如何发挥社会对立德树人的支持作用",a:"（1）确立社会的自觉教育意识，构建社会共育机制。\n（2）发挥德育阵地的作用，组织开展主题教育实践活动。\n（3）广泛开展社会文明实践活动，推动公民的道德实践养成。\n（4）以正确的舆论营造良好的道德风尚。",mn:"自主文舆",x:"· 为什么：社会支持靠\"营造大环境\"，故四点都指向公共层面——树立社会育人意识、建德育阵地、搞文明实践、用正确舆论引导风尚，是给立德树人提供土壤和氛围。\n· 对比：社会作用关键词是\"舆论\"\"阵地\"\"公共实践\"，凡涉及报刊媒体、社会风气、公共活动的，归此项。"},
 {n:180,cat:"教师与法规",q:"简述家校合作方式有哪些?",a:"（1）家长委员会。\n（2）家长学校。\n（3）家长会。\n（4）家访。\n（5）家长开放日。\n（6）家长接待日。",mn:"学姐开放会员",x:"· 为什么：家校合作方式的差异在于\"谁主导、规模大小\"——家长委员会(常设组织)、家长学校(系统培训)、家长会(集体沟通)、家访(一对一深入)、开放日/接待日(双向了解)，由组织化到个别化覆盖不同沟通需求。\n· 对比：家访是教师主动入户、针对个别学生，区别于家长会的集体性，情境题常考选哪种方式更合适。"},
 {n:181,cat:"教师与法规",q:"简述《中小学教师专业标准》中的基本理念",a:"（1）师德为先。\n（2）学生为本。\n（3）能力为重。\n（4）终身学习。",mn:"师生能学",x:"· 为什么：四大理念回答了好教师\"靠什么立身\"——师德为先(德是根)、学生为本(育人宗旨)、能力为重(实践导向)、终身学习(发展保障)，四者从立场到能力到持续成长层层支撑。\n· 根源/出处：《中小学教师专业标准(试行)》(2012年教育部颁布)。"},
 {n:182,cat:"教师与法规",q:"简述《中小学教师专业标准》中的教师专业发展的内容",a:"（1）专业理念与师德。\n（2）专业知识。\n（3）专业能力。",mn:"能识理",x:"· 为什么：专业标准用\"理念师德、知识、能力\"三维度框定一名合格教师，对应\"做人方向(德)—知识储备(识)—实践本领(能)\"，是衡量教师专业性的总框架。\n· 根源/出处：《中小学教师专业标准(试行)》(2012)。\n· 对比：与第164题\"专业发展五项内容\"区分——专业标准只列三维度，多出的\"专业自主\"\"数字素养\"不属于本题。"},
 {n:183,cat:"教师与法规",q:"简述《中小学教师专业标准》规定的“专业理念与师德”包括哪些",a:"①职业理解与认识。\n②对（小）学生的态度与行为。\n③教育教学的态度与行为。\n④个人修养与行为。",mn:"小人教理 / 教人升职",x:"· 为什么：\"专业理念与师德\"是态度立场维度，故拆成四个对象——对职业(理解认识)、对学生(态度行为)、对教育教学(态度行为)、对自身(个人修养)，覆盖了教师面对的全部关系对象。\n· 根源/出处：《中小学教师专业标准(试行)》(2012)。"},
 {n:184,cat:"教师与法规",q:"简述《中小学教师专业标准》规定的“专业知识”包括哪些",a:"小学版：\n（1）小学生发展知识。\n（2）学科知识。\n（3）教育教学知识。\n（4）通识性知识。\n中学版：\n（1）教育知识。\n（2）学科知识。\n（3）学科教学知识。\n（4）通识性知识。",mn:"交通科展 / 学学交通知识",x:"· 为什么：知识维度小学版与中学版差别在\"学生知识 vs 学科教学知识\"——小学生身心可塑性强，故强调\"小学生发展知识\"；中学学科分化深，故强调\"学科教学知识\"，两者均含学科知识与通识性知识。\n· 根源/出处：《中小学教师专业标准(试行)》(2012)。\n· 对比：小学版=学生发展知识，中学版=教育知识+学科教学知识，是小学/中学版对比高频考点。"},
 {n:185,cat:"教师与法规",q:"简述《中小学教师专业标准》规定的“专业能力”包括哪些",a:"小学版：\n（1）教育教学设计。\n（2）组织与实施。\n（3）激励与评价。\n（4）沟通与合作。\n（5）发展与反思。\n中学版：\n（1）教学设计。\n（2）教学实施。\n（3）班级管理与教育活动。\n（4）教育教学评价。\n（5）沟通与合作。\n（6）反思与发展。",mn:"加四桶设施 / 班级加四桶设施",x:"· 为什么：能力维度中学版比小学版多一条——中学单列\"班级管理与教育活动\"，因中学生自主性强、班级事务更复杂；其余设计、实施、评价、沟通、反思两版相通。\n· 根源/出处：《中小学教师专业标准(试行)》(2012)。\n· 对比：小学版5条、中学版6条，区别就在中学多\"班级管理与教育活动\"，记\"中学多一管\"。"},
 {n:186,cat:"教师与法规",q:"简述在《义务教育课程方案（2022）》中，为落实培养目标，义务教育课程应遵循哪些原则？",a:"简述在《义务教育课程方案（2022）》中，为落实培养目标，义务教\n育课程应遵循哪些原则？\n（1）坚持全面发展，育人为本。\n（2）面向全体学生，因材施教。\n（3）聚焦核心素养，面向未来。\n（4）加强课程综合，注重关联。\n（5）变革育人方式，突出实践。",mn:"全全变诚心",x:"· 为什么：五原则对应新时代育人要求——全面发展(育人为本)、面向全体(因材施教)、聚焦核心素养(指向未来)、加强综合(打破学科壁垒)、变革方式(突出实践)，体现从\"教知识\"转向\"育素养\"。\n· 根源/出处：《义务教育课程方案(2022年版)》。\n· 对比：\"核心素养\"是2022方案的灵魂关键词，凡涉及2022课程改革取向，必落到核心素养导向。"},
 {n:187,cat:"教师与法规",q:"简述建立教师威信的途径",a:"（1）培养自身良好的道德品质。\n（2）培养良好的认知能力和性格特征。\n（3）注重良好仪表、风度和行为习惯的养成。\n（4）给学生以良好的第一印象。\n（5）做学生的朋友与知己。",mn:"能有第一德行",x:"· 为什么：威信源于学生发自内心的信服，故途径围绕\"让学生从认可你的德、信你的能、亲你的人\"展开——道德品质是根本、认知能力与性格是底气、仪表风度是外显、第一印象与做学生朋友是情感纽带。\n· 对比：威信(学生真心敬服)≠威严(靠权势压服)，区分这两个概念是常考易混点。"},
 {n:188,cat:"德育",q:"简述教师职业道德修养的方法",a:"（1）加强理论学习，注重内省、慎独。\n（2）确立可行目标，坚持不懈努力。\n（3）勇于实践磨炼，增强情感体验。\n（4）虚心向他人学习，自觉与他人交流。\n（5）正确开展批评和自我批评。",mn:"自我理论实践他人目标",x:"· 为什么：教师职业道德修养本质是一种自我教育，故方法都围绕\"自我提升\"展开——理论学习是基础（内省、慎独），确立目标是方向，实践磨炼是途径，向他人学习是借鉴，批评与自我批评是纠偏。从知到行、从内省到外学，构成完整的修养路径。\n· 根源：\"慎独\"出自《礼记·中庸》，指在无人监督时仍能坚守道德，是中国传统道德修养的最高境界，也是教师师德修养的经典要求。"},
 {n:189,cat:"教师与法规",q:"简述教师职业道德规范的基本内容",a:"（1）爱国守法。\n（2）爱岗敬业。\n（3）关爱学生。\n（4）教书育人。\n（5）为人师表。\n（6）终身学习。",mn:"三爱两人一终身",x:"· 为什么：六条围绕教师该\"对谁负责\"展开——爱国守法(对国家)、爱岗敬业(对职业)、关爱学生(对学生)、教书育人(对教育本职)、为人师表(对自身形象)、终身学习(对专业发展)，由外而内构成完整师德体系。\n· 根源/出处：《中小学教师职业道德规范》(2008年修订)。\n· 对比：口诀\"三爱两人一终身\"——三爱(国/岗/生)、两人(教书育人、为人师表)、一终身(终身学习)。"},
 {n:190,cat:"教师与法规",q:"简述新时代中小学教师职业行为十项准则",a:"（1）坚定政治方向。\n（2）自觉爱国守法。\n（3）传播优秀文化。\n（4）潜心教书育人。\n（5）关心爱护学生。\n（6）加强安全防范。\n（7）坚持言行雅正。\n（8）秉持公平诚信。\n（9）坚守廉洁自律。\n（10）规范从教行为。",mn:"真（政）爱秀人生、严惩强奸犯",x:"· 为什么：十项准则是师德的\"负面清单+正向要求\"细化版，从政治方向、爱国守法、文化传播、教书育人到安全、言行、公平、廉洁、规范从教，越往后越聚焦行为底线，回应了有偿补课、师德失范等现实问题。\n· 根源/出处：《新时代中小学教师职业行为十项准则》(2018年教育部印发)。\n· 对比：与2008《师德规范》区分——十项准则更细、更强调可操作的\"行为红线\"，是近年新增高频考点。"},

const KEY="edu_srs_v1";
const INTERVALS=[0,1,2,4,7,15,30]; // box -> 天数
const DAY=86400000;
function todayNum(){return Math.floor(Date.now()/DAY);}
let state=load();
function load(){
  let s={};
  try{s=JSON.parse(localStorage.getItem(KEY))||{};}catch(e){}
  CARDS.forEach((c,i)=>{ if(!s[i]) s[i]={box:0,due:todayNum(),seen:false}; });
  return s;
}
function save(){localStorage.setItem(KEY,JSON.stringify(state));}

let mode="srs", cat="全部", queue=[], pos=0, turned=false;

function buildCatOptions(){
  const cats=["全部",...new Set(CARDS.map(c=>c.cat))];
  document.getElementById("cat").innerHTML=cats.map(c=>`<option>${c}</option>`).join("");
}
function inCat(i){return cat==="全部"||CARDS[i].cat===cat;}

function buildQueue(){
  let idx=CARDS.map((_,i)=>i).filter(inCat);
  if(mode==="srs"){
    // 到期的（含新卡 box0 due<=today）
    queue=idx.filter(i=>state[i].due<=todayNum());
  }else{
    queue=idx.slice();
  }
  pos=0;turned=false;
}
function shuffleNow(){for(let i=queue.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[queue[i],queue[j]]=[queue[j],queue[i]];}pos=0;turned=false;render();toast("已打乱");}

function grade(g){ // 0不会 1模糊 2会
  const id=queue[pos];const s=state[id];s.seen=true;
  if(g===0) s.box=0;                                        // 不会：退回第0盒
  else if(g===1) { /* 模糊：盒子不变，间隔不变 */ }
  else if(g===2) s.box=Math.min(INTERVALS.length-1,s.box+1);// 记住：进下一盒，拉长间隔
  s.due=todayNum()+INTERVALS[s.box];
  save();
  pos++;turned=false;
  render();updateStats();
}

function toast(t){const el=document.getElementById("toast");el.textContent=t;el.classList.add("show");clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove("show"),1400);}

function render(){
  const stage=document.getElementById("stage");
  if(pos>=queue.length){
    stage.innerHTML=`<div class="empty"><b>🎉 ${mode==='srs'?'今日复习完成！':'本组已看完！'}</b><br><br>
      ${mode==='srs'?'到期卡片都过了一遍。明天再来，或切到『通览模式』继续看。':'切换分类或点『打乱顺序』再来一轮。'}</div>`;
    document.getElementById("bar").style.width="100%";
    return;
  }
  const id=queue[pos];const c=CARDS[id];const s=state[id];
  const boxTxt=s.box===0?(s.seen?"复习":"新卡"):`第${s.box}盒`;
  stage.innerHTML=`
    <div class="deck">
      <div class="flip ${turned?'turned':''}" id="flip" onclick="flip()">
        <div class="face front">
          <span class="box-badge">#${c.n} · ${boxTxt} · ${pos+1}/${queue.length}</span>
          <div class="cat">${c.cat}</div>
          <div class="q">${c.q}</div>
          <div class="hint">👆 点击卡片，先自己回忆，再翻看答案</div>
        </div>
        <div class="face back">
          <span class="box-badge">${c.cat}</span>
          <div class="cat">答案</div>
          <div class="a">${c.a}</div>
          ${c.mn?`<div class="mn">💡 ${c.mn}</div>`:''}
          ${c.x?`<details class="exp" onclick="event.stopPropagation()"><summary>📖 展开解析（为什么 · 根源 · 对比）</summary><div class="expbody">${c.x}</div></details>`:''}
        </div>
      </div>
    </div>
    ${turned
      ? `<div class="grade">
           <button class="g-bad" onclick="grade(0)">不会<br><small>明天再背</small></button>
           <button class="g-warn" onclick="grade(1)">模糊<br><small>短期再现</small></button>
           <button class="g-good" onclick="grade(2)">记住了<br><small>拉长间隔</small></button>
         </div>`
      : `<button class="reveal" onclick="flip()">显示答案</button>`}
  `;
  document.getElementById("bar").style.width=(pos/queue.length*100)+"%";
}
function flip(){turned=!turned;render();}

function updateStats(){
  let due=0,nw=0,mastered=0;
  CARDS.forEach((_,i)=>{
    const s=state[i];
    if(!s.seen)nw++;
    if(s.due<=todayNum())due++;
    if(s.box>=5)mastered++;
  });
  document.getElementById("s-due").textContent=due;
  document.getElementById("s-new").textContent=nw;
  document.getElementById("s-mastered").textContent=mastered;
  document.getElementById("s-total").textContent=CARDS.length;
}

function resetAll(){
  if(confirm("确定重置所有学习进度吗？此操作不可撤销。")){
    localStorage.removeItem(KEY);state=load();buildQueue();render();updateStats();toast("进度已重置");
  }
}

/* ============ 搜索：关键词直达卡片 ============ */
let matches=[], selIdx=-1;
const $search=document.getElementById("search"), $results=document.getElementById("results");

function runSearch(){
  const raw=$search.value.trim();
  if(!raw){hideResults();return;}
  const q=raw.toLowerCase();
  // 支持 #编号 直接定位
  const numMatch=raw.match(/^#?\s*(\d+)$/);
  if(numMatch){
    const n=+numMatch[1];
    matches=CARDS.map((c,i)=>i).filter(i=>CARDS[i].n===n);
  }else{
    matches=CARDS.map((c,i)=>i).filter(i=>{
      const c=CARDS[i];
      return (c.q+c.a+c.mn+c.cat).toLowerCase().includes(q);
    });
    // 标题命中的排在前面
    matches.sort((a,b)=>{
      const qa=CARDS[a].q.toLowerCase().includes(q)?0:1;
      const qb=CARDS[b].q.toLowerCase().includes(q)?0:1;
      return qa-qb || CARDS[a].n-CARDS[b].n;
    });
  }
  selIdx=matches.length?0:-1;
  renderResults();
}
function renderResults(){
  if(!matches.length){
    $results.innerHTML=`<div class="none">没有找到匹配的卡片，换个关键词试试～</div>`;
    $results.classList.add("show");return;
  }
  $results.innerHTML=matches.slice(0,30).map((idx,i)=>{
    const c=CARDS[idx];
    const mn=c.mn?` · 口诀：${c.mn}`:"";
    return `<div class="ri ${i===selIdx?'sel':''}" data-i="${i}">
      <span class="rn">#${c.n}</span>${c.q}<br><small>${c.cat}${mn}</small></div>`;
  }).join("")+(matches.length>30?`<div class="none">仅显示前30条，共${matches.length}条</div>`:"");
  $results.classList.add("show");
}
function hideResults(){$results.classList.remove("show");matches=[];selIdx=-1;}
function jumpTo(i){
  if(i<0||i>=matches.length)return;
  queue=matches.slice();      // 队列设为全部命中项，可逐张翻看
  pos=i;turned=false;
  render();
  hideResults();$search.blur();
  toast(`已定位 · 共${queue.length}张命中卡片`);
}

$search.addEventListener("input",runSearch);
$search.addEventListener("focus",()=>{if($search.value.trim())runSearch();});
$results.addEventListener("click",e=>{
  const ri=e.target.closest(".ri");if(ri)jumpTo(+ri.dataset.i);
});
$search.addEventListener("keydown",e=>{
  if(!matches.length)return;
  if(e.key==="ArrowDown"){e.preventDefault();selIdx=Math.min(matches.length-1,selIdx+1);renderResults();scrollSel();}
  else if(e.key==="ArrowUp"){e.preventDefault();selIdx=Math.max(0,selIdx-1);renderResults();scrollSel();}
  else if(e.key==="Enter"){e.preventDefault();jumpTo(selIdx<0?0:selIdx);}
  else if(e.key==="Escape"){hideResults();$search.blur();}
});
function scrollSel(){const el=$results.querySelector(".ri.sel");if(el)el.scrollIntoView({block:"nearest"});}
// 点击别处关闭结果
document.addEventListener("click",e=>{if(!e.target.closest(".searchbox"))hideResults();});

/* events */
document.getElementById("cat").addEventListener("change",e=>{cat=e.target.value;buildQueue();render();});
document.querySelectorAll("#mode button").forEach(b=>b.addEventListener("click",()=>{
  document.querySelectorAll("#mode button").forEach(x=>x.classList.remove("on"));
  b.classList.add("on");mode=b.dataset.m;buildQueue();render();
}));
document.addEventListener("keydown",e=>{
  // 在搜索框（或任意输入框）内打字时，不触发翻面/评分
  const t=e.target.tagName;
  if(t==="INPUT"||t==="TEXTAREA"||t==="SELECT")return;
  if(e.key===" "||e.key==="Enter"){e.preventDefault();flip();}
  if(turned){if(e.key==="1")grade(0);if(e.key==="2")grade(1);if(e.key==="3")grade(2);}
});

buildCatOptions();buildQueue();render();updateStats();
</script>
</body>
</html>
