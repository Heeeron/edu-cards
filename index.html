 {n:1,cat:"注意",s:"注意的种类",q:"无意注意的产生条件有哪些",a:"第一，客观条件。\n包括刺激物的新异性、强度、运动变化、刺激物与背景的对比或差异。\n第二，主观条件。\n包括人对事物的需要和兴趣，积极的情感态度，个人的情绪状态和精神状态，个人的心境、主观\n期待等。",mn:"对强心动",x:"· 为什么：无意注意是事先无目的、不需意志努力的注意，所以谁能抓住它取决于两端——刺激本身够不够抢眼（客观），以及人愿不愿意被它抓住（主观）。\n· 根源：源于注意的有意／无意之分，无意注意又叫不随意注意。\n· 对比：客观看刺激物的新异、强度、运动、对比；主观看需要、兴趣、情绪与期待，一外一内即可记全。"},
 {n:2,cat:"注意",s:"注意的种类",q:"简述有意注意的产生条件",a:"（1）对注意目的与任务的依从性。\n（2）对间接兴趣的依从性。\n（3）对活动组织的依从性。\n（4）对过去经验的依从性。\n（5）对人格的依从性。",mn:"牧区人火锅",x:"· 为什么：有意注意是自觉、有预定目的、需意志努力的注意，因此它的产生条件本质都在回答一个问题——如何让人主动维持注意，故离不开目的、间接兴趣、活动组织、经验与人格的支撑。\n· 根源：源于注意的有意／无意之分，有意注意又称随意注意。\n· 对比：无意注意靠刺激吸引（被动），有意注意靠目的与意志维持（主动），这是两者最根本的分界。"},
 {n:3,cat:"注意",s:"注意的概念与品质",q:"简述注意的概念及品质",a:"注意是心理活动或意识对一定对象的指向和集中。\n（1）注意的广度（注意的范围）。\n（2）注意的稳定性（注意的持久性）。\n（3）注意的分配。\n（4）注意的转移。",mn:"稳赚光赔",x:"· 为什么：注意是心理活动对对象的指向（选什么）和集中（多专注），四种品质正是从空间和时间两维度展开——广度管同时看多少、稳定性管能撑多久、分配管能否一心多用、转移管能否主动切换。\n· 对比：稳定性是无关刺激下被动走神的对立面（持久），转移是有任务要求时主动调整，两者都涉及时间，但一被动一主动，常作辨析题考点。"},
 {n:4,cat:"注意",s:"注意的概念与品质",q:"简述注意品质的培养措施",a:"（1）培养广泛而稳定的兴趣。\n（2）加强意志力锻炼。\n（3）养成严肃认真的学习态度。\n（4）考虑到学生的个别差异。",mn:"广志太差",x:"· 为什么：注意品质能否提升，关键在于让无意注意为我所用、让有意注意更可控，所以兴趣（引发无意注意）、意志力（支撑有意注意）、认真态度（保持自觉）三者缺一不可，再辅以因人而异。\n· 对比：本条是操作通识，记忆时可与注意品质（稳定、分配、转移、广度）对照，措施即为品质服务。"},
 {n:5,cat:"注意",s:"注意的规律与发展",q:"简述中小学生注意发展的特点",a:"（1）小学生注意发展的特点：\n①有意注意正在发展，但无意注意仍占主要地位。\n②注意集中的时间比较短。\n③注意的广度小，分配能力比较差。\n④具体、直观、新鲜的事物易引起儿童的注意。\n（2）中学生注意发展的特点：\n①注意稳定性提高，但发展速度相对较慢。\n②注意广度接近成人。\n③注意分配能力还不够成熟。\n④注意转移能力缓慢增长。",mn:"",x:"· 为什么：注意发展遵循从无意为主到有意逐步发展的总规律，故小学生无意注意仍占上风、广度小、集中时间短；中学生则稳定性、广度向成人靠拢，但分配与转移这类高级品质成熟最晚。\n· 对比：抓一条主线——年龄越小越依赖直观新异刺激（无意注意），年龄越大有意注意与各项品质越接近成人，但发展并不同步。"},
 {n:6,cat:"注意",s:"注意的规律与发展",q:"简述注意规律在教学中的应用",a:"（1）正确利用无意注意的规律组织教学。\n①创造良好的教学环境。②注重讲演、板书技巧和教具的使用。③注重教学内容的组织和教学形式的多样化\n（2）运用有意注意的规律组织教学，提高学习的自觉性。\n①明确学习的目的和任务。②培养间接兴趣。③合理组织课堂教学，防止学生分心。\n④运用多种教学手段。⑤排除无关因素的干扰。\n（3）善于运用无意注意和有意注意相互转换的规律。\n（4）要根据注意的特点和规律培养学生的注意。",mn:"抵制贱手扰 / 有无转点",x:"· 为什么：教学要顺应注意的两条规律——既用无意注意（靠环境、教具、形式多样吸引学生），又用有意注意（靠明确目的、培养间接兴趣维持自觉），更要善用两者相互转换，避免单靠任何一种导致疲劳或分心。\n· 根源：源于注意的有意／无意之分，二者转换规律是其核心应用。\n· 对比：单用无意注意易松散，单用有意注意易疲劳，故课堂需两者交替转换，这是本条的灵魂。"},
 {n:7,cat:"感知与观察",s:"感知觉的规律",q:"简述知觉的基本特性",a:"（1）选择性；（2）整体性；（3）理解性；（4）恒常性。",mn:"常选正解",x:"· 为什么：知觉是对事物整体的反映，四特性正回答知觉如何高效又稳定地把握世界——选择性决定看什么，整体性把部分合成整体，理解性用经验赋予意义，恒常性保证条件变化时认识不变。\n· 对比：选择性是从背景中挑对象；整体性是把零散组成一个东西；理解性是经验参与（知其为何物）；恒常性是大小、形状、颜色等不随距离光照而改变，四者切勿混淆。"},
 {n:8,cat:"感知与观察",s:"感知觉的规律",q:"简述感知规律在教学中的应用",a:"（1）灵活选用实物直观和模象直观。\n（2）加强词与形象的配合。\n（3）运用感知规律，突出直观形象的特点。\n（4）培养学生的观察能力。\n（5）让学生充分参与直观的过程。",mn:"选性感参观",x:"· 为什么：直观教学的核心是用好感知规律帮学生建立清晰表象，所以要选对直观形式（实物／模象）、让词与形象配合（避免只看不懂或只听无象）、突出对象特征、并让学生亲身参与，最终落到观察能力培养。\n· 对比：本条与感知规律（强度、差异、对比等）配套，规律讲原理，应用讲怎么用，可对照记忆。"},
 {n:9,cat:"感知与观察",s:"感知觉的规律",q:"简述感知的基本规律",a:"（1）强度律；\n（2）差异律；\n（3）对比律；\n（4）组合律；\n（5）活动律；\n（6）协同律。",mn:"",x:"· 为什么：感知规律本质是回答怎样让对象更容易被感知到，故六律都在调节刺激与背景的关系——强度够大、与背景有差异、形成对比、组合成群、处于活动、多感官协同，都会增强感知效果。\n· 对比：差异律是对象与背景不同，对比律是对象之间相互衬托，二者最易混；组合律强调空间上成组，活动律强调运动变化。"},
 {n:10,cat:"感知与观察",s:"观察",q:"简述观察的概念及品质",a:"观察是人的一种有目的、有计划、持久的知觉活动，是知觉的高级形式，又叫“思维的知\n觉”。\n（1）目的性；（2）客观性；（3）精细性；（4）敏锐性；（5）全面性；（6）深刻性；\n（7）顺序性。",mn:"慕课精锐全身顺",x:"· 为什么：观察是有目的、有计划、持久的知觉，是知觉的高级形式（思维的知觉），所以它的品质都围绕思维参与——既要有目的性与顺序性（计划），又要客观、精细、敏锐、全面、深刻（认识质量）。\n· 对比：观察与一般知觉的区别就在有无目的、计划与思维参与，这是它被称为思维的知觉的原因。"},
 {n:11,cat:"感知与观察",s:"观察",q:"简述观察力的概念以及如何培养学生的观察力",a:"观察力指观察的能力，即通过观察活动认识事物特点的能力。\n观察前：\n（1）在观察活动开始前，让学生明确观察的目的与任务，这是培养学生良好观察力的重要条件。\n（2）进行观察前要做充分的准备，制订周密的观察计划。\n（3）教会学生掌握一定的观察方法，使学生们具备观察事物或现象的必要知识。\n观察中：（4）在实际观察进行中，应该加强对学生的个别指导。\n观察后：\n（5）引导学生学会记录、整理观察结果，在分析研究的基础上，写出观察报告、日记和作文。\n（6）观察结束后，引导学生开展讨论、交流并汇报观察成果，不断提高学生观察能力，培养良好观察品质。",mn:"母鸡指路的方法很 6",x:"· 为什么：观察力是通过观察认识事物特点的能力，培养它必须贯穿观察前中后全过程——观察前明确目的、做好计划、教方法，观察中加强个别指导，观察后整理结果并交流，因为缺少目的与方法的观察等于盲看。\n· 对比：本条与观察品质相呼应，品质讲应达到什么标准，培养讲分阶段怎么练，按前—中—后顺序记最稳。"},
 {n:12,cat:"感知与观察",s:"观察",q:"简述中小学生观察力发展的特点",a:"（1）小学生观察力的特点\n①观察的目的性较差。②观察缺乏精确性。③观察缺乏顺序性。④观察缺乏深刻性\n（2）中学生观察力的特点\n①观察的目的更明确。②观察的持久性明显发展。③观察的精确性提高。④观察的概括性增强。",mn:"",x:"· 为什么：观察力发展同样遵循从低级到高级、从无意到有意的规律，故小学生在目的性、精确性、顺序性、深刻性上普遍较差；中学生则目的更明确、持久性与精确性提高、概括性增强。\n· 对比：抓住四个关键词——目的、精确、顺序、深刻（概括），小学生这几方面差，中学生这几方面强，正反对照即可。"},
 {n:13,cat:"记忆",s:"记忆概述",q:"简述记忆的概念及品质",a:"记忆是在头脑中积累和保存个体经验的心理过程。\n（1）记忆的敏捷性。\n（2）记忆的持久性。\n（3）记忆的准确性。\n（4）记忆的准备性。",mn:"准备劫持",x:"· 为什么：记忆是在头脑中积累和保存经验的过程，四品质恰好覆盖记忆的存与取全链条——敏捷性管记得快、持久性管存得久、准确性管记得对、准备性管用时能迅速提取。\n· 对比：敏捷性是输入快，准备性是输出快（提取），二者一进一出最易混；准确性强调无错，持久性强调不忘。"},
 {n:14,cat:"记忆",s:"记忆概述",q:"简述良好记忆品质的培养措施",a:"（1）提高记忆的敏捷性，应注意：①要明确识记的目的；②要集中注意力。\n（2）加强记忆的持久性，应注意：①要善于把识记的材料纳入已有的知识体系中；②进行及时和经常\n性的复习。\n（3）培养记忆的准确性，应注意：①必须进行认真的识记，在大脑皮层上建立精确的暂时神经联系；\n②在复习时要把相似的材料经常加以比较，防止混淆；③要把正确识记的事物同仿佛记住的东西区别\n开，把所见所闻的真实材料与主观的增补、臆测区别开来。\n（4）培养记忆的准备性，关键要使掌握的知识系统化，这样才能做到有条不紊的从记忆仓库中，随时\n迅速地提取所需要的材料。",mn:"",x:"· 为什么：培养记忆品质就是分别对症四种品质——要敏捷就明确目的、集中注意；要持久就纳入知识体系并及时复习；要准确就认真识记、比较防混淆；要准备就让知识系统化便于提取。\n· 对比：本条是品质（敏捷、持久、准确、准备）的逐一对应措施，记住品质就能反推措施，无须额外背人名。"},
 {n:15,cat:"记忆",s:"记忆概述",q:"简述瞬时记忆、短时记忆和长时记忆的特点",a:"（1）瞬时记忆的特点\n①时间极短；②容量较大；③形象鲜明；④信息原始。\n（2）短时记忆的特点\n①时间很短；②容量有限；③意识清晰；④操作性强；⑤易受干扰。\n（3）长时记忆的特点\n①容量无限；②保存时间长久。",mn:"短大显圆 / 绕墙有断情",x:"· 为什么：信息按瞬时—短时—长时的流向逐级加工，故特点呈递变规律——瞬时容量大但保持极短（约一两秒）、短时容量有限且易受干扰、长时则容量无限保持长久，越往后越稳定。\n· 根源：源于记忆三系统说，短时记忆容量为7±2个组块，由米勒提出。\n· 对比：三者区别看两点——保持时间（瞬时极短、短时很短、长时长久）和容量（瞬时大、短时有限、长时无限），是高频辨析点。"},
 {n:16,cat:"记忆",s:"记忆概述",q:"简述记忆过程的环节",a:"（1）识记；\n（2）保持；\n（3）回忆或再认。",mn:"记宝姨",x:"· 为什么：记忆是一个完整加工流程，三环节正对应信息的存入、留存、取出——识记是输入编码，保持是存储，回忆或再认是提取，缺任一环都不成其为记忆。\n· 对比：回忆是无线索时重现（如默写），再认是有对象时辨认（如选择题认出答案），同属提取环节但难度不同，常考区分。"},
 {n:17,cat:"记忆",s:"识记与遗忘",q:"简述影响识记的因素",a:"（1）识记的目的。\n（2）识记材料的性质和数量。\n（3）对识记材料的理解程度。\n（4）学习态度。\n（5）识记方法。\n（6）多种感官的协同活动。",mn:"木姐管方太质量",x:"· 为什么：识记是记忆的输入环节，影响因素都在回答什么能让编码更牢——有明确目的、材料性质数量适宜、理解透彻、态度积极、方法得当、多感官参与，本质是越主动越理解越易记。\n· 对比：本条与影响遗忘的因素高度重叠，但识记看输入端，遗忘看保持端，理解越深则记得牢、忘得慢，是两条主线的共同核心。"},
 {n:18,cat:"记忆",s:"识记与遗忘",q:"简述遗忘的规律",a:"遗忘在学习之后立即开始，最初遗忘速度很快，随着时间的推移，遗忘的速度逐渐下降。遗忘是有规\n律的，即遗忘的进程是不均衡的，其趋势是先快后慢、先多后少，呈负加速，并且到一定的程度就几\n乎不再遗忘了。",mn:"",x:"· 为什么：遗忘并非匀速流失，而是先快后慢、先多后少——刚学完信息最不稳定，丢失最快，残留下来的反而趋于稳定，故曲线呈负加速并最终趋于平缓。\n· 根源：源于艾宾浩斯遗忘曲线，揭示遗忘进程的不均衡性。\n· 对比：正因先快后慢，复习必须及时（趁遗忘高峰前巩固），这正是防止遗忘第一条及时复习的理论依据。"},
 {n:19,cat:"记忆",s:"识记与遗忘",q:"简述影响遗忘进程的因素",a:"（1）学习材料的性质。\n（2）识记材料的数量和学习的程度。\n（3）记忆任务的长久性与重要性。\n（4）识记的方法。\n（5）时间因素。\n（6）情绪和动机。\n（7）系列位置效应。\n（8）识记者的态度。",mn:"动情时间太久，爱情应无法保证质量",x:"· 为什么：遗忘发生在保持环节，影响因素都在回答什么让信息留得住或留不住——材料性质、数量与学习程度、任务重要性、方法、时间、情绪动机、系列位置、态度，核心仍是理解程度与学习程度越高越难忘。\n· 根源：时间因素的作用源于艾宾浩斯遗忘曲线（先快后慢）。\n· 对比：系列位置效应指开头（首因）和结尾（近因）记得好、中间易忘，是本条的特色考点。"},
 {n:20,cat:"记忆",s:"识记与遗忘",q:"简述防止遗忘的方法",a:"（1）及时复习。\n（2）合理分配时间。\n（3）分散复习与集中复习相结合。\n（4）反复阅读与试图回忆相结合。\n（5）复习方法要多样化。\n（6）运用多种感官进行复习。\n（7）适当过度学习。",mn:"度法官及时返回分配时间",x:"· 为什么：防止遗忘的方法都是在和遗忘曲线赛跑——因遗忘先快后慢，故要及时复习、合理分配时间；为对抗单调与疲劳，要分散与集中结合、多种方法多感官并用；过度学习则让记忆超额巩固更牢。\n· 根源：及时复习对应艾宾浩斯遗忘曲线，适当过度学习对应过度学习理论（约150%效果最佳）。\n· 对比：过度学习并非越多越好，超过150%收效递减，是常考细节。"},
 {n:21,cat:"记忆",s:"记忆的应用与发展",q:"简述提高记忆能力的方法",a:"（1）明确记忆目的，增强学习的主动性。\n（2）理解材料的意义，少用机械记忆。\n（3）对材料进行精加工，促进深度理解。\n（4）运用组块化策略，合理组织材料。\n（5）运用多重编码方式，提高加工质量。\n（6）注重复习方法，防止知识遗忘。",mn:"驸马家族得意",x:"· 为什么：提高记忆能力的方法对应记忆加工的各环节——明确目的增强主动（识记动机）、理解与精加工促进深层编码、组块化扩充短时容量、多重编码增加提取通道、复习对抗遗忘。\n· 根源：组块化策略源于短时记忆容量为7±2组块（米勒）；复习防遗忘源于艾宾浩斯遗忘曲线。\n· 对比：机械记忆只反复重复，意义记忆靠理解与精加工，后者效果远胜，是本条贯穿的理念。"},
 {n:22,cat:"记忆",s:"记忆的应用与发展",q:"简述记忆规律在教学中的运用",a:"第一，教学中识记和保持的组织。\n①要有明确的识记目的。②合理安排识记材料的数量。③根据材料性质，精心组织识记。\n④让识记材料成为直接操作的对象。⑤在理解的基础上识记。⑥合理选择识记方法。⑦运用尝试重现。\n第二，提高回忆的效果。\n①利用联想。②运用推理。③正确组织复习。\n④适当超额学习。⑤减少前摄抑制与倒摄抑制的干扰。⑥运用记忆的技术和方法。",mn:"作法重现李智的数目 / 连推纪超阻干扰 / 识记的措施",x:"· 为什么：记忆规律应用分两段——识记保持靠明确目的、控制数量、精心组织、理解识记等优化输入；提高回忆靠联想推理、组织复习、超额学习、减少前摄与倒摄抑制干扰来保障提取。\n· 根源：超额（过度）学习源于过度学习理论；组织复习源于艾宾浩斯遗忘曲线。\n· 对比：前摄抑制是先学干扰后学，倒摄抑制是后学干扰先学，减少二者干扰是提高回忆的关键，常考方向。"},
 {n:23,cat:"记忆",s:"记忆的应用与发展",q:"简述如何运用记忆规律促进知识的保持",a:"（1）深度加工材料。\n（2）有效运用记忆术。\n（3）进行组块化编码。\n（4）适当过度学习。\n（5）合理进行复习。",mn:"妈，财富过亿！",x:"· 为什么：促进知识保持的措施都指向让记忆编码更深、组织更优、巩固更足——深度加工与记忆术提升编码质量，组块化编码扩展容量，过度学习与合理复习对抗遗忘。\n· 根源：组块化编码源于短时记忆7±2组块（米勒）；过度学习源于过度学习理论；复习对应艾宾浩斯遗忘曲线。\n· 对比：本条与提高记忆能力的方法高度同源，区别仅在侧重保持环节，理解一套即可通吃两题。"},
 {n:24,cat:"记忆",s:"记忆的应用与发展",q:"简述中小学生记忆发展的特点",a:"（1）小学生记忆发展的主要特点\n①由无意识记为主向有意识记为主转化②由机械识记为主向意义识记为主转化③从具体形象识记为主向抽\n象识记为主发展。④机械识记和意义识记效果均随年龄增长而提高。⑤意义识记的保持量高于机械识记。\n（2）中学生记忆发展的主要特点：\n①记忆的容量日渐增大，短时记忆广度接近成人。\n②对直观形象的材料记忆要优于抽象材料，对图形记忆要优于词语记忆。\n③有意记忆逐渐占主导地位。④理解记忆成为主要记忆手段。⑤抽象记忆逐渐占据主导地位。",mn:"",x:"· 为什么：记忆发展遵循从无意到有意、从机械到意义、从具体形象到抽象的总规律，故小学生由无意、机械、形象识记为主逐步转化，中学生则有意记忆、理解记忆、抽象记忆占主导，容量接近成人。\n· 对比：抓三对转化——无意到有意、机械到意义、具体到抽象，小学正在过渡、中学基本完成，且意义识记效果始终优于机械识记。"},
 {n:25,cat:"思维与想象",s:"思维",q:"简述思维的含义及品质",a:"思维是人脑对客观事物的间接的、概括的反映。\n（1）思维的广阔性。（2）思维的深刻性。（3）思维的独立性。\n（4）思维的批判性。（5）思维的灵活性。（6）思维的敏捷性。（7）思维的逻辑性与严谨性。",mn:"广深判罗捷独活",x:"· 为什么：思维的本质是间接、概括地反映客观事物，因此它不直接面对事物本身，而是借助已有经验和符号去推断与归类——这正是它区别于感知觉的核心。\n· 为什么：品质都是同一思维能力在不同维度上的表现：广阔与深刻是“广度与深度”，独立与批判是“不盲从、能审视”，灵活与敏捷是“能变通、反应快”，逻辑严谨是“有条理”，合起来即一个高质量思维者的画像。\n· 对比：深刻性看“透不透”，广阔性看“宽不宽”，二者一深一广，不要混。"},
 {n:26,cat:"思维与想象",s:"思维",q:"简述良好思维品质的措施",a:"（1）加强科学思维方法的训练。\n（2）运用启发式方法调动学生思维的积极性、主动性。\n（3）加强言语交流训练。\n（4）发挥定势的积极作用。\n（5）培养学生解决实际问题的思维品质。",mn:"发誓解决胃炎",x:"· 为什么：思维品质是后天可训练的，所以培养的落脚点都在“给方法、给情境、给动力”：科学思维方法解决“怎么想”，启发式调动“愿意想”，言语交流外化思维便于检验，定势用对了能加速，最终都要在解决实际问题中检验和巩固。\n· 为什么：强调发挥定势的“积极”作用，是因为定势既能促进同类问题快速解决，也会僵化思路，教学要扬其长。"},
 {n:27,cat:"思维与想象",s:"思维",q:"简述思维的过程",a:"（1）分析与综合；\n（2）比较与分类；\n（3）抽象与概括；\n（4）具体化与系统化。",mn:"粉笔钙化",x:"· 为什么：思维过程的四对环节其实是层层递进的加工链：先分析综合把对象拆开再合起来，再比较分类找异同归类，然后抽象概括抽取共同本质，最后具体化系统化把概念用回实际并组成体系。\n· 对比：抽象是“抽取共性、舍弃个别”，概括是“把共性推广到同类”，一抽一推，配对出现。"},
 {n:28,cat:"思维与想象",s:"创造性思维",q:"简述创造性思维的过程",a:"（1）准备阶段。\n（2）酝酿阶段。\n（3）豁朗阶段。\n（4）验证阶段。",mn:"准备运货证",x:"· 为什么：创造性思维的四阶段对应一条从有意识到无意识再回到有意识的认知曲线：准备期有意识收集材料，酝酿期搁置后潜意识加工，豁朗期灵感突现（顿悟），验证期再用理性检验成果是否成立。\n· 根源：与本类“影响问题解决的酝酿效应”同源——搁置一段时间后突破，正是酝酿阶段的体现。\n· 对比：豁朗期是灵光一现的“啊哈”，验证期是冷静核对，一感性一理性。"},
 {n:29,cat:"思维与想象",s:"创造性思维",q:"简述创造性思维的含义及培养措施",a:"创造性思维是以新颖、独特的方式来解决问题的思维方式。\n版本一：（1）保护好奇心，激发学生的学习动机，培养学习兴趣和求知欲。（2）培养学生的发散思维和辐合思维。（3）改变传统的评定学习成绩的观念，鼓励学生创造性行为。（4）丰富想象力。（5）鼓励学生参加各项创造活动，培养创造性个性。\n版本二：（1）保护好奇心，激发求知欲。（2）创设创造性思维形成的氛围。（3）加强发散思维和直觉思维的训练。（4）陶冶创造性人格。",mn:"想念散心活动 / 想念散心活动氛围",x:"· 为什么：创造性思维是用新颖独特方式解决问题，所以培养措施都围绕“护动力、给能力、松环境”三条线：保护好奇心与求知欲是动力，训练发散与辐合思维、丰富想象是能力，宽松评价和创造氛围是环境。\n· 根源：发散思维（求异、多答案）与辐合思维（求同、定向）的区分源自吉尔福特，他认为二者结合才构成完整的创造力。\n· 对比：发散思维“一题多解”，辐合思维“多路归一”，创造离不开两者协同。"},
 {n:30,cat:"思维与想象",s:"概念与思维发展",q:"简述概念教学的基本要求",a:"（1）以感性材料作为概念掌握的基础。\n（2）合理利用过去的知识经验。\n（3）提供概念范例，配合运用正例和反例，适当运用比较。\n（4）突出有关特征，控制好无关特征的数量和强度，正确而充分地利用“变式”。\n（5）正确运用语言表达，明确提示概念的本质特征。\n（6）形成正确的概念体系，并运用于实践中。",mn:"感知正反变式与实践",x:"· 为什么：概念是对事物本质属性的概括，教学要求都服务于一个目标——让学生抓住本质、排除干扰：感性材料和正反例提供辨别基础，控制无关特征、用好变式是为了凸显本质而非表面，最后用语言点明本质并建立体系、回到实践。\n· 对比：正例帮助“归纳共性”，反例帮助“排除非本质”；变式则是变换无关特征、保留本质，三者目的都是逼近概念本质。"},
 {n:31,cat:"思维与想象",s:"概念与思维发展",q:"简述中小学生思维发展的特点",a:"（1）小学生思维发展的特点\n①从以具体形象思维为主要形式向以抽象逻辑思维为主要形式过渡。\n②抽象逻辑思维发展不平衡。\n③抽象逻辑思维从不自觉到自觉。\n④辩证逻辑思维初步发展。\n（2）中学生思维发展的特点\n①抽象逻辑思维日益占主导地位，并由经验型向理论型转化。\n②思维具有更强的预见性。\n③对思维的自我意识和监控能力显著增强。\n④思维的创造性提高。\n⑤青少年辩证思维迅速发展。",mn:"自证不过 / 床边煎臭鱼",x:"· 为什么：思维发展的主线是从具体形象思维向抽象逻辑思维过渡，小学正处在这个过渡的起点（不平衡、不自觉），中学则抽象逻辑思维占主导并由经验型转向理论型，所有特点都是这条主线在不同年龄的展开。\n· 为什么：之所以强调“不平衡、从不自觉到自觉”，是因为新的高级思维形式不会一蹴而就，需经历由低到高、由被动到主动的渐进。"},
 {n:32,cat:"思维与想象",s:"概念与思维发展",q:"简述小学生言语的培养措施",a:"（1）加强口语训练。要训练小学生说完整的话；加强口头造句练习和朗读训练；加强课堂中师生的对话；\n正确对待和处理口头言语学习过程中的一些特殊问题。\n（2）提高书面言语表达能力。加强识字教学，识字教学应以字形为重点和难点；加强阅读指导；注重作\n文训练。\n（3）促进内部言语发展。要注意培养书面言语的复述能力；加强分析段落、归纳中心思想的训练；加强\n作文训练。",mn:"",x:"· 为什么：言语培养紧扣言语发展的内外两条线——外部言语（口语、书面语）和内部言语，所以措施按“说—写—想”推进：先练口语打基础，再练书面语提升表达，最后通过复述、归纳促进内部言语，三者由外向内、相互促进。\n· 为什么：识字以字形为重点，是因为汉字以形表义、形近易混，字形过关才能为阅读写作扫清障碍。"},
 {n:33,cat:"思维与想象",s:"想象",q:"简述再造想象产生的条件",a:"（1）必须具有丰富的表象储备。\n（2）为再造想象提供的词语及实物标志要准确、鲜明、生动。\n（3）正确理解词语与实物标志的意义。",mn:"两词一象",x:"· 为什么：再造想象是根据现成的描述或图样在脑中重建形象，所以条件都指向“材料对不对、看不看得懂”：要有丰富表象作原料，词语和实物标志要准确鲜明作蓝图，还要正确理解其含义，缺一就会想错或想不出。\n· 根源：再造想象/创造想象的划分是想象的基本分类。\n· 对比：再造想象是“照着现成蓝图重建”，创造想象是“无现成蓝图、独立新创”，这是二者根本区别。"},
 {n:34,cat:"思维与想象",s:"想象",q:"简述创造想象产生的条件",a:"（1）强烈的创造愿望。\n（2）丰富的表象储备。\n（3）积累必要的知识经验。\n（4）原型启发。\n（5）积极的思维活动。\n（6）灵感的作用。",mn:"一只表象灵活起床",x:"· 为什么：创造想象是不依现成描述、独立创造新形象，所以条件比再造想象多了“主动创造”的成分：强烈创造愿望提供动力，丰富表象和知识经验提供原料，原型启发、积极思维和灵感提供突破口。\n· 根源：创造想象与再造想象同属想象的基本分类。\n· 对比：与再造想象相比，创造想象多了“创造愿望、原型启发、灵感”这些主动新创要素，因为它没有现成蓝图可循。"},
 {n:35,cat:"思维与想象",s:"想象",q:"简述想象的功能",a:"（1）预见功能。\n（2）补充功能。\n（3）替代功能。\n（4）调节功能。\n+创造功能",mn:"捕鱼接待",x:"· 为什么：想象是对表象的加工改造、形成新形象，这一“加工”能力作用于不同对象就产生不同功能：指向未来即预见，补不足即补充，代替不能实现的即替代，影响情绪生理即调节，产出新成果即创造。\n· 对比：预见是“想未发生的”，补充是“补已知的空白”，别因都涉想象而混淆其作用对象。"},
 {n:36,cat:"思维与想象",s:"想象",q:"简述想象的概念及品质",a:"想象是人脑对已储存的表象进行加工改造，形成新形象的心理过程。\n（1）主动性；（2）生动性；（3）丰富性；（4）现实性；（5）深刻性；（6）新颖性。",mn:"主动奉献身心",x:"· 为什么：想象的定义点出它是对已有表象的加工改造而形成新形象，因此品质都是这种加工的质量指标：主动性看是否自觉去想，生动丰富看形象是否鲜活多样，现实性看是否合乎实际，深刻新颖看是否有深度和独创。\n· 对比：现实性强调“合不合理”，新颖性强调“独不独特”，二者是想象既要立得住又要出新的两面。"},
 {n:37,cat:"思维与想象",s:"想象",q:"简述中小学生想象发展的特点",a:"（1）想象的有意性迅速发展。\n（2）想象的创造性成分逐步增多。\n（3）想象的现实性逐渐增强。\n（4）想象内容更加复杂、抽象概括性更高。",mn:"有意象创造现实",x:"· 为什么：想象发展的总趋势是由低级走向高级、由幼稚走向成熟，所以特点都体现这一升级：有意性增强即从随意到自觉，创造成分增多即从模仿到独创，现实性增强即从离奇到合理，内容更复杂抽象即从简单到深刻。\n· 为什么：现实性逐渐增强，是因为知识经验积累后，学生越来越能用现实标准约束想象，使之合情合理。"},
 {n:38,cat:"思维与想象",s:"想象",q:"简述培养学生想象力的方法",a:"（1）引导学生学会观察，丰富学生的表象储备。\n（2）引导学生积极思考，有利于打开想象力的大门。\n（3）引导学生努力学习科学文化知识，扩大学生的知识经验以发展学生的想象能力的空间。\n（4）注意发展学生的语言能力。\n（5）结合学科教学，有目的地训练学生的想象力。\n（6）引导学生进行积极的幻想。",mn:"幻想斯文言教官",x:"· 为什么：想象的原料是表象、动力是思维、空间靠知识，所以培养措施就从这三个源头入手：观察丰富表象，思考激活加工，学习扩大知识，再辅以语言能力和学科训练，并鼓励积极幻想给想象留出驰骋空间。\n· 为什么：强调“积极幻想”而非空想，是因为指向理想、与现实相联系的幻想能成为创造的先导。"},
 {n:39,cat:"问题解决与创造性",s:"问题解决",q:"简述问题解决的概念及一般过程",a:"为主】\n问题解决是指为了从问题的初始状态到达目标状态，而采取一系列具有目标指向性的认知操作的过程。\n（1）发现问题。（2）理解问题。（3）提出假设。（4）检验假设。",mn:"县里体检",x:"· 为什么：问题解决是从初始状态走向目标状态的、有目标指向的认知操作，所以一般过程就是一条解决问题的逻辑链：先发现问题（看出有问题），再理解问题（弄清问题实质），然后提出假设（想办法），最后检验假设（试办法）。\n· 根源：这是问题解决过程的经典阶段说。\n· 对比：发现问题是“有没有意识到问题”，理解问题是“能不能抓住关键”；理解问题（正确表征）往往是解决成败的关键一步。"},
 {n:40,cat:"问题解决与创造性",s:"问题解决",q:"简述影响问题解决的因素",a:"（1）问题情境。（2）定势与功能固着。\n（3）酝酿效应。（4）知识经验。\n（5）原型启发。（6）情绪与动机。\n除了上述因素外，个体的智力水平、性格特征、认知风格和世界观等个性心理特性也制约着问\n题解决的方向和效果。",mn:"酝酿知识，稳定情缘",x:"· 为什么：凡是会影响“认知加工”的因素都会影响问题解决，所以这些因素可分两类——帮倒忙的（定势、功能固着会僵化思路）和帮忙或两面的（知识经验、原型启发提供资源，酝酿效应靠搁置突破，情绪动机和情境影响投入状态）。\n· 根源：酝酿效应（搁置后顿悟）、原型启发（从相似事物受启发）均为问题解决研究的经典概念。\n· 对比：定势是“沿用旧方法的倾向”，功能固着是“只看到物体惯常用途”，二者都因思维僵化而阻碍解决。"},
 {n:41,cat:"问题解决与创造性",s:"问题解决",q:"简述问题解决能力的培养",a:"版本一：\n（1）鼓励质疑。（2）设置难度适当的问题。（3）帮助学生正确表征问题。\n（4）帮助学生养成分析问题的习惯。（5）辅导学生从记忆中提取信息。（6）训练学生陈述自己的假\n设及其步骤。\n版本二：\n（1）提高学生知识储备的数量与质量。（2）教授与训练解决问题的方法与策略。\n（3）提供多种练习的机会。（4）培养思考问题的习惯。",mn:"疑难症养心粥 / 双质双量一思考",x:"· 为什么：既然知识、表征、策略、习惯都影响问题解决，培养就是把这些影响因素逐一变成优势：充实知识储备打基础，教方法策略给工具，帮助正确表征问题抓关键，多练习促熟练，养成质疑和分析习惯固化为能力。\n· 为什么：强调“帮助正确表征问题”，是因为问题表征错了方向就全错，正确表征是有效解决的前提。"},
 {n:42,cat:"问题解决与创造性",s:"创造性概述",q:"简述创造性（创造力）的概念及特征",a:"创造性（创造力）是指个体产生新奇独特的、有社会价值的产品的能力或特性。\n（1）流畅性。\n（2）灵活性（变通性）。\n（3）独创性。",mn:"变毒瘤",x:"· 为什么：创造性是产生新奇独特且有社会价值的产品的能力，其三特征正是发散思维的三个衡量维度：流畅性看想法数量多不多，灵活性看思路能不能变通转向，独创性看答案是否新颖罕见。\n· 根源：流畅性、变通性、独创性作为创造性（发散思维）的核心指标，源自吉尔福特对发散思维的研究。\n· 对比：流畅性比“多”，灵活性比“活”，独创性比“新”，三者层层递进，独创性最能体现创造水平。"},
 {n:43,cat:"问题解决与创造性",s:"创造性概述",q:"简述中学生创造力的发展特点",a:"（1）中学生的创造力更多地带有现实性的特点。\n（2）中学生的创造力带有更大的主动性和有意性。\n（3）中学生的创造力较为成熟。\n（4）中学生的创造思维品质极大提升",mn:"现煮橙汁",x:"· 为什么：中学生认知、意志和思维品质都在走向成熟，创造力随之呈现出“更实、更主动、更成熟”的总特点：现实性强是因为知识经验丰富了能联系实际，主动有意性强是因为意志和自我意识发展了，整体趋于成熟则是思维品质提升的结果。"},
 {n:44,cat:"问题解决与创造性",s:"创造性概述",q:"简述创造性与智力的关系",a:"（1）低智商不可能具有高创造性。\n（2）高智商可能有高创造性，也可能有低创造性。\n（3）低创造性的人其智商水平可能高，也可能低。\n（4）高创造性者必须有高于一般水平的智商。",mn:"",x:"· 为什么：这四条共同说明创造性与智力是相关但不等同的关系——高智力是高创造性的必要而非充分条件，所以低智商出不了高创造（必要性），高智商却不一定高创造（非充分），低创造的人智商可高可低。\n· 根源：这种“低相关、阈值关系”源自吉尔福特等对创造力与智力关系的研究：智力达到一定阈值是创造的门槛，但越过门槛后二者关系就不再明显。\n· 对比：记忆钩子——高智商是创造的“入场券”，有票不一定能演出，没票一定进不去。"},
 {n:45,cat:"问题解决与创造性",s:"创造性概述",q:"简述高创造性者具有的个性特征",a:"（1）具有幽默感。\n（2）有抱负和强烈的动机。\n（3）能够容忍模糊与错误。\n（4）喜欢幻想。\n（5）具有强烈的好奇心。\n（6）具有独立性。",mn:"好想独抱尤物",x:"· 为什么：创造活动需要持久投入和敢于试错，所以高创造性者的个性特征都服务于这一点：好奇心和幻想提供探索动力，抱负和强烈动机维持坚持，容忍模糊与错误让人敢于冒险不怕失败，独立性使其不随大流、敢出新。\n· 为什么：“能容忍模糊与错误”尤为关键，因为创造过程充满不确定，怕错的人不敢偏离常规，也就难有突破。"},
 {n:46,cat:"问题解决与创造性",s:"创造性的培养",q:"简述应如何培养学生的创造性",a:"版本一：\n（1）创设有利于创造性产生的适宜环境。\n（2）注重创造性个性的塑造。\n（3）开设培养创造性的课程，进行创造性思维训练。\n版本二：\n（1）营造鼓励创造的环境。\n（2）培养创造性的队伍。\n（3）培育创造意识，激发创造动机。\n（4）开设创造性课程，教给创造技法。\n（5）发展和培养创造性思维。\n（6）塑造创造性人格。\n（4）培养创造性的队伍。\n（5）培育创造意识，激发创造动机。",mn:"进个城 / 一队进个城",x:"· 为什么：创造性的发挥需要适宜土壤、健全人格和专门训练，所以培养措施就围绕“环境—个性—课程”三个层面：营造鼓励创造、宽容失败的环境，塑造好奇独立的创造性人格，再开设专门课程教授创造技法、训练创造性思维。\n· 为什么：把“环境”放在首位，是因为压抑、怕错的氛围会扼杀创造，宽松安全的环境是其他措施生效的前提。"},
 {n:47,cat:"问题解决与创造性",s:"创造性的培养",q:"简述如何塑造学生的创造性个性",a:"（1）保护好奇心。\n（2）解除个体对答错问题的恐惧心理。\n（3）鼓励独立性和创新精神。\n（4）重视非逻辑思维。\n（5）给学生提供具有创造性的榜样。",mn:"好剧独飞扬",x:"· 为什么：创造性个性的核心是“敢想、敢错、敢与众不同”，所以塑造措施都在为这种心理松绑：保护好奇心留住探索冲动，解除答错的恐惧让人敢于尝试，鼓励独立和创新允许标新立异，重视非逻辑思维（直觉、灵感）并提供榜样示范。\n· 为什么：之所以要“解除对答错的恐惧”，是因为害怕出错会让学生退回安全的标准答案，创造正是从允许犯错开始的。"},
 {n:48,cat:"问题解决与创造性",s:"创造性的培养",q:"简述创造性思维训练常用的方法",a:"（1）发散思维训练。\n（2）推测与假设训练。\n（3）自我设计训练。\n（4）头脑风暴训练。\n（5）直觉思维训练。",mn:"自推直头发",x:"· 为什么：创造性思维训练的方法都在训练同一种能力——突破常规、产生新想法：发散思维训练求一题多解，推测假设训练敢于设想，自我设计训练独立构思，头脑风暴训练集体激发，直觉思维训练捕捉灵感。\n· 根源：头脑风暴法由奥斯本提出，核心是通过延迟评判激发大量新设想。\n· 对比：发散思维训练侧重“个人多想”，头脑风暴侧重“群体激荡”，但都以求新求多为目标。"},
 {n:49,cat:"问题解决与创造性",s:"创造性的培养",q:"简述头脑风暴训练的基本原则",a:"（1）让参与者畅所欲言，对所提出的方案暂不作评价或判断。\n（2）鼓励标新立异、与众不同的观点。\n（3）以获得方案的数量而非质量为目的，即鼓励多种想法，多多益善。\n（4）鼓励提出改进意见或补充意见。",mn:"倡议多见",x:"· 为什么：头脑风暴的全部原则都为一个核心服务——延迟评判、先量后质：暂不评价是为了消除顾虑让人敢说，鼓励标新立异是为了多产新设想，追求数量是因为想法越多越可能藏有好点子，鼓励补充改进则让设想之间相互激发。\n· 根源：头脑风暴法及“延迟评判”等原则由奥斯本提出。\n· 对比：记忆钩子——先“畅想”（不批评、多多益善），后“评判”，顺序绝不能颠倒，过早评价会扼杀灵感。"},
 {n:50,cat:"情绪情感与意志",s:"情绪",q:"简述情绪的概念及状态分类",a:"情绪一般指个体在其需要是否得到满足的情景中直接产生的心理体验和相应的反应。\n（1）心境；（2）激情；（3）应激。",mn:"",x:"· 为什么：情绪是需要被满足与否的即时体验，所以分类按“强度+持续时间”两维划分。\n· 根源：情绪三状态——心境（微弱持久、弥漫到一切，“忧者见之则忧”）、激情（强烈短暂、爆发式）、应激（突发紧急情境下的高度紧张）。\n· 对比：心境看“弥漫久”，激情看“猛而短”，应激看“意外逼出来”。"},
 {n:51,cat:"情绪情感与意志",s:"情绪",q:"简述学生良好情绪的标准",a:"（1）有良好情绪的学生能正确反映一定的环境的影响，善于准确表达自己的感受。\n（2）有良好情绪的学生能对引起情绪的刺激做出适当强度的反应。\n（3）有良好情绪的学生应该具备情绪反应的转移能力。\n（4）良好的情绪应符合学生的年龄特点。",mn:"大度一点",x:"· 为什么：好情绪不是“永远高兴”，而是“反应得当”，四条标准都在衡量情绪与现实是否匹配、可控。\n· 对比：核心是“适度”二字——强度适当、能转移、合年龄，反对过激或压抑。"},
 {n:52,cat:"情绪情感与意志",s:"情绪",q:"简述健康情绪的培养途径",a:"（1）形成正当的、合理的需要。\n（2）培养正确的人生观。\n（3）锻炼身体。\n（4）培养幽默感。\n（5）培养消除不良情绪的能力。",mn:"要断人感情",x:"· 为什么：情绪源于需要能否满足，所以培养健康情绪要从源头（合理需要、正确人生观）和出口（宣泄不良情绪）两端入手，身体与幽默是缓冲剂。\n· 对比：与“情绪调节措施”区分——本条是“养”长期心态，调节是“当下”具体降火。"},
 {n:53,cat:"情绪情感与意志",s:"情绪",q:"简述提高情绪调节能力的措施",a:"（1）教会学生形成适宜的情绪状态。\n（2）丰富学生的情绪体验。\n（3）引导学生正确看待问题。\n（4）教会学生情绪调节的方法。\n①合理宣泄法；②认知调节法；③意志调节法；④转移注意法；⑤幽默法。\n（5）通过实际锻炼提高学生的情绪调节能力。",mn:"和一人转悠 / 大夫适宜发迹",x:"· 为什么：情绪可调是因为它受认知和意志中介——改变看法、用意志控制、转移注意，都是切断“刺激→过激反应”的链条。\n· 对比：五种方法对应不同抓手——宣泄（疏导）、认知（改想法）、意志（靠自控）、转移（换焦点）、幽默（化解）。"},
 {n:54,cat:"情绪情感与意志",s:"情感",q:"简述情感的概念及分类",a:"情感一般指个体意识到自己与客观事物的关系后而产生的稳定的、深刻的心理体验和相应的反应。\n（1）道德感；（2）理智感；（3）美感。",mn:"",x:"· 为什么：情感与人的社会性需要相连，所以三类都指向高级社会价值——道德、求知、审美。\n· 根源：道德感（行为合不合道德规范）、理智感（求知探究中产生）、美感（对美的事物的体验）。\n· 对比：道德感看“善恶”，理智感看“真假/求知”，美感看“美丑”。"},
 {n:55,cat:"情绪情感与意志",s:"情感",q:"简述情感的品质以及良好情感品质的培养措施",a:"（1）品质\n①情感的倾向性。②情感的深刻性。③情感的稳定性。④情感的效能性。⑤情感的广阔性。\n（2）培养措施\n①提高对情感的认识树立正确的人生观和价值观。\n②培养和发展学生的正当需要。\n③通过实践活动增进认识，培育情感。\n④注意不良情感的调适与消除。\n⑤引导青少年加强自我修养和良好情绪的培养。",mn:"情深定能阔 / 关键要调休",x:"· 为什么：品质描述情感“朝哪、多深、稳不稳、起多大作用、覆盖多广”五个维度；培养则要先提认识、再供需要与实践、最后调适消除。\n· 对比：效能性指情感能否真正推动行动，是品质里最易忽略的一条。"},
 {n:56,cat:"情绪情感与意志",s:"情感",q:"简述情感的培养措施",a:"（1）提高对情感的认识。\n（2）创设培养情感的情境。\n（4）提高情感的自我控制能力。\n（3）组织培养情感的实践活动。",mn:"认清实质 / 知 / 情 / 意 / 行",x:"· 为什么：情感不能空讲，要“知→情境→实践→自控”逐步内化——先懂道理，再用情境与活动唤起体验，最后学会自我调控。\n· 对比：与“情绪调节”不同，本条重在长期“培育”而非临时“降温”。"},
 {n:57,cat:"情绪情感与意志",s:"情感",q:"简述情绪情感的功能",a:"（1）适应功能。（2）信号功能。（3）动机功能。（4）组织功能。\n（5）感染功能。（6）健康功能。（7）迁移功能。",mn:"十组信件感动姨",x:"· 为什么：情绪情感是“内部信号系统”——对内适应环境、激发动机、组织活动，对外发信号、相互感染并影响健康，故功能围绕“对己调节、对人沟通”展开。\n· 对比：信号功能是对外传递（表情让别人懂），动机功能是对内驱动（推动行动）。"},
 {n:58,cat:"情绪情感与意志",s:"情感",q:"简述中小学生情绪、情感的特点",a:"（1）小学生情绪、情感的特点\n①情绪、情感的动力特征明显。\n②友谊感逐渐发展。\n③情绪、情感的内容不断丰富。\n④情绪、情感的深刻性和稳定性不断增强。\n⑤情绪的调节能力得到快速的发展。\n（2）中学生情绪、情感的特点\n情绪：\n①情绪体验迅速。②情绪表现两极性、不稳定性。③外露性和内隐性并存。\n④体验的时间延长，出现心境化特点。\n⑤自尊心强烈而敏感。\n情感：\n⑥情感的社会性加强。⑦理智感、美感和道德感丰富和深化。",mn:"杰克有溶洞 / 书记敢露美蹄子",x:"· 为什么：随年龄增长，情绪从外露冲动走向内隐稳定，情感内容从简单走向社会化、理智化，这是社会化与自我意识发展的必然。\n· 对比：中学生最大特点是“两极性+内隐性并存”——既易激动又会掩饰。"},
 {n:59,cat:"情绪情感与意志",s:"情感",q:"情绪与情感有什么区别与联系",a:"情绪与情感的区别：\n（1）情绪的产生与有机体的自然需要有关，而情感的产生则与人的社会性需要有关。\n（2）情绪是人和动物所共有的心理现象，而情感则是人类特有的一种心理现象。\n（3）情绪产生早，情感产生晚。\n（4）情绪具有情境性和动摇性，情感则具有稳定性和深刻性。\n（5）情绪具有外显性和冲动性，情感则具有内隐性和持久性。\n情绪与情感的联系：\n（1）情感离不开情绪，稳定的情感是在情绪的基础上形成的，并通过情绪反应得以表达。\n（2）情绪也离不开情感，情感的深度决定着情绪的表现强度，情感的性质决定了在一定情境下情绪\n表现的形式。\n（3）情绪是情感的外部表现，情感是情绪的本质内容，二者是难以分离的心理现象，是同一事物的\n两个侧面。",mn:"",x:"· 为什么：二者是同一心理现象的两面——情绪偏“生理需要、短暂外显”，情感偏“社会需要、稳定内隐”；情感是情绪的本质内容，情绪是情感的外部表现。\n· 对比：人和动物共有的是情绪，人类特有的是情感；情绪产生早、情感产生晚。"},
 {n:60,cat:"情绪情感与意志",s:"意志",q:"简述意志的概念及基本特征",a:"意志是有意识地确立目的，调节和支配行动，并通过克服困难和挫折，实现预定目的的心理\n过程。\n（1）意志有明确的目的性。\n（2）意志对活动有调节作用。\n（3）克服困难是意志行动最重要的特征。\n（4）意志以随意动作为基础。",mn:"困意节目",x:"· 为什么：意志的核心是“自觉确立目的→克服困难→实现目的”，所以特征都围绕“目的—行动—克难”展开，其中克服困难是最重要标志。\n· 对比：没有困难就谈不上意志，“克服困难”是区分意志行动与普通行动的关键。"},
 {n:61,cat:"情绪情感与意志",s:"意志",q:"简述意志的品质",a:"（1）意志的自觉性。\n（2）意志的果断性。\n（3）意志的坚持性。\n（4）意志的自制性。",mn:"自制坚果",x:"· 为什么：四种品质对应意志行动的不同环节——自觉性（定目标）、果断性（做决定）、坚持性（顶到底）、自制性（控冲动）。\n· 对比：果断性是“迅速合理决断”，自制性是“抑制不当冲动”，二者一进一守。"},
 {n:62,cat:"情绪情感与意志",s:"意志",q:"如何培养良好意志品质",a:"（1）加强生活目的性教育，树立科学的世界观、远大的理想和信念，培养学生行为的目的\n性，减少其\n行动的盲目性。\n（2）加强养成教育，培养学生的自制能力。\n（3）组织实践活动，在困难环境中锻炼学生的意志，让学生获得意志锻炼的直接经验。\n（4）教育学生正确地对待挫折。\n（5）根据学生意志品质的差异，采取不同的锻炼措施。\n（6）发挥教师、班集体和榜样的模范作用，给予必要的纪律约束。\n（7）加强自我锻炼，从点滴小事做起。",mn:"异地恋成折磨事",x:"· 为什么：意志靠“练”不靠“讲”——先立目的减少盲目，再在实践和挫折中磨炼，并借榜样、纪律外部约束加自我锻炼。\n· 对比：与“意志品质（n61）”区分，本条是“怎么培养”的操作措施。"},
 {n:63,cat:"情绪情感与意志",s:"意志",q:"简述中小学生意志的发展特点",a:"小学生意志的发展特点：\n（1）小学生意志比较薄弱，容易冲动，自制力差。\n（2）小学生意志活动的自觉性、持久性差。\n（3）小学生容易受外界的暗示，不加选择地模仿他人的行为。\n（4）小学生意志方面有时还表现任性、执拗、固执己见等不良倾向。\n中学生意志的发展特点：\n（1）少年期意志发展的特点：\n①自觉性和幼稚性、独立性与依赖性处在矛盾状态。\n②果断性品质有发展，反应快、行动快，但有轻率表现。\n③自制能力有所增强，但自制力水平有局限性。\n④坚韧性还不成熟，其行为容易虎头蛇尾，半途而废。\n（2）青年期意志发展特点：\n①自觉性大大提高。②自制性增强。③坚持性发展。④意志品质还有待磨炼。",mn:"",x:"· 为什么：意志随自觉性、自制力的成熟而发展——小学薄弱易冲动，少年矛盾且轻率，青年趋于自觉坚定，体现“从他控到自控”。\n· 对比：少年期典型是“果断却轻率、自制却有限”的矛盾状态。"},
 {n:64,cat:"需要动机·能力智力",s:"需要·动机·兴趣",q:"简述需要的概念及马斯洛需要层次理论",a:"需要是有机体内部的一种缺乏或不平衡状态，它表现在有机体对内部环境或外部生活条件的一种稳定\n的要求，并成为有机体活动的源泉。\n（1）生理需要。\n（2）安全需要。\n（3）归属与爱的需要。\n（4）尊重的需要。\n（5）认知需要（求知需要）。\n（6）审美需要。\n（7）自我实现的需要。",mn:"李安蜀中求美食",x:"· 为什么：需要是“内部缺乏”驱动行为的源泉，层次由低到高，低层次基本满足后才向上追求。\n· 根源：马斯洛需要层次——生理、安全、归属与爱、尊重、（认知、审美）、自我实现；前四为缺失需要，后为成长需要。\n· 对比：自我实现是最高层，指充分发挥潜能、成为想成为的人。"},
 {n:65,cat:"需要动机·能力智力",s:"需要·动机·兴趣",q:"简述动机的概念及功能",a:"动机是指激起和维持个体的活动并使活动朝向某一目标的内部推动力量。\n（1）激活功能；\n（2）指向功能；\n（3）维持和调整功能。",mn:"吃整只鸡",x:"· 为什么：动机是“推动+导向”的内部力量，三大功能正好对应行为的“启动→方向→持续”全过程。\n· 根源：动机功能——激活（发动行为）、指向（朝向目标）、维持和调整（坚持并修正）。\n· 对比：需要是源泉（缺什么），动机是动力（推着去做），需要在动机之先。"},
 {n:66,cat:"需要动机·能力智力",s:"需要·动机·兴趣",q:"简述兴趣的概念及作用",a:"兴趣是人们对事物的一种认识倾向，伴随着积极的情绪体验。\n（1）对未来活动的准备作用。\n（2）对正在进行的活动起推动作用。\n（3）对活动的创造性态度的促进作用。",mn:"腿准粗",x:"· 为什么：兴趣是带积极情绪的认识倾向，所以它能“提前准备、当下推动、促进创造”——对未来、现在、质量三个时段都起劲。\n· 对比：准备作用面向“未来活动”，推动作用面向“正在进行”，别记反。"},
 {n:67,cat:"需要动机·能力智力",s:"需要·动机·兴趣",q:"简述兴趣的品质",a:"（1）兴趣的广度。\n（2）兴趣的中心。\n（3）兴趣的稳定性。\n（4）兴趣的效能。",mn:"小心光腚",x:"· 为什么：四品质从“广不广、有没有核心、稳不稳、有没有效”描述兴趣，类似情感品质的衡量逻辑。\n· 对比：中心指有无主导兴趣，效能指兴趣能否真正推动行动见成效。"},
 {n:68,cat:"需要动机·能力智力",s:"需要·动机·兴趣",q:"简述学习兴趣的培养与激发",a:"（1）通过各种活动发展学生的兴趣。\n（2）通过提高教学水平，引发学生兴趣。\n（3）引导学生将广泛兴趣与中心兴趣结合起来。\n（4）要根据学生的年龄特征来提高学生的学习兴趣。\n（5）要根据学生的知识基础培养学生的学习兴趣。\n（6）通过积极的评价使学生兴趣得以强化。\n（7）充分利用原有兴趣的迁移。",mn:"积极动员中年教师",x:"· 为什么：兴趣可激发，是因为它源于需要与积极体验——通过活动、好教学、积极评价不断给予满足和正反馈，并利用迁移借力。\n· 对比：要点落在“广泛兴趣与中心兴趣结合”，呼应兴趣品质中的“中心”。"},
 {n:69,cat:"需要动机·能力智力",s:"能力",q:"简述能力与知识、技能的关系",a:"能力与知识、技能既有联系又有区别。\n联系体现在以下两方面：\n（1）知识、技能是能力形成与发展的基础。\n（2）知识、技能的掌握又是以一定的能力为前提条件的。\n区别体现在以下三方面：\n（1）能力、知识和技能属于不同的范畴。\n（2）能力、知识和技能具有不同的概括水平。\n（3）能力、知识和技能的发展水平不同步。",mn:"",x:"· 为什么：三者不同范畴但相互依存——知识技能是能力的基础，能力又是掌握知识技能的前提，故“既联系又区别”。\n· 对比：知识=经验系统，技能=活动方式，能力=个性心理特征；三者概括水平和发展不同步。"},
 {n:70,cat:"需要动机·能力智力",s:"能力",q:"简述能力的概念以及影响能力形成与发展的因素",a:"能力是指直接影响个体的活动效率，促使活动顺利完成的个性心理特征。\n（1）先天素质。\n（2）早期经验。\n（3）教育与教学。\n（4）社会实践。\n（5）主观努力。",mn:"关键先早学",x:"· 为什么：能力是“影响活动效率”的个性特征，其形成是先天（素质）与后天（早期经验、教育、实践、努力）共同作用的结果。\n· 对比：先天素质是“前提”，教育实践是“决定”，主观努力是“内因”。"},
 {n:71,cat:"需要动机·能力智力",s:"能力",q:"简述如何对学生进行能力的培养",a:"（1）注重对学生早期能力的培养。\n（2）在教学中要加强知识与技能的学习与训练。\n（3）在教学中要针对学生的能力差异因材施教。\n（4）在教学中要积极培养学生的元认知能力和创造能力。\n（5）社会实践活动是培养学生能力的基本途径。\n（6）要注意培养学生的非智力因素。",mn:"早知姻缘非实践",x:"· 为什么：培养能力要顺着“早期奠基→知识技能打底→因材施教→元认知与创造提升→实践落地”的链条，并兼顾非智力因素。\n· 对比：实践活动是培养能力的“基本途径”，非智力因素是“助推器”。"},
 {n:72,cat:"需要动机·能力智力",s:"智力",q:"简述智力的概念以及与非智力因素之间的关系",a:"智力是人们顺利地解决某种活动所必需的各种认知能力的有机结合，是一种综合的认识能力。\n智力与非智力因素之间是相互作用的关系，具体表现为：\n（1）智力促进非智力因素的发展。\n（2）非智力因素又能支配智力活动，只有在非智力因素的主导下，智力活动才会积极主动，\n才会克服困难、坚持到底。\n（3）非智力因素还能补偿智力方面的弱点。",mn:"",x:"· 为什么：智力是各种认知能力的综合，非智力因素（动机、情感、意志等）是其动力与方向，二者相互作用：智力促进非智力，非智力支配并补偿智力。\n· 对比：智力解决“能不能”，非智力解决“肯不肯、坚不坚持”。"},
 {n:73,cat:"需要动机·能力智力",s:"智力",q:"简述加德纳的多元智能理论以及对新教育教学改革的启示",a:"语言智力、数理逻辑智力、空间智力[美]、音乐智力、身体运动智力[体]、人际交往智力、内省智力（自知\n智力）、\n自然观察者智力、存在智力。\n启示：\n（1）积极乐观的学生观；（2）科学的智力观；（3）因材施教的教学观；（4）多样化的人才观和成才观。",mn:"语数音体美，人际与自知，存在自然中 / 学智教人成才",x:"· 为什么：加德纳主张智力是多元、相对独立的，不能用单一分数衡量，故启示落在“用多把尺子看学生、因材施教、多样成才”。\n· 根源：加德纳多元智能——语言、数理逻辑、空间、音乐、身体运动、人际、内省、自然观察（及存在）智力。\n· 对比：勿与斯滕伯格三元理论（成分/经验/情境）混淆——加德纳是“多元”，斯滕伯格是“三元”。"},
 {n:74,cat:"人格(性格气质)",s:"人格",q:"简述人格的概念及特征",a:"人格是决定个体的外显行为和内隐行为，并使其与他人行为有稳定区别的综合心理特征。\n（1）独特性；\n（2）稳定性；\n（3）统合性（整合性）；\n（4）功能性；\n（5）复杂性；\n（6）社会性。",mn:"舌吻中毒能咋整",x:"· 为什么：六个特征其实围绕一条主线——人格是“一个人区别于他人且能持久存在”的心理系统。独特性回答“和别人不同”，稳定性回答“跨时间不变”，统合性回答“各部分协调成一个整体”，功能性回答“影响命运与行为”，社会性回答“由社会塑造”，复杂性回答“由多种成分构成”。\n· 对比：稳定性≠一成不变，强调的是“江山易改本性难移”式的相对稳定，仍可在重大变故下改变。"},
 {n:75,cat:"人格(性格气质)",s:"人格",q:"简述影响人格形成的因素",a:"（1）早期童年经验。\n（2）生物遗传因素。\n（3）社会文化因素。\n（4）家庭教养方式。\n（5）学校教育因素。\n（6）个人主观因素。\n此外，自然物理因素、自我调控因素等也对人格的形成有一定影响。",mn:"校花同意嫁人",x:"· 为什么：人格是先天遗传与后天环境共同“合力”的产物，所以因素天然分两类——生物遗传是“底色”，其余早期经验、社会文化、家庭教养、学校教育、主观因素都是后天“雕刻”。\n· 对比：与“影响性格的因素”（仅家庭/学校/社会/自我四种教育）区分——人格范围更大，故多了生物遗传、早期经验、主观因素等非教育性来源。"},
 {n:76,cat:"人格(性格气质)",s:"性格",q:"简述性格的概念及结构特征",a:"性格是个体对现实的态度及其相应的行为方式中表现出来的稳固而有核心意义的心理特征。\n（1）性格的态度特征。\n（2）性格的意志特征。\n（3）性格的情绪特征。\n（4）性格的理智特征。",mn:"太医须知",x:"· 为什么：性格是“对现实的态度+相应行为方式”，态度特征是核心（决定对人对己对事对物的立场），其余意志、情绪、理智三特征都是这种态度在行动、情感、认知三个心理侧面的表现。\n· 对比：性格有好坏之分（核心是态度，含道德评价），这与气质“无所谓好坏”正相反，是两者最易混的考点。"},
 {n:77,cat:"人格(性格气质)",s:"性格",q:"简述影响性格形成和发展的因素",a:"（1）家庭教育影响。（2）学校教育影响。\n（3）社会教育影响。（4）自我教育影响。",mn:"",x:"· 为什么：性格主要靠后天“教育”塑造，所以四因素按场域排列——家庭（最早最深）、学校（系统专门）、社会（广泛弥散）、自我（内在主动），由外到内、由被动到主动。\n· 对比：相比“影响人格的因素”，这里不含生物遗传——因为性格强调社会影响大、可塑性强，遗传成分被弱化。"},
 {n:78,cat:"人格(性格气质)",s:"性格",q:"简述良好性格的培养措施",a:"（1）加强人生观、世界观和价值观教育。\n（2）及时强化学生的积极行为。\n（3）充分利用榜样人物的示范作用。\n（4）利用集体的教育力量。\n（5）依据性格倾向因材施教。\n（6）提高学生的自我教育能力。",mn:"观世音教化我",x:"· 为什么：性格核心是态度，所以培养先解决“方向”（三观教育），再用行为主义手段“固化”（强化积极行为、树榜样），并借助集体环境与因材施教，最终落到学生“自我教育”内化。\n· 对比：措施由外部塑造逐步过渡到自我教育，体现“教育的最终目的是自我教育”这一规律。"},
 {n:79,cat:"人格(性格气质)",s:"性格",q:"简述性格与能力的关系",a:"性格与能力的关系十分密切。\n（1）性格与能力两者是在相互作用与相互制约的过程中发展的。\n（2）良好的性格特征对一个人的能力发挥或发展具有积极的导向作用。勤奋的性格特征往\n往可以补偿\n某些能力的不足。\n（3）良好的性格与能力相结合，是取得事业成功的必要条件。",mn:"",x:"· 为什么：性格管“做不做、愿不愿”（态度与动力），能力管“能不能、行不行”（效率），二者作用于同一活动，必然相互影响——所以勤奋（性格）可补偿能力不足，能力发挥也受性格导向。\n· 对比：性格回答“活动的方向与态度”，能力回答“活动的效率与水平”，是两个不同范畴的个性心理特征。"},
 {n:80,cat:"人格(性格气质)",s:"气质",q:"简述气质的概念及类型",a:"气质是心理活动表现在强度、速度、稳定性、灵活性和指向性等方面的心理特征。\n（1）胆汁质；（2）多血质；（3）黏液质；（4）抑郁质。",mn:"强吻苏灵芝 / 鲶鱼多汁",x:"· 为什么：气质是心理活动的“动力特征”（强度、速度、稳定性、灵活性、指向性），不涉及内容好坏，四种类型就是这些动力维度的不同组合。\n· 根源：源自希波克拉底体液说（胆汁/血液/黏液/黑胆汁四种体液的配比），后由巴甫洛夫用高级神经活动类型（强不平衡=胆汁质、强平衡灵活=多血质、强平衡不灵活=黏液质、弱型=抑郁质）给出生理基础。\n· 对比：胆汁质“直”、多血质“活”、黏液质“稳”、抑郁质“敏”，可记为“火爆、活泼、安静、脆弱”。"},
 {n:81,cat:"人格(性格气质)",s:"气质",q:"简述气质与教育",a:"（1）对待学生应克服气质偏见。\n（2）针对学生气质差异因材施教。\n针对不同的气质类型，应该采用不同的方法，有针对性地进行教育，做到“一把钥匙开一把锁”。\n①针对胆汁质的学生，教师应采取直截了当的方式，但这些学生不宜轻易激怒，对其严厉批评要有说服力。\n②针对多血质的学生，老师可以采用多种多样的教育方式，但要定期提醒，培养其专一的品质，防止见异思迁。\n③针对黏液质的学生，老师可以采取耐心教育的方式，要让他们有考虑和做出反应的足够时间。\n④针对抑郁质的学生，老师可以采取委婉暗示的方式，对其多关心爱护，不要在公开场合严厉指责和批评。\n（3）帮助学生进行气质的自我分析、自我教育，培养良好的气质品质。\n（4）特别重视胆汁质和抑郁质学生。\n（5）组建学生队伍时，应考虑学生的气质类型。",mn:"偏因一直自我考虑",x:"· 为什么：气质无好坏、是天生的，所以教育第一原则就是“克服偏见”，再“因材施教”——一把钥匙开一把锁，对不同动力特征用不同节奏与方式。\n· 根源：分型对策直接对应气质类型——胆汁质直截了当、多血质多样并防见异思迁、黏液质给足反应时间、抑郁质委婉关爱，本质是顺应各类型的神经活动强度与灵活性。\n· 对比：胆汁质→严厉但要有说服力；抑郁质→委婉暗示、勿当众批评，两者最需特别照顾。"},
 {n:82,cat:"人格(性格气质)",s:"气质",q:"简述气质与性格的关系",a:"（1）气质与性格的区别：\n①气质受生理影响大，性格受社会影响大。②气质的稳定性强，性格的可塑性强。\n③气质特征表现较早，性格特征表现较晚。④气质无所谓好坏，性格有优劣之分。\n（2）气质与性格的联系：\n①气质对性格的影响\n气质影响到一个人对事物的态度和行为方式，使性格带上某种气质的色彩和具有某种特殊的形式；\n气质影响性格的形成和发展，以及形成的速度。\n②性格对气质的影响\n性格也可以掩蔽和改造气质，指导气质的发展，使它服从于生活实践的要求",mn:"",x:"· 为什么：两者都是个性心理特征，但根子不同——气质偏“生理先天”，性格偏“社会后天”，由此推出所有区别：气质表现早/稳定/无好坏，性格表现晚/可塑/有优劣。\n· 对比：联系上互相渗透——气质给性格“染色”（影响形式与速度），性格能“改造、掩蔽”气质（使其服从生活要求），所以同一气质可形成不同性格。"},
 {n:83,cat:"心理发展与个别差异",s:"心理发展的规律与特征",q:"简述学生心理发展的一般规律",a:"（1）连续性与阶段性。\n（2）定向性与顺序性。\n（3）不平衡性。\n（4）差异性。",mn:"",x:"· 为什么：四条规律分别回答发展的不同问题——连续性与阶段性回答“怎么变（量变到质变）”，定向性与顺序性回答“朝哪走（方向不可逆）”，不平衡性回答“速度匀不匀（有快有慢、有关键期）”，差异性回答“人与人是否一样（个体差异）”。\n· 对比：不平衡性是“同一个人不同方面/不同时期速度不同”，差异性是“不同人之间的差别”，二者勿混。"},
 {n:84,cat:"心理发展与个别差异",s:"心理发展的规律与特征",q:"简述中小学生心理发展的一般特征",a:"小学：（1）快速性；（2）协调性；（3）开放性；（4）可塑性。\n中学：（1）过渡性；（2）闭锁性；（3）社会性；（4）动荡性；（5）独立性。",mn:"快些开课 / 会所独过冬",x:"· 为什么：特征由“年龄阶段任务”决定——小学生身心快速成长、对外开放可塑，故“快、协、开、塑”；中学生进入青春期，由童年向成人过渡，自我觉醒又向内封闭，故“过渡、闭锁、社会、动荡、独立”。\n· 对比：小学“开放”与中学“闭锁”正相反——这正是青春期心理“锁”的标志：有了内心世界却不愿轻易示人。"},
 {n:85,cat:"心理发展与个别差异",s:"心理发展的规律与特征",q:"简述中小学生心理发展的阶段特征",a:"（1）童年期\n童年期又称学龄初期，是个体一生发展的基础时期，也是生长发育最旺盛、变化最快、可塑性最强、\n接受教育最佳的时期。这一时期的心理发展特征为：\n①儿童的思维开始从具体形象思维为主过渡到抽象逻辑思维为主，但仍需以具体形象为支柱（关键期：\n四年级）。\n②儿童的自我意识增强，对自我有了一定评价。\n（2）少年期（心理断乳期”或“危险期”）\n少年期大致相当于初中阶段，是个体从童年期向青年期过渡的时期。这一时期的心理发展特征为：\n①具有半成熟、半幼稚的特点，充满着独立性和依赖性、自觉性和幼稚性错综的矛盾。\n②抽象思维已占主导地位，但仍要以具体形象为支柱，并出现反省思维。\n③思维的独立性和批判性也有所发展，但仍带有不少片面性和主观性。\n④独立意识强，产生成人感。\n⑤道德行为更加自觉，但自控力不强。\n（3）青年初期\n又称学龄晚期，相当于高中时期，是个体在生理上、心理上和社会性上向成人接近的时期。这一时期的心\n理发展特征为：\n①智力接近成熟，抽象逻辑思维由“经验型”向“理论型”转化，开始出现辩证思维。\n②与人生观相联系的情感占主要地位，道德感、理智感和美感有了深刻的发展。\n③形成了理智的自我意识，但理想自我与现实自我仍面临分裂的危机，自我肯定与自我否定常发生冲突。\n④对未来充满理想，但有时也会出现与生活相脱节的幻想。\n⑤意志的坚强性与行动的自觉性有了较大发展，",mn:"独自围半墙 / 想至情至性",x:"· 为什么：三阶段的核心都是“抽象逻辑思维的成熟程度”这条主线——童年期开始过渡但仍靠具体形象，少年期抽象思维已占主导但仍需形象支柱、出现反省与批判，青年初期由“经验型”转向“理论型”并出现辩证思维。\n· 对比：少年期=“心理断乳期/危险期”，关键词是“半成熟半幼稚”的矛盾；青年初期关键词是“理想自我与现实自我的冲突”。"},
 {n:86,cat:"心理发展与个别差异",s:"认知发展理论",q:"简述皮亚杰认为影响认知发展的因素",a:"（1）成熟。\n（2）练习和经验。\n（3）社会性经验。\n（4）平衡化。",mn:"熟悉绘画",x:"· 为什么：认知发展是个体与环境“主动适应”的过程，四因素正好覆盖“内—外—社会—调节”：成熟是内部生理基础，练习与经验是个人作用于物，社会性经验是人际传递，平衡化是统领前三者、推动同化顺应的核心机制。\n· 根源：皮亚杰认知发展理论。其中平衡化是皮亚杰特别强调的“调节性”因素，是发展的内在动力。\n· 对比：易漏“平衡化”——它不是并列的第四项，而是协调前三者的核心。"},
 {n:87,cat:"心理发展与个别差异",s:"认知发展理论",q:"简述皮亚杰认知发展理论的教育价值",a:"（1）提供活动。\n（2）创设最佳的难度。\n（3）关注儿童的思维过程。\n（4）认识儿童认知发展水平的有限性。\n（5）让儿童多参与社会活动。",mn:"公司有毒舌",x:"· 为什么：教育价值全部从“儿童认知有阶段、受水平限制”这一前提推出——既然思维主动建构，就要“提供活动”让其操作；既然有最近发展区，就要“创设最佳难度”；既然过程重于结果，就要“关注思维过程”；既然水平有限，就不能拔苗助长。\n· 根源：皮亚杰认知发展理论的教学应用。\n· 对比：核心提醒是“认识儿童认知发展水平的有限性”——不能用成人逻辑要求儿童。"},
 {n:88,cat:"心理发展与个别差异",s:"认知发展理论",q:"简述维果斯基发展观的基本内容",a:"（1）文化历史发展理论。\n（2）心理发展观。\n（3）内化学说。\n（4）教育和发展的关系：最近发展区、教学走在学生发展的前面以及学习的最佳期限。",mn:"文理画展",x:"· 为什么：四块内容层层递进——文化历史发展理论说明“高级心理机能从哪来（社会文化）”，心理发展观说明“怎么变”，内化学说说明“外部如何变内部”，教育与发展关系给出实践落点（最近发展区等）。\n· 根源：维果斯基的社会文化历史发展观，核心命题是“教学走在发展的前面”。\n· 对比：与皮亚杰对照——皮亚杰认为发展先于学习，维果斯基认为好的教学应引领发展。"},
 {n:89,cat:"心理发展与个别差异",s:"认知发展理论",q:"简述最近发展区的内涵",a:"维果斯基认为，儿童有两种发展水平：\n一是儿童的现有水平，即由一定的已经完成的发展系统所形成的儿童心理机能的发展水平；\n二是即将达到的发展水平。这两种水平之间的差异就是最近发展区。\n教育启示：教学应着眼于学生的最近发展区，把潜在的发展水平变成现实的发展水平，并创造新的\n最近发展区，主张教学走在学生发展的前面。",mn:"",x:"· 为什么：之所以提“两种水平之差”，是因为儿童不是孤立发展的——现有水平是“独立能做”，潜在水平是“在他人帮助下能做”，二者之差正是教学最能发力的“空间”。\n· 根源：维果斯基最近发展区理论，由此引出“教学走在发展前面”——教学应着眼于潜在水平，把潜在变现实并创造新的最近发展区。\n· 对比：这正是“跳一跳够得着”的科学依据，也是支架式教学的理论来源。"},
 {n:90,cat:"心理发展与个别差异",s:"认知发展理论",q:"简述朱智贤的儿童心理发展的理论问题",a:"（1）先天与后天的关系。\n（2）内因与外因的关系。\n（3）教育与发展的关系。\n（4）年龄特征与个别特征的关系。",mn:"阴雨天特征",x:"· 为什么：四对关系实质都在回答“发展受什么制约”——先天与后天（遗传vs环境）、内因与外因（自身能动vs外部条件）、教育与发展（教育的主导作用）、年龄特征与个别特征（共性vs个性），构成辩证的发展观。\n· 根源：朱智贤关于儿童心理发展的基本理论问题，强调以辩证唯物主义看待诸对关系。"},
 {n:91,cat:"心理发展与个别差异",s:"个别差异",q:"简述能力的差异",a:"（1）能力发展的个体差异：\n①能力发展水平的差异。②能力类型的差异。③能力表现早晚的差异。\n（2）能力的群体差异：\n①性别差异。②年龄差异。③种族差异。④社会文化差异。",mn:"各类水藻 / 群星念祖文",x:"· 为什么：能力差异要从“看谁”两个角度切——看个人内部，就有水平高低、类型偏向、显露早晚之分；看人群之间，就有性别、年龄、种族、社会文化之别。一个纵向（个体），一个横向（群体）。\n· 对比：“表现早晚”属个体差异（如人才早熟与大器晚成），“年龄差异”属群体差异，二者勿混。"},
 {n:92,cat:"心理发展与个别差异",s:"个别差异",q:"简述认知风格的含义及教育",a:"含义：认知风格是指个体感知、记忆、思维、问题解决、决策以及信息加工的典型方式。\n教育：\n首先，应该创设适应学生认知差异的教学组织形式。\n其次，采用适应认知差异的教学方式，努力使教学方式个别化。\n最后，运用适应认知差异的教学手段。",mn:"收房租",x:"· 为什么：认知风格是“加工信息的典型方式”，本身无好坏、因人而异，所以教育对策核心是“适应差异”——从教学组织形式、教学方式到教学手段，三层面都要与学生的认知特点匹配。\n· 根源：认知风格研究中最典型的是威特金的场独立型与场依存型。\n· 对比：场独立者倾向内部参照、爱自然学科、不易受暗示；场依存者依赖外部参照、爱社会学科、善人际——教学应据此分别施教。"},
 {n:93,cat:"心理发展与个别差异",s:"个别差异",q:"简述性格差异的教育意义",a:"（1）性格影响学生的学习方式。\n（2）性格影响学习的速度和质量。\n（3）性格影响学生对学习内容的选择。\n（4）性格影响学生的社会性学习和个体社会化。",mn:"方荣会制度",x:"· 为什么：性格是“对学习的态度与方式”，所以它必然渗透到学习的各环节——影响用什么方式学、学得多快多好、选什么内容学，以及如何在群体中社会化。性格不直接决定“能不能学会”（那是能力），但决定“怎么学、愿不愿学”。\n· 对比：性格影响学习的“方式、速度质量、内容选择、社会化”；与能力差异（影响掌握的难易与水平）区分。"},
 {n:94,cat:"学习理论",s:"学习概述",q:"简述学习的概念及学习的作用",a:"学习是个体在特定的情境下由于练习或反复经验而产生的行为或行为潜能的比较持久的改变。\n（1）学习是机体和环境取得平衡的条件。\n（2）学习可以影响成熟。\n（3）学习能激发人脑智力的潜力，从而促进个体心理的发展。",mn:"几成力",x:"· 为什么：定义抓三组对立词——\"练习/经验\"（排除本能、成熟、疲劳药物所致改变）、\"行为或行为潜能\"（学了未必当场表现出来，故含\"潜能\"）、\"比较持久\"（排除一时的疲劳醉酒）。\n· 为什么：三大作用是\"成熟—平衡—潜力\"，记住学习与成熟是双向的（学习能影响成熟），而非只受成熟制约。\n· 对比：常考反例——蜘蛛结网、吃药后变迟钝、酒后失态，都不是学习。"},
 {n:95,cat:"学习理论",s:"学习概述",q:"简述学生学习的特点",a:"（1）学生的学习是以掌握间接知识经验为主的。\n（2）学生的学习是在教师有目的、有计划、有组织的指导下进行的。\n（3）学生学习的主要任务是掌握系统的科学知识、技能，形成科学的世界观和良好的道\n德品质。\n（4）学生的学习是在学校班集体中进行的。\n（5）学生的学习具有一定程度的被动性。",mn:"奸细背诗集",x:"· 为什么：五条特点的核心是\"间接性+计划性+被动性\"，因为学生学的是前人总结好的间接经验（书本知识），而非自己摸索的直接经验。\n· 为什么：\"一定程度的被动性\"易被忽视却是常考点——学生学习是在教师组织下、按教学计划进行的，并非完全自发，故带被动色彩。\n· 对比：与人类一般学习相比，学生学习更突出\"有目的、有计划、有组织\"，这是学校教育区别于自发学习的本质。"},
 {n:96,cat:"学习理论",s:"认知学习理论",q:"简述加涅的学习分类",a:"（1）从学习水平来说：信号学习，刺激—反应学习，连锁学习，言语联想学习，辨别学习，概\n念学习，规则的学习，高级规则的学习（问题解决的学习）。\n（2）从学习结果来说：言语信息，智慧技能，认知策略，态度，动作技能。",mn:"好繁琐想别念这题 / 颜值太动人",x:"· 根源：加涅。一个考点两种分类务必区分——\"学习水平\"是按难度从低到高的八类（信号→刺激反应→连锁→言语联想→辨别→概念→规则→高级规则/问题解决）；\"学习结果\"是五类（言语信息、智慧技能、认知策略、态度、动作技能）。\n· 为什么：水平说体现\"由简到繁、低级是高级的基础\"的累积层级思想，这是加涅累积学习观的精髓。\n· 对比：题干问\"水平/层次\"选八类，问\"结果/类型\"选五类，看关键词定答案。"},
 {n:97,cat:"学习理论",s:"行为与社会学习理论",q:"简述程序教学的含义及原则",a:"含义：一种能让学生以自己的速度和水平自学，以特定顺序和小步子安排材料的个别化教学\n方法。\n原则：（1）小步子原则。\n（2）积极反应原则。\n（3）自定步调原则。\n（4）及时反馈原则。\n（5）低错误率原则。",mn:"小鸡不犯错",x:"· 根源：斯金纳，基于操作性条件作用（强化塑造行为）设计的教学机器与程序教学。\n· 为什么：五原则环环相扣——把知识拆成\"小步子\"，每步要求学生\"积极反应\"，反应后\"及时反馈\"强化，让学生\"自定步调\"，从而保证\"低错误率\"。本质是把强化原理搬进课堂。\n· 对比：程序教学是斯金纳，别和布鲁纳发现学习、奥苏贝尔接受学习混淆。"},
 {n:98,cat:"学习理论",s:"行为与社会学习理论",q:"简述观察学习的含义及过程",a:"观察学习，又称替代学习，是指通过对他人及其强化性结果的观察，一个人获得某些新\n的反应，或者矫正原有的行为反应。\n（1）注意过程。\n（2）保持过程。\n（3）复制过程（动作再现）。\n（4）动机过程。",mn:"珠宝在动",x:"· 根源：班杜拉社会学习理论的核心概念（又称替代学习）。\n· 为什么：四过程顺序不可乱——先\"注意\"榜样、再\"保持\"（记住）、然后\"复现\"（动作再现）、最后\"动机\"决定是否真的去做。前三步是\"会不会\"，动机决定\"做不做\"。\n· 对比：易错点是把\"复现\"和\"动机\"调换；学了不等于会做出来，动机过程才是行为表现的开关。"},
 {n:99,cat:"学习理论",s:"行为与社会学习理论",q:"简述班杜拉社会学习理论的三种强化",a:"（1）直接强化。指观察者因表现出观察行为而受到强化。\n（2）替代性强化。指观察者因看到榜样受强化而受到的强化。\n（3）自我强化。指人能观察自己的行为，并根据自己的标准进行判断，由此强化或处罚自己。",mn:"",x:"· 根源：班杜拉。三种强化区别看\"谁被强化、谁来强化\"。\n· 为什么：直接强化=自己做了被奖（强化对象是观察者自身行为）；替代强化=看到榜样被奖而自己受激励（关键是\"看别人\"）；自我强化=用自己的标准评判并奖惩自己（关键是\"自我设标\"）。\n· 对比：\"杀鸡儆猴\"\"榜样示范\"考替代强化；学生完成目标后自我奖励考自我强化，是班杜拉对行为主义的重大突破。"},
 {n:100,cat:"学习理论",s:"认知学习理论",q:"简述发现学习的特征及作用",a:"发现学习的特征：\n（1）强调学习过程。（2）强调直觉思维。（3）强调内在动机。（4）强调信息提取。\n发现学习的作用：\n（1）提高智力的潜力。\n（2）使外部奖赏向内部动机转移。\n（3）学会做出发现的最优方法和策略。\n（4）帮助信息的保持和检索。",mn:"学死再娶 / 机智法宝",x:"· 根源：布鲁纳，发现学习与认知—结构学习论。\n· 为什么：四特征都指向\"主动\"——重过程、重直觉、重内在动机、重信息提取，因为布鲁纳主张让学生像科学家一样自己发现知识结构，而非被动接收。\n· 对比：发现学习强调\"过程\"与\"内在动机\"；与奥苏贝尔的接受学习（重结果、重外部呈现）正好相对，是常考对比点。"},
 {n:101,cat:"学习理论",s:"认知学习理论",q:"简述布鲁纳理论的贡献与不足",a:"贡献：\n布鲁纳强调学生学习的主动性，强调学习的认知过程，重视认知过程的形成，注重学习者的知识结构、内在动机、独立性与\n积极性在学习中的作用。\n不足：\n第一，他的学习与教学理论完全放弃知识的系统传授，而以发现法教学来代替，夸大了学生的学习能力，忽视了知识学习活\n动的特殊性，忽视了知识的学习即知识的再生产过程与知识的生产过程的差异。\n第二，布鲁纳认为“任何科目都可以按某种正确的方式教给任何年龄的任何儿童”，这是无法实现的。\n第三，发现学习在当时虽然有其积极作用，然而发现法运用的范围有限，如从学习主体来看，真正能够用发现法学习的只是\n极少数学生；从学科领域看，只适合自然科学某些知识的教学；从执教人员看，对教师知识素养、教学机智等要求很高，一般教\n师很难掌握。\n第四，发现法耗时过多，不经济，不宜用在短时间内向学生传授一定数量的知识和技能的集体教学活动。",mn:"",x:"· 根源：布鲁纳发现学习的评价。贡献在于强调学生主动性、认知过程与知识结构；不足在于全盘否定系统传授、夸大学生能力。\n· 为什么：四点不足的共同逻辑是\"发现法不经济、适用面窄\"——耗时多、只适合少数优生与部分自然学科、对教师要求极高，故不能取代系统讲授。\n· 对比：正是这些不足，反衬出奥苏贝尔有意义接受学习对系统知识传授的价值。"},
 {n:102,cat:"学习理论",s:"认知学习理论",q:"简述奥苏贝尔有意义学习的实质及条件",a:"（1）有意义学习的实质：\n有意义学习的实质是将新知识与已有知识建立起非人为（内在）的和实质性（非字面）的联系。\n（2）有意义学习的条件：\n①客观条件，是指有意义学习的材料本身必须具有逻辑意义。\n②主观条件，是指学习者自身因素的影响。主要表现在：\na.学习者必须具有有意义学习的心向；\nb.学习者认知结构中必须具有适当的知识，以便与新知识进行联系；\nc.学习者必须积极主动地使这种具有潜在意义的新知识与认知结构中有关的旧知识发生相互作用。",mn:"",x:"· 根源：奥苏贝尔，有意义接受学习（同化论）。\n· 为什么：实质是新旧知识建立\"非人为（内在）+实质性（非字面）\"的联系——前者指联系合乎逻辑而非生拉硬凑，后者指理解意义而非死背字面。\n· 为什么：条件=客观（材料本身有逻辑意义）+主观（有意义学习心向 + 认知结构中有恰当旧知识可挂靠 + 主动建立联系），三个主观条件缺一不可。\n· 对比：\"非人为\"\"实质性\"是判断有意义学习的两把尺子，与机械学习（死记硬背）相对。"},
 {n:103,cat:"学习理论",s:"认知学习理论",q:"简述先行组织者的含义及作用",a:"“先行组织者”，是先于学习任务本身呈现的一种引导性材料，它要比学习任务本身有\n较高的抽象、概括和综合水平，并且能够清晰地与认知结构中原有观念和新任务关联起来。\n具体而言，先行组织者起到3个作用：\n①把学习者的注意引向即将学习的材料中最重要的内容；\n②集中概括即将呈现的概念之间的关系；\n③提示学习者已有知识和即将遇到的新材料之间的关系。",mn:"",x:"· 根源：奥苏贝尔同化论的关键操作工具——先于学习任务呈现的引导性材料。\n· 为什么：它必须比新材料\"更抽象、更概括、更上位\"，因为它的使命是在认知结构里搭一个\"挂钩\"，让新知识有处可挂，从而实现有意义学习。\n· 为什么：三作用本质都是\"牵线搭桥\"——引向重点、概括关系、提示新旧知识的联系。\n· 对比：先行组织者=奥苏贝尔，常考题干\"上课先给一个总括性框架/类比\"。"},
 {n:104,cat:"学习理论",s:"认知学习理论",q:"简述接受学习（讲授教学）的特点",a:"（1）师生之间要有大量互动。\n（2）大量利用例证。\n（3）它是演绎的，最一般蕴涵的概念最初呈现，然后从中引出特殊的概念。\n（4）它是有序列的，材料的呈现有一定步子，这些步子首先是先行组织者。",mn:"护理言承旭",x:"· 根源：奥苏贝尔，接受学习（讲授教学）。\n· 为什么：四特点核心是\"演绎+有序\"——先呈现最一般、最上位的概念（如先行组织者），再逐步推出特殊概念，与发现学习的归纳路线相反。\n· 对比：接受学习并不等于\"满堂灌\"或机械学习，它同样需要师生互动和大量例证；它可以是有意义的。这是最大易错点。"},
 {n:105,cat:"学习理论",s:"认知学习理论",q:"加涅的信息加工学习理论提出的学习过程包括哪八个阶段",a:"加涅将学习过程划分为以下八个阶段：\n（1）动机阶段；（2）了解阶段；（3）获得阶段；（4）保持阶段；\n（5）回忆阶段；（6）概括阶段；（7）操作阶段；（8）反馈阶段。",mn:"东街活宝会盖炒饭",x:"· 根源：加涅，信息加工学习理论的八阶段（注意别和\"学习分类\"\"九大教学事件\"混）。\n· 为什么：八阶段对应信息加工流程——动机→了解→获得→保持→回忆→概括→操作→反馈，前四步是\"输入与编码\"，后四步是\"提取、迁移与强化\"。\n· 对比：八阶段是\"学习者内部过程\"，九大教学事件是\"教师外部活动\"，二者一一呼应但角度不同，常被互换设陷阱。"},
 {n:106,cat:"学习理论",s:"认知学习理论",q:"简述建构主义学习理论的基本观点",a:"（1）建构主义的知识观\n①知识并不是对现实的准确表征，也不是最终答案，而只是一种解释、一种假设。\n②知识并不能精确地概括世界的法则，在具体问题中，并不能拿来就用，一用就灵，而是要针对具体情境\n进行再创造。\n③尽管我们通过语言符号赋予知识一定的外在形式，甚至这些命题还得到了普遍的认可，但并不意味着每\n个学生对这些命题都会有同样的理解，因为理解只能由学生基于自己的经验背景而建构起来，取决于特\n定情境下的学习历程。\n（2）建构主义的学生观\n①建构主义强调学生经验世界的丰富性，强调学生的巨大潜能。\n②建构主义强调学生经验世界的差异性，每个人在自己的活动和交往中形成了自己的个性化的、独特性的\n经验，每个人有自己的兴趣和认知风格。\n（3）建构主义的学习观\n建构主义强调学习的主动建构性、社会互动性和情境性。\n（4）建构主义的教学观\n由于知识的动态性和相对性以及学习的建构过程，教学不再是传递客观而确定的现成知识，而是激活学生原有的\n相关知识经验，促进知识经验的“生长”，促进学生的知识建构活动，以实现知识经验的重新组织、转换和改造。\n①注重以学生为中心进行教学。\n②注重在实际情境中进行教学。\n③注重协作学习。\n④注重提供充分的资源。",mn:"请监护",x:"· 根源：建构主义（源头为皮亚杰的个体建构与维果斯基的社会建构）。\n· 为什么：四观一以贯之于\"知识是主动建构的\"——知识观（知识只是假设、需情境再创造）→学生观（强调经验的丰富性与差异性）→学习观（主动建构、社会互动、情境性）→教学观（以学生为中心、情境、协作、提供资源）。\n· 对比：\"知识不是客观确定真理、教学不是灌输传递\"是建构主义区别于行为主义、传统教学的标志性主张。"},
 {n:107,cat:"学习理论",s:"人本主义学习理论",q:"罗杰斯认为有意义学习包括哪四个要素",a:"（1）学习是学习者自我参与的过程。\n（2）学习是学习者自我发起的。\n（3）学习是渗透的。\n（4）学习的结果由学习者自我评价。",mn:"参加生发",x:"· 根源：罗杰斯，人本主义\"有意义自由学习\"（注意与奥苏贝尔的\"有意义接受学习\"不是一回事）。\n· 为什么：四要素全部围绕\"自我\"——自我参与（全身心投入）、自我发起（内在驱动）、渗透性（影响整个人的态度行为）、自我评价（自己判断学得好不好），体现以学生为中心。\n· 对比：罗杰斯的\"有意义\"强调情感与自我投入、自由；奥苏贝尔的\"有意义\"强调新旧知识的认知联系。题干出现\"自我评价/全人投入\"选罗杰斯。"},
 {n:108,cat:"学习动机",s:"学习动机概述",q:"简述影响学习动机形成的因素",a:"学习动机的形成过程受主客观两方面因素的影响。\n（1）主观因素\n需要与目标结构、成熟与年龄特点、性格特征与个别差异、志向水平与价值观、焦虑程度等。\n（2）客观因素\n家庭环境、社会舆论以及教师的榜样作用。",mn:"要成个直角",x:"· 为什么：动机不是凭空产生的，它既由内在心理状态推动（主观），又被外部环境塑造（客观），所以记忆时按这两条主线归类即可。\n· 对比：主观因素全在“人自身”（需要、年龄、性格、志向、焦虑）；客观因素全在“人之外”（家庭、舆论、教师）。判断题归错栏是常见陷阱。"},
 {n:109,cat:"学习动机",s:"学习动机概述",q:"简述学习动机与学习效率之间的关系及教育启示",a:"1.心理学的研究表明，动机强度与工作效率之间的关系并不是一种线性关系，而是倒U形曲线关系。\n2.中等强度的动机最有利于任务的完成，即动机强度处于中等水平时，工作效率最高。\n3.心理学家耶克斯和多德森的研究表明，各种活动都存在一个最佳的动机水平。动机不足或过分强烈\n都会导致学习效率下降。此外，动机的最佳水平还随任务性质的不同而不同：在学习较复杂的问题时，\n动机强度的最佳水平点会低些；在学习任务比较简单时，动机强度的最佳水平点会高些。\n教育启示：\n（1）教师在教学时，要根据学习任务的不同难度，恰当控制学生的学习动机水平。\n（2）在学习较容易、较简单的内容时，应尽量使学生集中注意力，使学生尽量紧张一点儿。\n（3）在学习较复杂、较困难的内容时，则应尽量创造轻松自由的课堂气氛。\n（4）在学生遇到困难或出现问题时，要尽量心平气和地耐心引导，以免学生过度紧张和焦虑。",mn:"",x:"· 为什么：动机太弱学习不上心，太强又因过度紧张而干扰发挥，所以效率随动机增强先升后降，呈倒U形。\n· 根源：耶克斯-多德森定律。它还有第二层——最佳动机水平随任务难度变：难任务（要冷静思考）最佳点偏低，易任务（拼速度专注）最佳点偏高。\n· 对比：所以高考前难题宜“松”、易题宜“紧”；遇困难要心平气和，正是为了把过高动机压回最佳区。"},
 {n:110,cat:"学习动机",s:"学习动机概述",q:"简述学习动机的含义及分类",a:"学习动机是引发和维持个体学习活动，并将学习活动引向一定学习目标的动力机制，是直接推动学生学习的内\n部动力。\n分类：\n（1）根据动机产生的诱因来源不同，学习动机分为内部学习动机和外部学习动机。\n（2）根据学习动机内容的社会意义，学习动机分为高尚的动机和低级的动机。\n（3）根据动机行为与目标的远近关系，学习动机可以分为近景性动机和远景性动机。\n（4）按学习动机与学习活动的关系，可以分为直接动机和间接动机。\n（5）奥苏贝尔认为，学校情境中的成就动机至少应包括三方面的内驱力，即认知内驱力、自我提高内驱力、\n附属内驱力",mn:"",x:"· 为什么：动机分类的关键是抓住“按什么标准分”，每个标准对应一组对立概念，理解标准就不会张冠李戴。\n· 根源：第5条是奥苏贝尔的成就动机三内驱力——认知（为求知）、自我提高（为地位声望）、附属（为获得长辈认可）。\n· 对比：诱因来源→内/外部；社会意义→高尚/低级；目标远近→近景/远景；与活动关系→直接/间接。"},
 {n:111,cat:"学习动机",s:"归因与习得性无助",q:"简述习得性无助的含义及产生后的表现",a:"习得性无助是由于经常性失败体验导致学生产生对行为结果无力控制、无能为力的心理\n习得性无助感产生后有以下三方面的表现：\n第一，学习动机降低；第二，认知出现障碍；第三，情绪失调。",mn:"爱动情",x:"· 为什么：屡战屡败后，人会把失败归为“自己不行且改变不了”，于是干脆放弃努力，这种无助是“习得”来的，而非天生。\n· 根源：塞利格曼提出，源于消极而稳定的内部归因（如归因于能力低）。表现可顺着“动机—认知—情绪”三个心理层面记：动机降低、认知障碍、情绪失调。\n· 对比：与自我效能感低相通——都是对“我能不能成”失去信心。"},
 {n:112,cat:"学习动机",s:"归因与习得性无助",q:"简述归因理论在教育上的意义",a:"（1）教师根据学生的自我归因可预测此后的学习动机。\n（2）学生自我归因虽未必正确，但却是重要的。\n（3）长期消极归因不利于学生个性成长。\n（4）教师的反馈是影响学生归因的重要因素。",mn:"",x:"· 为什么：归因不是事后随便找理由，学生如何解释成败，会直接决定他下一次还愿不愿努力，所以归因有强大的动机引导作用。\n· 根源：维纳（韦纳）归因理论——把原因放在内外、稳定、可控三维度上。长期把失败归为“能力差”（内部、稳定、不可控）最危险，易导致习得性无助。\n· 对比：教师反馈是关键变量，引导学生归因于“努力不够”（内部但可控）才能保护动机。"},
 {n:113,cat:"学习动机",s:"自我效能感",q:"简述自我效能感的概念以及影响自我效能形成的因素",a:"自我效能感指个人对自己是否具有通过努力成功完成某种活动的能力所持有的主观判断与信念。\n（1）个人自身行为的成败经验。\n（2）替代性经验。\n（3）言语劝说。\n（4）情绪唤醒。",mn:"替身言情",x:"· 为什么：自我效能感是“我相信我能做到”的主观判断，它来自多个信息渠道，渠道越直接、越正面，信念越强。\n· 根源：班杜拉提出，四来源按说服力排序——成败经验（亲身做过，最强）＞替代经验（看别人做到）＞言语劝说（被鼓励）＞情绪唤醒（紧张焦虑会削弱）。\n· 对比：成败经验是直接经验，替代经验是间接经验，二者最易混。"},
 {n:114,cat:"学习动机",s:"自我效能感",q:"简述自我效能感的影响及增强措施",a:"自我效能感的影响/功能：\n（1）决定学生对学习活动的选择及对活动的坚持性。\n（2）影响学生对待学习困难的态度。\n（3）影响学习任务的完成/影响个体新行为的习得和已习得行为的表现。\n（4）影响学习时的情绪状态。",mn:"情人难坚持",x:"· 为什么：相信自己能成功的人，更愿意挑战、更能坚持、面对困难更积极、情绪也更稳，所以效能感会从行为选择到情绪状态全面影响学习。\n· 根源：班杜拉自我效能感理论。可顺着“选什么—怎么对待困难—能不能完成—什么情绪”四条线索记功能。"},
 {n:115,cat:"学习动机",s:"自我效能感",q:"简述自我效能感的影响及增强措施",a:"增强措施：\n（1）让学生在学习活动中体验到更多的成功。\n（2）为学生提供适当的榜样示范。\n（3）指导学生树立适当的学习目标和作业目标。\n（4）给学生以积极的归因反馈，并指导学生学会适当的自我归因。\n（5）给学生以适当奖励。\n（6）给学生以学习策略的指导，使学生学会自我监控。",mn:"城市音标奖励我",x:"· 为什么：增强效能感的本质，就是从班杜拉的四个来源去“喂”正面信息——让学生多成功、看榜样、订可达目标、做积极归因。\n· 根源：班杜拉自我效能感理论的应用。体验成功对应成败经验，榜样示范对应替代经验，归因反馈与目标设置则保护“我能行”的信念。\n· 对比：这是操作题，落点都在“制造可控的成功体验”上。"},
 {n:116,cat:"学习动机",s:"学习动机的激发",q:"如何培养和激发学生的学习动机",a:"学习动机的培养：\n（1）了解和满足学生的需要，促使学习动机的产生。\n（2）重视立志教育，对学生进行成就动机训练。\n（3）帮助学生确立正确的自我概念，获得自我效能感。\n（4）培养学生努力导致成功的归因观。\n学习动机的激发：\n（1）创设问题情境，实施启发式教学。\n（2）根据作业难度，恰当控制动机水平。\n（3）充分利用反馈信息，妥善进行奖惩。\n（4）合理设置课堂结构，妥善组织学习竞争。\n（5）正确指导结果归因，促使学生继续努力。",mn:"需要立志，自我归因 / 做饭问柜姐",x:"· 为什么：动机工作分“培养”（长期养成内在动力）和“激发”（当下调动起来）两条线——培养重内因（需要、志向、自我效能、归因），激发重外部教学手段（情境、奖惩、竞争、反馈）。\n· 根源：激发里“恰当控制动机水平”源自耶克斯-多德森定律，“正确归因”源自维纳理论，“自我效能感”源自班杜拉。\n· 对比：别把培养与激发的措施混栏，是答题失分高发区。"},
 {n:117,cat:"学习策略与迁移",s:"学习策略",q:"简述学习策略的特征",a:"为主】\n（1）学习策略是学习者为了完成学习目标而积极主动地使用的。（主动性）\n（2）学习策略是有效学习所需的。（有效性）\n（3）学习策略是有关学习过程的。（过程性）\n（4）学习策略是学习者制定的学习计划，由规则和技能构成。（程序性）",mn:"丞丞住校",x:"· 为什么：四个特征其实是从四个角度描述策略本质——谁在用（主动性）、有没有用（有效性）、管什么（过程性）、由什么构成（程序性）。\n· 对比：程序性≠认知策略里的“程序性知识”，这里指策略由规则和技能按步骤构成。"},
 {n:118,cat:"学习策略与迁移",s:"学习策略",q:"简述学习策略的含义及种类",a:"学习策略是学习者为了提高学习效果和效率，有目的、有意识地制定的有关学习过程的复杂方案。\n（1）认知策略：包括复述策略、精加工策略、组织策略。\n（2）元认知策略：包括计划策略、监控策略、调节策略。\n（3）资源管理策略：包括时间管理策略、环境管理策略、努力管理策略、资源利用策略。",mn:"",x:"· 为什么：三类策略对应学习的三个层面——直接加工材料（认知）、管理自己的思维（元认知）、调配内外资源（资源管理），层层往外。\n· 根源：这一三分框架常关联麦基奇。认知策略含复述/精加工/组织；元认知含计划/监控/调节；资源管理含时间/环境/努力/资源利用。\n· 对比：元认知是“对认知的认知”，即监控自己学得怎样，与直接记内容的认知策略不同。"},
 {n:119,cat:"学习策略与迁移",s:"学习策略",q:"简述学习策略训练的原则",a:"（1）主体性原则。\n（2）内化性原则。\n（3）特定性原则。\n（4）生成性原则。\n（5）有效监控原则。\n（6）个人效能感原则。",mn:"煮花生特见效",x:"· 为什么：策略训练不能教完就完，必须让学生自己用（主体、内化）、知道何时用（特定）、能自创自查（生成、监控），并相信自己用得好（效能感），否则学了也不会迁移。\n· 对比：内化性强调把外部策略变成自己的，生成性强调主动创造加工，二者易混。"},
 {n:120,cat:"学习策略与迁移",s:"学习策略",q:"元认知培养的具体途径",a:"（1）提高学生元认知学习的意识性\n（2）丰富学生关于元认知的知识和体验\n（3）加强对学生元认知操作的指导\n（4）给学生创设和谐、民主的反馈条件\n（5）注重引导学生对非智力因素的调控",mn:"一直做反调",x:"· 为什么：元认知是“管理自己学习的能力”，培养它要先让学生意识到（意识性），再给知识和体验，再示范操作，最后用反馈和情绪调控来巩固。\n· 对比：元认知培养落点是“让学生学会监控调节自己”，而非直接灌输学科知识。"},
 {n:121,cat:"学习策略与迁移",s:"学习迁移",q:"简述学习迁移的含义及分类",a:"学习迁移也称训练迁移，是指一种学习对另一种学习的影响，或习得的经验对完成其他活动的影响。\n（1）根据迁移发生的方向来划分，可以分为顺向迁移与逆向迁移。\n（2）根据迁移的性质和结果来划分，可以分为正迁移和负迁移。\n（3）根据迁移内容的抽象和概括水平的不同来划分，可以分为水平迁移与垂直迁移。\n（4）根据迁移内容的不同来划分，可以把迁移分为一般迁移和具体迁移。\n（5）根据迁移过程中所需的内在心理机制的不同，迁移可分为同化性迁移、顺应性迁移和重组性迁移。",mn:"",x:"· 为什么：迁移分类同样是“按标准对应概念”，抓住划分依据就不会乱套。\n· 对比：方向→顺向/逆向（看先学影响后学还是反之）；性质→正/负（促进还是干扰）；概括水平→水平/垂直；内容→一般/具体；心理机制→同化/顺应/重组。正负迁移与顺逆迁移最易混——一个看效果好坏，一个看时间先后。"},
 {n:122,cat:"学习策略与迁移",s:"学习迁移",q:"简述影响迁移的因素",a:"（1）客观因素\n①学习材料的性质影响迁移。②学习情境的相似也有利于迁移。③教师的指导影响迁移。\n（2）主观因素\n①学习者的学习态度影响迁移。\n②学生的智力水平影响迁移。\n③学生的认知结构的数量和质量影响迁移。\n④学生学习的心理定势影响迁移。",mn:"材料指导情境 / 心理素质太平",x:"· 为什么：迁移能否发生，取决于两类条件——外部学习材料与情境是否相似、有无指导（客观），以及学习者自身态度、智力、认知结构、定势如何（主观）。\n· 根源：“学习情境相似有利于迁移”呼应桑代克的共同要素说；“认知结构数量质量”影响迁移则与概括化、认知结构迁移观相通。\n· 对比：定势是双刃剑——既可促进正迁移，也可造成负迁移。"},
 {n:123,cat:"学习策略与迁移",s:"学习迁移",q:"教学中如何促进有效迁移",a:"版本一：\n（1）整合学科内容。（2）加强知识联系。（3）重视学习策略。\n（4）强调概括总结。（5）培养迁移意识。\n版本二：\n（1）精选教材。（2）合理编排教学内容。\n（3）合理安排教学程序。（4）教授学习策略，提高迁移意识性。",mn:"容易盖厕纸 / 精编成册",x:"· 为什么：促进迁移的核心是让新旧知识“能挂上钩”——精选合理编排教材使结构清晰、加强知识联系促概括、再教策略提升学生主动迁移的意识。\n· 根源：“强调概括总结”直接呼应贾德的概括化理论（领会原理越深，迁移越好）。\n· 对比：这是操作题，重在“为什么这样能迁移”，落点是知识的组织与概括，不硬套人名。"},
 {n:124,cat:"知识与技能",s:"知识的类型",q:"简述陈述性知识和程序性知识的联系和区别",a:"联系：\n（1）陈述性知识是学习程序性知识的基础。\n（2）陈述性知识为执行某个实际操作程序提供必要的信息。\n（3）程序性知识的掌握会促进陈述性知识的深化。\n（4）陈述性知识常常是创造的基础。\n区别：\n（1）定义不同。陈述性知识指个人有意识地提取线索，因而能够用言语直接陈述的知识，主要解决是什么、\n为什么的问题；程序性知识指没有有意识地提取线索，因而难以用言语陈述、只能借助某种作业形式间接推\n测的知识，主要用来解决做什么和怎么做的问题。\n（2）表征方式不同。陈述性知识主要以概念、命题和命题网络等形式进行表征，程序性知识主要以产生式和\n产生式系统进行表征。\n（3）测量方式不同。陈述性知识是能直接陈述的知识，是一种直接测量；程序性知识是一种操作步骤，是一\n种间接测量。\n（4）学习和遗忘速度不同。对于陈述性知识，学习速度较快，遗忘也快；对于学习程序性知识，学习的速度\n较慢，遗忘也慢。\n（5）激活和提取速度不同。陈述性知识是一种静态知识，激活的速度比较慢。程序性知识是一种动态知识，\n激活的速度比较快。",mn:"表姨测习题",x:"· 为什么：两类知识本就是同一认知系统的两端——陈述性管“知道”，程序性管“会做”，所以学了“是什么”才谈得上“怎么做”，二者必然相互依存。\n· 根源：安德森ACT理论。陈述性以命题网络表征（静态、提取慢、易遗忘），程序性以“产生式（如果…就…）”表征（动态、激活快、难遗忘），程序性正是由陈述性反复练习转化而来。\n· 对比：记区别看四个维度——表征（命题网络vs产生式）、测量（直接陈述vs间接看作业）、学忘速度（快快vs慢慢）、激活速度（慢vs快）。"},
 {n:125,cat:"知识与技能",s:"知识的类型",q:"简述陈述性知识和程序性知识的学习过程",a:"陈述性知识：\n（1）理解（2）巩固（3）应用\n程序性知识：（1）陈述性阶段（2）转化阶段（3）自动化阶段。",mn:"解雇佣 / 树转动 / 程序化阶段",x:"· 为什么：陈述性是认识—记住—会用的认知递进，所以走理解→巩固→应用；程序性的核心是把规则练成自动反应，所以必经从“知道规则”到“不假思索”的转化。\n· 根源：程序性三阶段（陈述性→转化→自动化）正是安德森ACT理论：先把规则当陈述性知识记住，再边练边把命题转成产生式，最后熟练到无需意识监控。\n· 对比：别把两者混记——陈述性走“理巩用”，程序性走“陈转自”，后者起点恰是前者，体现两类知识的衔接。"},
 {n:126,cat:"知识与技能",s:"知识的理解与应用",q:"简述影响知识理解的因素",a:"（1）客观因素\n①学习材料的内容。\n②学习材料的形式。\n③教师言语的提示与指导。\n（2）主观因素\n①原有知识经验背景的影响。\n②学生的能力水平。\n③主动理解的意识与方法。",mn:"形容语能结缘",x:"· 为什么：理解就是新旧知识建立联系的过程，凡能影响材料本身是否好懂、和学生头脑里有没有可挂靠旧知的因素，都会左右理解，故分客观（材料、形式、教师提示）与主观（旧经验、能力、主动性）。\n· 对比：客观因素是“外部给的”，主观因素是“学生自带的”，做题时按这条线分类不易漏。"},
 {n:127,cat:"知识与技能",s:"知识的理解与应用",q:"简述提高知识理解水平的措施",a:"（1）扩充和利用感性经验。\n（2）运用变式与比较。\n（3）知识的系统化。\n（4）通过启发式教学，提高学生思维活动的积极性。\n（5）照顾学生理解教材的特点。",mn:"敢变七夕节",x:"· 为什么：理解的实质是把抽象知识与感性经验、已有结构挂钩，所以要补感性经验、用变式比较抓本质、把零散知识系统化，再用启发式调动学生主动加工——每条都对着促成新旧联系这个目标。\n· 对比：与知识概括的措施易混——概括强调正反例和变式以抽取共同本质；理解更全面，还含感性经验、系统化、启发式。"},
 {n:128,cat:"知识与技能",s:"知识的理解与应用",q:"如何有效促进知识的概括",a:"（1）配合运用正例和反例。\n（2）正确运用变式。\n（3）科学进行比较。\n（4）启发学生进行自觉概括。",mn:"反正是比较自觉",x:"· 为什么：概括就是从具体事例中抽取共同本质并排除非本质，所以要正例（显本质）配反例（排干扰）、用变式（换非本质特征防止以偏概全）、比较（分清异同），最后引导学生自觉概括以内化。\n· 对比：正例帮“归类”，反例帮“划界”，变式防“把无关特征误当本质”，三者分工记忆更清。"},
 {n:129,cat:"知识与技能",s:"知识的理解与应用",q:"简述知识巩固的途径",a:"（1）提高识记的目的性、自觉性。\n（2）指导学生采用各种有效的记忆方法，使学生获得良好的识记效果。\n（3）合理地组织复习：复习要及时，复习要合理，复习活动既要避免无限过度，又要坚持适当超额。",mn:"",x:"· 为什么：巩固即对抗遗忘、保持知识，而遗忘先快后慢，故要靠明确识记目的（提高编码质量）、有效记忆方法（深加工）、及时合理复习（趁遗忘前强化）三管齐下。\n· 根源：合理复习要求及时、适当超额、避免无限过度，正源于艾宾浩斯遗忘规律（先快后慢）与过度学习150%效果最佳的结论。"},
 {n:130,cat:"知识与技能",s:"知识的理解与应用",q:"简述影响知识应用的因素",a:"（1）课题的性质。\n（2）学生对知识的理解与保持的水平。\n（3）学生提取信息的策略。\n（4）解决问题的策略。",mn:"可知心结",x:"· 为什么：应用是把已掌握知识用于解决新课题的过程，其成败取决于课题本身难易、学生对知识理解保持得牢不牢、以及能否有效提取信息和选对解题策略——前两项管有没有料，后两项管会不会调用。\n· 对比：理解保持水平管知识储备，两个策略管提取与运用，分这两层不易漏点。"},
 {n:131,cat:"知识与技能",s:"技能概述",q:"简述操作技能和心智技能的含义及特点",a:"（1）客观性；（2）外显性；（3）展开性。",mn:"课外展 / 荆轲写诗 / 观内简",x:"· 为什么：题目实为对比两类技能特点。操作技能动作外显、作用于实物，故具客观性（对象是客观事物）、外显性（动作看得见）、展开性（每一步都要做出来）；心智技能在头脑内进行，则相反——主观、内潜、简缩。\n· 对比：操作技能=客观、外显、展开；心智技能=主观、内潜、简缩，三对特征正好相反，对照记忆最牢。"},
 {n:132,cat:"知识与技能",s:"技能概述",q:"简述操作技能和心智技能的区别和联系",a:"区别：活动的对象不同；活动的结构不同；活动的要求不同。\n联系：一方面，动作技能经常是智力技能形成的最初依据。另一方面，智力技能往又是外部动作技能\n的支配者和调节者。",mn:"",x:"· 为什么：二者区别根在动作在哪进行——操作技能作用于物体（对象不同）、靠肌肉骨骼系统（结构不同）、要求准确协调有力（要求不同）；心智技能在头脑内、靠观念活动、要求合理简缩。联系则是动作技能常为心智技能提供最初依据，心智技能反过来支配调节动作。\n· 对比：记区别抓对象、结构、要求三点；记联系抓互为依据、相互调节。"},
 {n:133,cat:"知识与技能",s:"操作技能",q:"简述冯忠良关于操作技能形成阶段的理论",a:"（1）操作定向。\n（2）操作模仿。\n（3）操作整合。\n（4）操作熟练。",mn:"定仿合练",x:"· 为什么：动作技能的形成是从知道怎么做到熟练自动的渐进——先弄清动作结构与要领（定向），再照着做（模仿），把分散动作连成整体（整合），最后反复练到熟练自动（熟练），每阶段都为下一阶段铺路。\n· 根源：冯忠良操作技能四阶段——操作定向、操作模仿、操作整合、操作熟练。注意区别于加里培林的心智技能五阶段。\n· 对比：易与心智技能阶段混——这是操作技能、冯忠良、四阶段，认人对号别张冠李戴。"},
 {n:134,cat:"知识与技能",s:"操作技能",q:"简述影响动作技能形成的因素",a:"（1）内部条件\n①学习动作技能的动机。\n②相应的生理成熟水平和丰富的知识经验。\n③正常的智力水平。\n④良好的人格特征。\n⑤适当的生理唤醒水平。\n（2）外部条件\n①科学的指导。②练习。",mn:"证人换生机",x:"· 为什么：动作技能既是身心协同的活动，又离不开外部条件，故内部需有学习动机、生理成熟与知识经验、正常智力、良好人格、适当唤醒水平（太高太低都影响发挥），外部则需科学指导和练习。\n· 对比：唤醒水平讲适当——遵循耶克斯-多德森定律，过度紧张反而干扰动作，故强调适中。"},
 {n:135,cat:"知识与技能",s:"操作技能",q:"简述操作技能的培训要求",a:"（1）准确的示范与讲解。\n（2）必要而适当的练习。\n（3）充分而有效的反馈。\n（4）建立稳定清晰的动觉。",mn:"失恋反动",x:"· 为什么：操作技能靠练出来，关键在让学生看清楚、练到位、知对错、动作有“感觉”——故需准确示范讲解（建立正确动作表象）、适当练习（形成与巩固）、有效反馈（及时纠错）、稳定清晰的动觉（靠内部本体感觉自我监控）。\n· 对比：建立动觉是操作技能特有要求——熟练后要靠肌肉本体感觉而非眼睛监控动作，这是与心智技能培养的不同处。"},
 {n:136,cat:"知识与技能",s:"操作技能",q:"简述组织练习的原则",a:"（1）明确练习的目的和要求，增强学习动机。\n（2）帮助学生掌握正确的练习方法。\n（3）正确掌握练习的次数、时间，保证练习的质量。\n（4）注意练习方式的多样化。集中练习与分散练习相结合，合理应用整体练习与分散练习。",mn:"多次求方法",x:"· 为什么：练习是技能形成的根本途径，组织练习要解决为何练、怎么练、练多少、怎样练才不单调——故先激发动机明确目的，再教对方法（错误方法越练越糟），控制次数时间保证质量，并多样化方式防止疲劳与机械重复。\n· 对比：强调掌握正确方法，因错误动作一旦练成产生式，纠正成本极高，故方法先于数量。"},
 {n:137,cat:"知识与技能",s:"操作技能",q:"简述对学生进行动作示范教学的基本要求",a:"（1）动作示范要有明确的目的和要求。\n（2）示范者的身份、示范的准确性以及何时给予示范很重要。\n（3）动作示范与言语讲解相结合。\n（4）整体示范与分解示范相结合。\n（5）加强模仿练习和评价。\n（6）示范动作要重复，动作速度要放慢\n（7）指导学生观察，并纠正学生的错误理解",mn:"品茶要放整份盐",x:"· 为什么：示范的本质是给学生提供正确的动作表象与模仿对象，故要目的明确、示范者可信且时机得当、配合言语讲解（说清要领）、整体与分解结合（先见全貌再抠细节）、放慢重复（便于观察）、指导观察并纠错——全程围绕让学生看清、看懂、学对。\n· 根源：示范属观察学习，呼应班杜拉社会学习理论——示范者身份越可信、动作越清晰，替代学习效果越好。"},
 {n:138,cat:"知识与技能",s:"技能形成的规律",q:"高原现象的含义及产生的原因",a:"动作技能的形成过程中，在新的动作组织体系还没有建立之前，往往会出现一个进步暂时停顿甚至下\n降的现象，就是高原现象。\n（1）学习方法固定化。\n（2）学习任务复杂化。\n（3）学习动机减弱。\n（4）学习兴趣降低。\n（5）生理和心理上疲劳。\n（6）意志力薄弱。",mn:"法医任性动心",x:"· 为什么：高原期是技能形成中旧动作体系已不够用、新体系尚未建立的过渡停滞，原因都指向推不动改进——方法固化（老办法到天花板）、任务变复杂、动机减弱、兴趣降低、身心疲劳、意志薄弱。\n· 根源：高原现象出现在操作技能形成过程中，是练习曲线上暂时的停顿期，并非能力到顶。\n· 对比：高原期≠极限——前者可通过更新方法突破，后者是生理上限，二者本质不同。"},
 {n:139,cat:"知识与技能",s:"技能形成的规律",q:"简述克服高原现象的措施",a:"（1）正确认识，找出原因。\n（2）打牢基础。\n（3）提高学习能力。\n（4）更新方法。\n（5）增强克服困难的意志力。",mn:"高新力基因",x:"· 为什么：既然高原是新旧动作体系交替的卡顿，破解就要对症——先认清原因（非到极限）、打牢基础、提高学习能力、更新方法（突破固化）、增强意志力坚持下去，核心是帮学生建立起新的动作组织体系。\n· 对比：与高原成因正好对应——成因有方法固化、意志薄弱，措施就有更新方法、增强意志，前因后果对照记。"},
 {n:140,cat:"知识与技能",s:"技能形成的规律",q:"简述练习曲线的特点",a:"（1）开始进步快。\n（2）中间有一个明显的、暂时的停顿期，即高原期。\n（3）后期进步较慢。\n（4）总趋势是进步的，但有时出现暂时的退步。",mn:"",x:"· 为什么：练习曲线反映技能熟练的进程——初期生疏处多、改进空间大故进步快；中期遇新旧体系交替出现高原期；后期接近极限故进步变慢；总体上升但偶有疲劳或方法调整导致的暂时退步。\n· 根源：曲线中间的明显停顿即高原期，是练习曲线最典型的考点特征。\n· 对比：总趋势进步≠匀速进步——有先快后慢、有高原、有暂时退步，这种非匀速正是其特点。"},
 {n:141,cat:"知识与技能",s:"技能形成的规律",q:"简述操作技能形成的标志",a:"（1）意识调控作用减弱，动作达到自动化。\n（2）能够利用细微线索\n（3）动觉反馈作用加强\n（4）形成运动程序的记忆图式。\n（5）在不利条件下维持正常的操作水平",mn:"不诚实反锁",x:"· 为什么：操作技能形成的标志都指向动作自动化——意识调控减弱（不必时时盯着）、能利用细微线索（凭一点信号判断）、动觉反馈加强（靠肌肉感觉调节）、形成运动记忆图式（动作成套打包）、不利条件下仍能正常操作（抗干扰强）。\n· 根源：这些标志正对应程序性知识的自动化阶段（安德森ACT）——动作已固化为产生式，无需意识监控即可流畅执行。"},
 {n:142,cat:"知识与技能",s:"心智技能",q:"心智技能的形成过程包括哪几个阶段",a:"加里培林将心智动作的形成分为以下五个阶段：\n（1）活动的定向阶段（准备阶段）。\n（2）物质活动或物质化活动阶段。\n（3）出声的外部言语活动阶段。（4）无声的外部言语活动阶段。（5）内部言语活动阶段。",mn:"活物出屋呐 / 香草化",x:"· 为什么：心智技能是把外部实际动作逐步内化为头脑内观念活动的过程，故从认清任务（定向）→借实物操作（物质化）→出声说着做（出声外部言语）→默念着做（无声外部言语）→纯头脑里做（内部言语），言语逐步取代外部动作、活动逐步简缩内潜。\n· 根源：加里培林心智动作五阶段——活动定向、物质或物质化活动、出声的外部言语、无声的外部言语、内部言语。\n· 对比：勿与冯忠良操作技能三阶段（原型定向、原型操作、原型内化）或四阶段混——这是加里培林、五阶段，记准人名与数目。"},
 {n:143,cat:"知识与技能",s:"心智技能",q:"简述心智技能的培养要求",a:"（1）确立合理的智力活动原型。\n（2）教师利用示范和讲解，并有效进行分阶段练习。\n①激发学习的积极性与主动性；\n②注意原型的完备性、独立性与概括性；\n③适应培养的阶段特征，正确使用语言；\n④注意学生的个别差异；\n⑤科学地进行练习。\n（3）知识影响技能的形成。\n（4）注重培养学生认真思考的习惯和独立思考的能力。",mn:"讲（圆姐积动查课）元认知",x:"· 为什么：心智技能培养的核心是帮学生把正确的智力活动方式内化，故先确立合理原型（给对模板）、再分阶段示范讲解与练习（逐步内化）、并借助已有知识、培养独立思考——全程对应原型从定向到内化的转化。\n· 根源：呼应冯忠良原型定向—原型操作—原型内化三阶段——先建立活动原型（智力活动的物化样例），再操作，最后内化为内部言语操作。\n· 对比：原型的完备性、独立性、概括性是该理论关键词；原型即智力活动的实践模式，是内化的起点。"},
 {n:144,cat:"心理健康与教师心理",s:"心理健康教育概述",q:"简述心理健康的标准",a:"（1）自我意识正确。\n（2）人际关系协调。\n（3）性别角色分化。\n（4）社会适应良好。\n（5）情绪积极稳定。\n（6）人格结构完整。\n+智力正常",mn:"我任性舍情人",x:"· 为什么：心理健康不是“没病”，而是“全面良好”。把人拆成“认知-情绪-人格-社会”四大块来看：智力正常是认知基础，情绪稳定是内在状态，人格完整是核心结构，人际协调+社会适应+自我意识+性别角色则是与外界互动的良好表现。\n· 对比：“智力正常”是前提（智力低下谈不上心理健康），常被忽略要补上；“自我意识正确”指能客观认识评价自己，是各标准的统帅。"},
 {n:145,cat:"心理健康与教师心理",s:"心理健康教育概述",q:"简述心理健康教育的原则",a:"（1）全体性原则；\n（2）教育性原则；\n（3）主体性原则；\n（4）系统性原则；\n（5）差异性原则；\n（6）发展性原则；\n（7）活动性原则；\n（8）保密性原则。",mn:"全教主统一发活宝",x:"· 为什么：原则回答“面向谁、要做什么”。全体性=面向所有学生（不只是问题生），主体性=学生是主角，发展性=着眼成长而非补漏，这三条是心理健康教育区别于“治病”的灵魂。教育性、系统性、差异性、活动性是落地要求，保密性是底线伦理。\n· 对比：易与“心理辅导原则”（n=154）混。本组8条是“教育”层面的，含教育性/系统性/活动性；辅导原则突出“预防与发展结合”“尊重理解”。"},
 {n:146,cat:"心理健康与教师心理",s:"心理健康教育概述",q:"简述学校心理健康教育的基本途径",a:"（1）开设心理健康教育有关课程。\n（2）开设心理辅导活动课。\n（3）在学科教学中渗透心理健康教育的内容。\n（4）结合班级、团队活动开展心理健康教育。\n（5）个别心理辅导或咨询。\n（6）小组辅导。",mn:"小哥城府极深",x:"· 为什么：“途径”回答“在哪些场合做”，从面到点排布：专门渠道（心理课、辅导活动课）→渗透到学科教学→融入班团活动→缩小到小组辅导→精确到个别咨询。覆盖面由广到窄，体现“全员+个别”并举。\n· 对比：途径(场合/渠道) vs 方法(具体操作技术，n=147)。“开设课程”“学科渗透”是途径；“谈话法”“角色扮演”是方法，别答反。"},
 {n:147,cat:"心理健康与教师心理",s:"心理健康教育概述",q:"简述心理健康教育的方法",a:"（1）谈话法。\n（2）咨询面谈。\n（3）建立心理档案。\n（4）角色扮演。\n（5）班级、小组讨论。",mn:"谈谈小心眼",x:"· 为什么：“方法”是教师手里的具体操作工具。谈话、咨询面谈靠语言沟通；建立心理档案靠记录追踪；角色扮演、班级小组讨论靠活动体验。逻辑是“说-记-演-议”，对应不同情境的干预手段。\n· 对比：与“途径”(n=146)易混——途径是“在哪做”（开课、渗透），方法是“怎么做”（谈话、扮演）。"},
 {n:148,cat:"心理健康与教师心理",s:"心理素质教育",q:"学校心理素质教育的基本任务",a:"（1）促进和维护学生心理健康。\n（2）开发智力，促进能力发展。\n（3）提高德性修养，培养良好品德。\n（4）培养主体意识，形成完善人格。\n（5）养成良好行为习惯，提高社会适应能力。",mn:"朱德开户行",x:"· 为什么：心理素质教育的任务不止“保心理健康”，而是借心理为支点全面育人：先维护心理健康（保底）→开发智力能力（智）→提高德性品德（德）→培养主体意识完善人格（人格）→养成习惯提高社会适应（行为）。从守底线到促发展层层递进。\n· 对比：“任务”(目标，要达成什么) vs “途径”(n=149，怎么去达成)，问任务别答途径。"},
 {n:149,cat:"心理健康与教师心理",s:"心理素质教育",q:"学校心理素质教育的基本途径",a:"（1）心理素质专题训练：判断鉴别、训练策略、反思体验。\n（2）心理辅导。\n（3）学科渗透。",mn:"别策反 / 专心学",x:"· 为什么：途径回答“用什么渠道实施素质教育”。专题训练是“专门练”（判断鉴别→训练策略→反思体验，即先辨别再练习再内化）；心理辅导是“个别帮”；学科渗透是“日常融”。三条覆盖“专、辅、渗”。\n· 对比：专题训练的三环“判断鉴别-训练策略-反思体验”是高频细节，体现“认识-操作-内化”的学习闭环。"},
 {n:150,cat:"心理健康与教师心理",s:"常见心理问题",q:"简述中小学生常见的心理问题",a:"（1）多动症；\n（2）焦虑症；\n（3）强迫症；\n（4）学习困难综合征；\n（5）儿童厌学症；\n（6）抑郁症；\n（7）恐怖症；\n（8）人格障碍。",mn:"多人厌学一墙胶布",x:"· 为什么：这是按“症状表现”归类的常见问题清单，多为学龄期高发。可分三类记：行为类（多动症）、情绪类（焦虑、抑郁、恐怖症）、与学习相关（学习困难综合征、厌学症），加上强迫症和人格障碍。\n· 对比：与“青春期少年问题”(n=152)区分——本组是“症”（多动、抑郁等临床类问题），青春期组是“阶段性困扰”（关注自我、人际冲突、性心理）。"},
 {n:151,cat:"心理健康与教师心理",s:"常见心理问题",q:"简述考试焦虑的主要表现及矫正方法",a:"（1）表现：随着考试临近，心情极度紧张。考试时不能集中注意，知觉范围变窄，思维刻板，出现慌\n乱，无法发挥正常水平。考试后又持久地不能松弛下来。\n（2）矫正：\n①肌肉放松。\n②系统脱敏方法。\n③运用自助性认知矫正程序，指导学生在考试中使用正向的自我对话。",mn:"自己脱",x:"· 为什么：考试焦虑本质是“情境引发的过度紧张”，所以矫正按“身-心”两路走：先肌肉放松降低生理唤醒，再用系统脱敏切断“考试-恐惧”的条件联结，最后用积极自我对话替换消极念头。\n· 根源：系统脱敏由沃尔普创立，原理是把放松状态与逐级递增的焦虑情境配对，使恐惧逐步消退，是治考试焦虑的标志性方法。\n· 对比：“肌肉放松”是“脱敏”的前置技术，二者常配套出现。"},
 {n:152,cat:"心理健康与教师心理",s:"常见心理问题",q:"简述青春期少年常见的心理、行为问题",a:"（1）过度关注自我；\n（2）情绪的两极性；\n（3）性别角色混乱；\n（4）人格冲突；\n（5）人际关系冲突；\n（6）性心理问题。",mn:"两人过度乱性",x:"· 为什么：青春期问题都根源于“半成熟半幼稚”的过渡矛盾。生理急变带来过度关注自我、性别角色混乱、性心理问题；心理急变带来情绪两极性、人格冲突；社会角色变化带来人际关系冲突。一句话：身心剧变跟不上自我整合。\n· 对比：这是“发展性”困扰（人人或多或少会有），区别于n=150那种需要矫治的“症”。"},
 {n:153,cat:"心理健康与教师心理",s:"心理辅导",q:"简述心理辅导的内容",a:"（1）学习心理辅导。\n（2）生活心理辅导。\n（3）人格心理辅导。\n（4）升学与择业心理辅导。\n（5）心理危机的干预与预防。",mn:"学生野人浴",x:"· 为什么：辅导“内容”围绕学生成长的几大人生领域铺开：学习（主业）、生活（日常）、人格（内在自我）、升学择业（未来方向），再加心理危机干预（应急兜底）。从“当下学习”到“长远发展”再到“危机防护”。\n· 对比：“内容”(辅导什么) vs “方法”(n=155，用什么技术)，别混。"},
 {n:154,cat:"心理健康与教师心理",s:"心理辅导",q:"简述心理辅导的原则",a:"（1）面向全体学生原则。\n（2）预防与发展相结合原则。\n（3）尊重与理解学生原则。\n（4）学生主体性原则。\n（5）个别化对待原则。\n（6）整体性发展原则。",mn:"诸葛御姐争权",x:"· 为什么：辅导原则的核心精神是“助人自助、面向发展”。面向全体+尊重理解=人本立场；预防与发展结合=不等出问题才管；学生主体+个别化=尊重差异让其自主；整体性发展=促进人格全面成长。\n· 对比：与“心理健康教育原则”(n=145)易混。辅导原则突出“预防与发展相结合”“尊重与理解”；教育原则突出“教育性”“活动性”“保密性”。"},
 {n:155,cat:"心理健康与教师心理",s:"心理辅导",q:"心理辅导中常用的方法有哪些",a:"（1）行为改变的方法：\n①强化法；②代币奖励法；③行为塑造法；④消退法；\n⑤示范法；⑥惩罚法；⑦自我控制法；⑧暂时隔离法。\n（2）行为演练的方法：①全身松弛法；②系统脱敏法；③肯定性训练。\n（3）改善认知的方法：理性—情绪辅导方法。",mn:"我小哥必强行惩示 / 肯定全脱",x:"· 为什么：辅导方法按“改什么”分三类——改行为（直接增减行为：强化/代币/塑造/消退/示范/惩罚等）、练行为（在放松中演练：松弛、脱敏、肯定性训练）、改认知（调整不合理想法）。即“行为-行为演练-认知”三路。\n· 根源：改善认知的“理性情绪疗法”源自艾利斯ABC理论，主张困扰非源于事件(A)而源于不合理信念(B)；系统脱敏属行为演练，由沃尔普创立。\n· 对比：代币奖励=正强化的具体应用；消退=不再给强化使行为减少，别与惩罚混。"},

const SKEYS={edu:"edu_srs_v1",psy:"psy_srs_v1"};
const SUBJ_NAMES={edu:"教育学",psy:"心理学"};
let subject=localStorage.getItem("kz_subject")||"edu";
if(!DATA[subject])subject="edu";
let CARDS=DATA[subject];

/* ============ 间隔重复引擎（Leitner 盒子） ============ */
const INTERVALS=[0,1,2,4,7,15,30]; // box -> 天数
const DAY=86400000;
function todayNum(){return Math.floor(Date.now()/DAY);}
let state=load();
function load(){
  let s={};
  try{s=JSON.parse(localStorage.getItem(SKEYS[subject]))||{};}catch(e){}
  CARDS.forEach((c,i)=>{ if(!s[i]) s[i]={box:0,due:todayNum(),seen:false}; });
  return s;
}
function save(){localStorage.setItem(SKEYS[subject],JSON.stringify(state));}

let mode="srs", cat="全部", queue=[], pos=0, turned=false;

function buildCatOptions(){
  const counts={};
  CARDS.forEach(c=>{counts[c.cat]=(counts[c.cat]||0)+1;});
  const cats=[...new Set(CARDS.map(c=>c.cat))];
  let html=`<option value="全部">全部（${CARDS.length}）</option>`;
  html+=cats.map(c=>`<option value="${c}">${c}（${counts[c]}）</option>`).join("");
  document.getElementById("cat").innerHTML=html;
}
function inCat(i){return cat==="全部"||CARDS[i].cat===cat;}

// 二级下拉：当前一级分类下的全部题目，选中即跳转
function buildTopicOptions(){
  const idx=CARDS.map((_,i)=>i).filter(inCat);
  let html=`<option value="">— 跳到题目（共 ${idx.length} 题）—</option>`;
  html+=idx.map(i=>{const c=CARDS[i];
    return `<option value="${c.n}">#${c.n} ${c.q.replace(/^简述/,"")}</option>`;}).join("");
  document.getElementById("topic").innerHTML=html;
}
function jumpToN(n){
  const cardIdx=CARDS.findIndex(c=>c.n===n);
  if(cardIdx<0)return;
  if(mode==="map"){gotoRead(n);return;}
  if(mode==="read"){
    const el=document.getElementById("card-"+n);
    if(el){el.scrollIntoView({behavior:"smooth",block:"start"});
      el.classList.remove("flash");void el.offsetWidth;el.classList.add("flash");}
  }else{
    const list=CARDS.map((_,i)=>i).filter(inCat);
    const p=list.indexOf(cardIdx);
    queue=list;pos=p<0?0:p;turned=false;render();
  }
  toast(`已跳到 #${n}`);
}

function buildQueue(){
  let idx=CARDS.map((_,i)=>i).filter(inCat);
  if(mode==="srs"){
    // 到期的（含新卡 box0 due<=today）
    queue=idx.filter(i=>state[i].due<=todayNum());
  }else{
    queue=idx.slice();
  }
  pos=0;turned=false;
}
function shuffleNow(){for(let i=queue.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[queue[i],queue[j]]=[queue[j],queue[i]];}pos=0;turned=false;render();toast("已打乱");}

function grade(g){ // 0不会 1模糊 2会
  const id=queue[pos];const s=state[id];s.seen=true;
  if(g===0) s.box=0;                                        // 不会：退回第0盒
  else if(g===1) { /* 模糊：盒子不变，间隔不变 */ }
  else if(g===2) s.box=Math.min(INTERVALS.length-1,s.box+1);// 记住：进下一盒，拉长间隔
  s.due=todayNum()+INTERVALS[s.box];
  save();
  pos++;turned=false;
  render();updateStats();
}

function toast(t){const el=document.getElementById("toast");el.textContent=t;el.classList.add("show");clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove("show"),1400);}

function render(){
  const stage=document.getElementById("stage");
  if(pos>=queue.length){
    stage.innerHTML=`<div class="empty"><b>🎉 ${mode==='srs'?'今日复习完成！':'本组已看完！'}</b><br><br>
      ${mode==='srs'?'到期卡片都过了一遍。明天再来，或切到『通览模式』继续看。':'切换分类或点『打乱顺序』再来一轮。'}</div>`;
    document.getElementById("bar").style.width="100%";
    return;
  }
  const id=queue[pos];const c=CARDS[id];const s=state[id];
  const boxTxt=s.box===0?(s.seen?"复习":"新卡"):`第${s.box}盒`;
  stage.innerHTML=`
    <div class="deck">
      <div class="flip ${turned?'turned':''}" id="flip" onclick="flip()">
        <div class="face front">
          <span class="box-badge">#${c.n} · ${boxTxt} · ${pos+1}/${queue.length}</span>
          <div class="cat">${c.cat}</div>
          <div class="q">${c.q}</div>
          <div class="hint">👆 点击卡片，先自己回忆，再翻看答案</div>
        </div>
        <div class="face back">
          <span class="box-badge">${c.cat}</span>
          <div class="cat">答案</div>
          <div class="a">${c.a}</div>
          ${c.mn?`<div class="mn">💡 ${c.mn}</div>`:''}
          ${c.x?`<details class="exp" onclick="event.stopPropagation()"><summary>📖 展开解析（为什么 · 根源 · 对比）</summary><div class="expbody">${c.x}</div></details>`:''}
        </div>
      </div>
    </div>
    ${turned
      ? `<div class="grade">
           <button class="g-bad" onclick="grade(0)">不会<br><small>明天再背</small></button>
           <button class="g-warn" onclick="grade(1)">模糊<br><small>短期再现</small></button>
           <button class="g-good" onclick="grade(2)">记住了<br><small>拉长间隔</small></button>
         </div>`
      : `<button class="reveal" onclick="flip()">显示答案</button>`}
  `;
  document.getElementById("bar").style.width=(pos/queue.length*100)+"%";
}
function flip(){if(mode==="read"||mode==="map")return;turned=!turned;render();}

/* ============ 阅读模式：像PDF一样平铺全部内容 ============ */
function renderReading(){
  const idx=CARDS.map((_,i)=>i).filter(inCat);
  const catName=cat==="全部"?"全部分类":cat;
  document.getElementById("stage").innerHTML=`<div class="reader">
    <div class="readhead">📖 阅读模式 · ${catName} · 共 ${idx.length} 题（题目 → 答案 → 口诀 → 解析，全部展开）</div>
    ${idx.map(i=>{const c=CARDS[i];return `
      <section class="ritem" id="card-${c.n}">
        <span class="rcat">${c.cat}</span>
        <h3><span class="rnum">#${c.n}</span>${c.q}</h3>
        <div class="ra">${c.a}</div>
        ${c.mn?`<div class="mn">💡 口诀：${c.mn}</div>`:''}
        ${c.x?`<details class="exp"><summary>📖 展开解析（为什么 · 根源 · 对比）</summary><div class="expbody">${c.x}</div></details>`:''}
      </section>`}).join("")}
  </div>`;
  window.scrollTo({top:0});
}
/* ============ 思维导图模式：一级分类 → 二级主题 → 题目（折叠大纲树） ============ */
function renderMindmap(){
  const idx=CARDS.map((_,i)=>i).filter(inCat);
  // 按出现顺序组织：cat -> sub -> [cards]
  const tree=[];const catMap={};
  for(const i of idx){const c=CARDS[i];
    let cn=catMap[c.cat];
    if(cn===undefined){cn=tree.length;catMap[c.cat]={i:cn};tree.push({cat:c.cat,subs:[],subMap:{}});catMap[c.cat]=tree[cn];}
    let t=catMap[c.cat];
    let sn=t.subMap[c.s];
    if(sn===undefined){sn=t.subs.length;t.subMap[c.s]=sn;t.subs.push({sub:c.s,cards:[]});}
    t.subs[sn].cards.push(c);
  }
  const single=tree.length===1;            // 只有一个一级分类时默认展开它
  const html=`<div class="mapwrap">
    <div class="maphead">🗺️ 思维导图 · ${cat==="全部"?"全部分类":cat} · ${tree.length}大类 / ${idx.length}题
      <span class="maptools"><button onclick="mapToggleAll(true)">展开全部</button><button onclick="mapToggleAll(false)">折叠全部</button></span>
    </div>
    <div class="tree">
    ${tree.map(t=>{const tcnt=t.subs.reduce((a,s)=>a+s.cards.length,0);return `
      <details class="lv1"${single?" open":""}>
        <summary><span class="tw"></span><span class="l1name">${t.cat}</span><span class="cnt">${tcnt}</span></summary>
        <div class="lv1body">
        ${t.subs.map(s=>`
          <details class="lv2">
            <summary><span class="tw"></span><span class="l2name">${s.sub}</span><span class="cnt">${s.cards.length}</span></summary>
            <ul class="leaves">
              ${s.cards.map(c=>`<li onclick="gotoRead(${c.n})"><span class="lnum">#${c.n}</span>${c.q.replace(/^简述/,"").replace(/^简答/,"")}</li>`).join("")}
            </ul>
          </details>`).join("")}
        </div>
      </details>`}).join("")}
    </div></div>`;
  document.getElementById("stage").innerHTML=html;
  window.scrollTo({top:0});
}
function mapToggleAll(open){
  document.querySelectorAll("#stage .tree details").forEach(d=>d.open=open);
}
// 从导图/搜索跳到某题：切到阅读模式并定位高亮
function gotoRead(n){
  document.querySelectorAll("#mode button").forEach(x=>x.classList.toggle("on",x.dataset.m==="read"));
  mode="read";refresh();
  const el=document.getElementById("card-"+n);
  if(el){el.scrollIntoView({behavior:"smooth",block:"start"});
    el.classList.remove("flash");void el.offsetWidth;el.classList.add("flash");}
  toast("已定位到 #"+n);
}
// 统一刷新：阅读=平铺，导图=折叠树，其余=刷卡
function refresh(){
  const bar=document.querySelector(".bar");
  if(mode==="read"){bar.style.display="none";renderReading();}
  else if(mode==="map"){bar.style.display="none";renderMindmap();}
  else{bar.style.display="";buildQueue();render();}
}

/* ============ 学科切换（教育学 / 心理学） ============ */
function updateSubjectUI(){
  document.querySelectorAll("#subject button").forEach(b=>b.classList.toggle("on",b.dataset.s===subject));
  document.getElementById("tag").textContent=
    `${SUBJ_NAMES[subject]} · 共 ${CARDS.length} 题 · 主动回忆+间隔重复 · 进度按学科分别保存`;
  document.title=SUBJ_NAMES[subject]+"记忆卡片 · 教资简答";
  const se=document.getElementById("search");
  if(se)se.placeholder=subject==="edu"
    ?"🔍 搜索关键词，如：教学原则 / 启发性 / 班主任 / #69"
    :"🔍 搜索关键词，如：记忆 / 马斯洛 / 皮亚杰 / #64";
}
function switchSubject(s){
  if(s===subject||!DATA[s])return;
  subject=s;localStorage.setItem("kz_subject",s);
  CARDS=DATA[subject];state=load();cat="全部";
  buildCatOptions();buildTopicOptions();
  document.getElementById("cat").value="全部";
  if($search){$search.value="";hideResults();}
  updateSubjectUI();refresh();updateStats();
  window.scrollTo({top:0});
  toast("已切换到"+SUBJ_NAMES[subject]);
}

function updateStats(){
  let due=0,nw=0,mastered=0;
  CARDS.forEach((_,i)=>{
    const s=state[i];
    if(!s.seen)nw++;
    if(s.due<=todayNum())due++;
    if(s.box>=5)mastered++;
  });
  document.getElementById("s-due").textContent=due;
  document.getElementById("s-new").textContent=nw;
  document.getElementById("s-mastered").textContent=mastered;
  document.getElementById("s-total").textContent=CARDS.length;
}

function resetAll(){
  if(confirm("确定重置所有学习进度吗？此操作不可撤销。")){
    localStorage.removeItem(KEY);state=load();buildQueue();render();updateStats();toast("进度已重置");
  }
}

/* ============ 搜索：关键词直达卡片 ============ */
let matches=[], selIdx=-1;
const $search=document.getElementById("search"), $results=document.getElementById("results");

function runSearch(){
  const raw=$search.value.trim();
  if(!raw){hideResults();return;}
  const q=raw.toLowerCase();
  // 支持 #编号 直接定位
  const numMatch=raw.match(/^#?\s*(\d+)$/);
  if(numMatch){
    const n=+numMatch[1];
    matches=CARDS.map((c,i)=>i).filter(i=>CARDS[i].n===n);
  }else{
    matches=CARDS.map((c,i)=>i).filter(i=>{
      const c=CARDS[i];
      return (c.q+c.a+c.mn+c.cat).toLowerCase().includes(q);
    });
    // 标题命中的排在前面
    matches.sort((a,b)=>{
      const qa=CARDS[a].q.toLowerCase().includes(q)?0:1;
      const qb=CARDS[b].q.toLowerCase().includes(q)?0:1;
      return qa-qb || CARDS[a].n-CARDS[b].n;
    });
  }
  selIdx=matches.length?0:-1;
  renderResults();
}
function renderResults(){
  if(!matches.length){
    $results.innerHTML=`<div class="none">没有找到匹配的卡片，换个关键词试试～</div>`;
    $results.classList.add("show");return;
  }
  $results.innerHTML=matches.slice(0,30).map((idx,i)=>{
    const c=CARDS[idx];
    const mn=c.mn?` · 口诀：${c.mn}`:"";
    return `<div class="ri ${i===selIdx?'sel':''}" data-i="${i}">
      <span class="rn">#${c.n}</span>${c.q}<br><small>${c.cat}${mn}</small></div>`;
  }).join("")+(matches.length>30?`<div class="none">仅显示前30条，共${matches.length}条</div>`:"");
  $results.classList.add("show");
}
function hideResults(){$results.classList.remove("show");matches=[];selIdx=-1;}
function jumpTo(i){
  if(i<0||i>=matches.length)return;
  const n=CARDS[matches[i]].n;
  hideResults();$search.blur();
  if(mode==="map"){gotoRead(n);return;}
  if(mode==="read"){            // 阅读模式：滚动定位并高亮
    const el=document.getElementById("card-"+n);
    if(el){el.scrollIntoView({behavior:"smooth",block:"start"});
      el.classList.remove("flash");void el.offsetWidth;el.classList.add("flash");}
    toast(`已定位到 #${n}`);
  }else{                        // 刷卡模式：队列设为全部命中项，可逐张翻看
    queue=matches.slice();pos=i;turned=false;render();
    toast(`已定位 · 共${queue.length}张命中卡片`);
  }
}

$search.addEventListener("input",runSearch);
$search.addEventListener("focus",()=>{if($search.value.trim())runSearch();});
$results.addEventListener("click",e=>{
  const ri=e.target.closest(".ri");if(ri)jumpTo(+ri.dataset.i);
});
$search.addEventListener("keydown",e=>{
  if(!matches.length)return;
  if(e.key==="ArrowDown"){e.preventDefault();selIdx=Math.min(matches.length-1,selIdx+1);renderResults();scrollSel();}
  else if(e.key==="ArrowUp"){e.preventDefault();selIdx=Math.max(0,selIdx-1);renderResults();scrollSel();}
  else if(e.key==="Enter"){e.preventDefault();jumpTo(selIdx<0?0:selIdx);}
  else if(e.key==="Escape"){hideResults();$search.blur();}
});
function scrollSel(){const el=$results.querySelector(".ri.sel");if(el)el.scrollIntoView({block:"nearest"});}
// 点击别处关闭结果
document.addEventListener("click",e=>{if(!e.target.closest(".searchbox"))hideResults();});

/* events */
document.querySelectorAll("#subject button").forEach(b=>b.addEventListener("click",()=>switchSubject(b.dataset.s)));
document.getElementById("cat").addEventListener("change",e=>{cat=e.target.value;buildTopicOptions();refresh();});
document.getElementById("topic").addEventListener("change",e=>{
  const n=+e.target.value;e.target.selectedIndex=0;
  if(n)jumpToN(n);
});
document.querySelectorAll("#mode button").forEach(b=>b.addEventListener("click",()=>{
  document.querySelectorAll("#mode button").forEach(x=>x.classList.remove("on"));
  b.classList.add("on");mode=b.dataset.m;refresh();
}));
document.addEventListener("keydown",e=>{
  // 在搜索框（或任意输入框）内打字时，不触发翻面/评分
  const t=e.target.tagName;
  if(t==="INPUT"||t==="TEXTAREA"||t==="SELECT")return;
  if(mode==="read"||mode==="map")return;     // 阅读/导图模式：不拦截原生滚动与翻面
  if(e.key===" "||e.key==="Enter"){e.preventDefault();flip();}
  if(turned){if(e.key==="1")grade(0);if(e.key==="2")grade(1);if(e.key==="3")grade(2);}
});
// 阅读模式下显示"回到顶部"
window.addEventListener("scroll",()=>{
  document.getElementById("totop").classList.toggle("show",(mode==="read"||mode==="map")&&window.scrollY>400);
});

updateSubjectUI();buildCatOptions();buildTopicOptions();buildQueue();render();updateStats();
</script>
</body>
